<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MBolka - Immersive Mode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            --primary: #9ac8e2;
            --primary-light: #b4d6ea;
            --primary-glow: rgba(154, 200, 226, 0.5);
            --bg-dark: #0a0a1a;
            --bg-darker: #050510;
            --text-main: #f0f8ff;
            --text-sub: #8a8aa0;
            --glass-bg: rgba(20, 20, 35, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --bg-blur: 40px;
            --transition-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-main);
            background: var(--bg-darker);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none; /* 禁止文本选中 */
            -webkit-user-select: none;
        }

        /* 动态背景层 */
        #bg-layer-img, #bg-layer-color {
            position: fixed; inset: -5%; z-index: -3;
            background-size: cover; background-position: center;
            opacity: 0; pointer-events: none;
            transition: opacity 1.2s var(--transition-smooth), filter 0.5s ease;
        }
        #bg-layer-img { 
            filter: blur(var(--bg-blur)) brightness(0.5) saturate(1.2);
            transform: scale(1.05);
        }
        #bg-layer-color { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--bg-dark) 100%);
            transition: background 1.2s var(--transition-smooth);
        }
        #bg-layer-img.active, #bg-layer-color.active { opacity: 1; }

        #visualCanvas {
            position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: -2;
        }

        .imm-container {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: clamp(20px, 3vw, 40px); pointer-events: none;
        }
        .imm-container * { pointer-events: auto; }

        .imm-topbar {
            display: flex; justify-content: space-between; align-items: flex-start;
            animation: slideDown 0.8s var(--transition-spring) 0.2s both;
        }

        /* 歌曲信息卡片 */
        .track-card {
            display: flex; align-items: center; gap: clamp(12px, 2vw, 20px);
            background: var(--glass-bg); backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            padding: clamp(12px, 2vw, 18px) clamp(16px, 3vw, 24px);
            border-radius: 24px; border: var(--glass-border);
            max-width: 500px; transition: transform 0.4s var(--transition-smooth), opacity 0.4s;
        }
        .track-card.no-cover { gap: 0; }
        .track-card.no-cover .album-art { display: none; }

        .album-art {
            width: clamp(60px, 8vw, 80px); height: clamp(60px, 8vw, 80px);
            border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); flex-shrink: 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .album-art img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s var(--transition-smooth); }
        .track-card:hover .album-art img { transform: scale(1.1); }

        .track-info { min-width: 0; }
        .track-title { font-size: clamp(18px, 2.2vw, 22px); font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: 0 2px 10px rgba(0,0,0,0.5);}
        .track-artist { font-size: clamp(14px, 1.6vw, 16px); color: var(--primary); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.5s; }

        /* 顶部按钮组 */
        .header-actions { display: flex; gap: 12px; }
        .icon-btn {
            width: 50px; height: 50px; border-radius: 16px;
            background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-main);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.3s var(--transition-smooth); font-size: 18px;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); border-color: var(--primary); color: var(--primary); }
        .icon-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        /* 居中歌词 */
        .lyrics-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 1000px; text-align: center; z-index: 5;
            animation: fadeInUp 0.8s var(--transition-spring) 0.4s both;
        }
        .lyrics-center.hidden { opacity: 0; pointer-events: none; }
        .subtitle { text-shadow: 0 4px 20px rgba(0,0,0,0.8), 0 0 30px var(--primary-glow); line-height: 1.4; }
        .subtitle-line { font-size: clamp(24px, 4vw, 42px); font-weight: 800; margin-bottom: 12px; min-height: 1.4em; transition: all 0.4s var(--transition-spring); opacity: 1; }
        .subtitle-line.next { font-size: clamp(18px, 2.5vw, 26px); font-weight: 600; color: rgba(255,255,255,0.5); margin-top: 8px; min-height: 1.4em; }

        /* 底部控制台 */
        .imm-controls {
            background: var(--glass-bg); backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: 28px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            padding: clamp(16px, 3vw, 24px) clamp(20px, 4vw, 40px);
            max-width: 850px; margin: 0 auto; width: 100%;
            animation: slideUp 0.8s var(--transition-spring) 0.6s both;
        }

        .progress-container { width: 100%; margin-bottom: 24px; cursor: pointer; padding: 10px 0;}
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; position: relative; }
        .progress-fill { height: 100%; width: 0%; background: var(--primary); border-radius: 3px; position: relative; transition: background 0.5s; box-shadow: 0 0 10px var(--primary-glow); }
        .progress-fill::after {
            content: ''; position: absolute; right: -6px; top: 50%; transform: translateY(-50%) scale(0);
            width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: transform 0.2s var(--transition-spring); box-shadow: 0 0 10px var(--primary);
        }
        .progress-container:hover .progress-fill::after { transform: translateY(-50%) scale(1.2); }
        .time-display { display: flex; justify-content: space-between; margin-top: 8px; font-size: 13px; color: var(--text-sub); font-variant-numeric: tabular-nums; font-weight: 500;}

        .controls-row { display: flex; justify-content: space-between; align-items: center; }
        .playback-controls { display: flex; align-items: center; gap: 16px; }
        .ctrl-btn {
            width: 54px; height: 54px; border-radius: 50%;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); color: #fff;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s var(--transition-spring); font-size: 20px;
        }
        .ctrl-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.1); border-color: var(--primary); color: var(--primary); }
        
        .play-btn {
            width: 76px; height: 76px; background: var(--primary); color: #000; font-size: 28px; border: none; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .play-btn:hover { filter: brightness(1.1); }
        .play-btn .play-icon { transition: transform 0.4s var(--transition-spring), opacity 0.3s; }
        .play-btn .pause-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0) rotate(-180deg); transition: transform 0.4s var(--transition-spring), opacity 0.3s; opacity: 0; }
        .play-btn.playing .play-icon { transform: scale(0) rotate(180deg); opacity: 0; }
        .play-btn.playing .pause-icon { transform: translate(-50%, -50%) scale(1) rotate(0); opacity: 1; }

        .volume-control { display: flex; align-items: center; gap: 12px; width: 150px; background: rgba(0,0,0,0.2); padding: 10px 16px; border-radius: 16px;}
        .volume-slider { flex: 1; height: 4px; -webkit-appearance: none; background: rgba(255,255,255,0.2); border-radius: 2px; outline: none; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--primary); cursor: pointer; transition: background 0.5s; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        .mode-indicator { font-size: 13px; color: var(--text-sub); padding: 8px 14px; background: rgba(255,255,255,0.05); border-radius: 12px; display: flex; align-items: center; gap: 8px; font-weight: 500;}

        .fullscreen-btn {
            position: fixed; bottom: 24px; left: 24px; width: 48px; height: 48px; border-radius: 14px;
            background: rgba(20,20,35,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s var(--transition-spring); font-size: 18px; z-index: 20;
        }
        .fullscreen-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-3px); border-color: var(--primary); color: var(--primary); }

        .gamepad-hint {
            position: fixed; bottom: 24px; right: 24px; font-size: 13px; color: var(--text-sub); font-weight: 500;
            background: rgba(20,20,35,0.6); backdrop-filter: blur(20px); padding: 10px 16px; border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 8px; opacity: 0.7; transition: opacity 0.3s;
        }
        .gamepad-hint.connected { color: var(--primary); opacity: 1;}

        /* 动画与响应式 */
        @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translate(-50%, -40%); } to { opacity: 1; transform: translate(-50%, -50%); } }

        @media (max-width: 768px) {
            .imm-container { padding: 15px; } .track-card { max-width: 300px; } .header-actions { gap: 8px; }
            .lyrics-center { width: 95%; } .imm-controls { padding: 16px 20px; }
            .volume-control { display: none; /* 移动端隐藏音量 */ } 
        }

        #fileInput { display: none; }
        
        .toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(20,20,35,0.9); backdrop-filter: blur(20px); color: #fff;
            padding: 14px 28px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); z-index: 1000;
            font-weight: 600; white-space: nowrap; opacity: 0; transition: all 0.4s var(--transition-spring); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>
    <div id="bg-layer-img"></div>
    <div id="bg-layer-color"></div>
    <canvas id="visualCanvas"></canvas>

    <div class="imm-container">
        <div class="imm-topbar">
            <div class="track-card" id="trackCard">
                <div class="album-art"><img id="albumArt" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iODAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iIzFhMWEyZSIvPjwvc3ZnPg==" alt="封面"></div>
                <div class="track-info">
                    <div class="track-title" id="songTitle">沉浸式音乐舱</div>
                    <div class="track-artist" id="songArtist">就绪</div>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="btnLoadFolder" title="载入音乐">📁</button>
                <button class="icon-btn" id="btnColorMode" title="UI取色跟随 (Y)">🎨</button>
                <button class="icon-btn active" id="btnShuffle" title="播放模式 (X)">🔀</button>
                <button class="icon-btn" id="btnExit" title="返回主界面 (Menu)">✖</button>
            </div>
        </div>

        <div class="lyrics-center" id="lyricsCenter">
            <div class="subtitle">
                <div class="subtitle-line" id="currLine">请载入本地音乐文件夹以开始</div>
                <div class="subtitle-line next" id="nextLine"></div>
            </div>
        </div>

        <div class="imm-controls">
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="time-display"><span id="currentTime">0:00</span><span id="totalTime">0:00</span></div>
            </div>
            
            <div class="controls-row">
                <div class="playback-controls">
                    <button class="ctrl-btn" id="btnPrev" title="上一曲">⏮</button>
                    <button class="ctrl-btn play-btn" id="btnPlay" title="播放/暂停"><span class="play-icon">▶</span><span class="pause-icon">⏸</span></button>
                    <button class="ctrl-btn" id="btnNext" title="下一曲">⏭</button>
                </div>
                <div class="volume-control">
                    <span>🔊</span><input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
                </div>
                <div class="mode-indicator" id="modeIndicator"><span>🔀</span> <span id="modeText">随机播放</span></div>
            </div>
        </div>
    </div>

    <button class="fullscreen-btn" id="btnFullscreen" title="全屏 (F或View键)">⛶</button>
    <div class="gamepad-hint" id="gamepadHint"><span>🎮</span> <span>等待手柄接入</span></div>
    <div class="toast" id="toast"></div>
    <input type="file" id="fileInput" webkitdirectory directory multiple>

    <script>
        const audio = new Audio(); audio.crossOrigin = "anonymous";
        let audioCtx, analyser, dataArray;
        let playlist = [], lrcMap = new Map(), playHistory = [];
        let currentIndex = -1, isPlaying = false, isShuffle = true;
        let parsedLyrics = []; 
        let currentHue = 210, targetHue = 210, time = 0;
        
        // 性能优化：限制粒子与波纹数量
        let particles = [], ripples = [], shockwaves = [];
        const MAX_PARTICLES = 50, MAX_RIPPLES = 5;
        let emitterX = window.innerWidth / 2, emitterY = window.innerHeight / 2;
        let targetX = emitterX, targetY = emitterY;
        let idleFrames = 0, gamepadActive = false;
        
        let gamepadConnected = false, prevPadBtns = [];
        let lastButtonPressTime = 0;
        
        // 配置与状态同步
        let cfg = { colorMode: false, customBgImg: null, customBgColor: null, blurAmt: 40, defaultColor: '#9ac8e2' };
        let currentAlbumColor = null, hasCurrentAlbumArt = false;
        let pendingResume = false, resumeIndex = 0, resumeTime = 0;
        
        const el = {
            bgImg: document.getElementById('bg-layer-img'), bgColor: document.getElementById('bg-layer-color'),
            canvas: document.getElementById('visualCanvas'), trackCard: document.getElementById('trackCard'),
            albumArt: document.getElementById('albumArt'), songTitle: document.getElementById('songTitle'), songArtist: document.getElementById('songArtist'),
            lyricsCenter: document.getElementById('lyricsCenter'), currLine: document.getElementById('currLine'), nextLine: document.getElementById('nextLine'),
            progCont: document.getElementById('progressContainer'), progFill: document.getElementById('progressFill'),
            timeCur: document.getElementById('currentTime'), timeTot: document.getElementById('totalTime'),
            btnPlay: document.getElementById('btnPlay'), btnPrev: document.getElementById('btnPrev'), btnNext: document.getElementById('btnNext'),
            btnShuffle: document.getElementById('btnShuffle'), btnColorMode: document.getElementById('btnColorMode'),
            btnLoad: document.getElementById('btnLoadFolder'), btnExit: document.getElementById('btnExit'), btnFull: document.getElementById('btnFullscreen'),
            volSlider: document.getElementById('volumeSlider'), modeInd: document.getElementById('modeIndicator'), modeText: document.getElementById('modeText'),
            padHint: document.getElementById('gamepadHint'), toast: document.getElementById('toast'), fileIn: document.getElementById('fileInput')
        };

        const showToast = (msg, icon='💡') => { el.toast.innerHTML = `<i>${icon}</i> ${msg}`; el.toast.classList.add('show'); setTimeout(() => el.toast.classList.remove('show'), 2500); };
        const formatTime = (s) => { if (!s || isNaN(s)) return '0:00'; const m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec.toString().padStart(2, '0')}`; };
        
        // 强悍解码器
        const decodeText = (str) => {
            if (!str) return '';
            let s = str.replace(/\\u([0-9a-fA-F]{4})/g, (m, g) => String.fromCharCode(parseInt(g, 16)));
            const txt = document.createElement("textarea"); txt.innerHTML = s; return txt.value;
        };

        const extractColor = (imgSrc) => {
            return new Promise((resolve) => {
                if (!imgSrc || imgSrc.startsWith('data:image/svg')) return resolve(null);
                const img = new Image();
                img.onload = () => {
                    const cvs = document.createElement('canvas'); cvs.width = 32; cvs.height = 32;
                    const ctx = cvs.getContext('2d', { willReadFrequently: true }); ctx.drawImage(img, 0, 0, 32, 32);
                    try {
                        const data = ctx.getImageData(0, 0, 32, 32).data; let r=0, g=0, b=0, count=0;
                        for(let i=0; i<data.length; i+=16) { if(data[i]>20 && data[i]<235) { r+=data[i]; g+=data[i+1]; b+=data[i+2]; count++; } }
                        resolve(count > 0 ? `rgb(${~~(r/count)},${~~(g/count)},${~~(b/count)})` : null);
                    } catch(e) { resolve(null); }
                }; img.onerror = () => resolve(null); img.src = imgSrc;
            });
        };

        const getHueFromRgb = (rgbStr) => {
            if (!rgbStr) return 210;
            const match = rgbStr.match(/\d+/g); if (!match) return 210;
            let r = parseInt(match[0])/255, g = parseInt(match[1])/255, b = parseInt(match[2])/255;
            const max = Math.max(r,g,b), min = Math.min(r,g,b);
            let h = 0;
            if (max !== min) {
                const d = max - min;
                switch (max) { case r: h = (g-b)/d + (g<b?6:0); break; case g: h = (b-r)/d + 2; break; case b: h = (r-g)/d + 4; break; } h /= 6;
            } return h * 360;
        };

        // ================= 状态无缝衔接与背景重构 =================
        const loadState = () => {
            try {
                // 读取基础设置
                const cfgStr = localStorage.getItem('MBolka_Cfg');
                if (cfgStr) {
                    const c = JSON.parse(cfgStr);
                    cfg.colorMode = c.colorMode; cfg.blurAmt = c.blurAmt || 40; audio.volume = c.vol ?? 0.7;
                    cfg.customBgImg = c.customBgImg; cfg.customBgColor = c.customBgColor;
                }
                
                // 读取播放状态
                const stateStr = localStorage.getItem('MBolka_Player_State');
                if (stateStr) {
                    const s = JSON.parse(stateStr);
                    isShuffle = s.isShuffle ?? true;
                    if(s.colorMode !== undefined) cfg.colorMode = s.colorMode;
                    
                    if (s.playlist && s.playlist.length > 0) {
                        pendingResume = true;
                        resumeIndex = s.currentIndex ?? 0; resumeTime = s.currentTime ?? 0;
                        showToast('🔄 为无缝恢复播放，请重新选择同一音乐文件夹', 'ℹ️');
                        el.currLine.textContent = "点击上方 📁 图标恢复播放进度";
                        el.nextLine.textContent = "由于浏览器安全限制，需重选文件夹授权";
                    }
                }
                
                el.volSlider.value = audio.volume; updateModeUI(); updateColorModeUI(); applyThemeLogic();
            } catch(e) {}
        };

        const saveState = () => {
            try {
                localStorage.setItem('MBolka_Cfg', JSON.stringify({ colorMode: cfg.colorMode, blurAmt: cfg.blurAmt, vol: audio.volume, customBgImg: cfg.customBgImg, customBgColor: cfg.customBgColor }));
                if (playlist.length) {
                    localStorage.setItem('MBolka_Player_State', JSON.stringify({
                        playlist: playlist.map(song => ({ title: song.title, artist: song.artist, art: song.art })),
                        currentIndex: currentIndex, isShuffle: isShuffle, colorMode: cfg.colorMode, currentTime: audio.currentTime
                    }));
                }
            } catch(e) {}
        };

        const applyThemeLogic = () => {
            let targetColor = cfg.defaultColor; let showImg = false, showColor = false, bgUrl = '';
            if (cfg.colorMode) targetColor = cfg.customBgImg ? (cfg.customBgColor || targetColor) : (currentAlbumColor || targetColor);
            
            document.documentElement.style.setProperty('--primary', targetColor);
            document.documentElement.style.setProperty('--bg-blur', `${cfg.blurAmt}px`);
            targetHue = getHueFromRgb(targetColor); // 更新频谱目标色

            if (cfg.customBgImg) { showImg = true; bgUrl = cfg.customBgImg; } 
            else if (hasCurrentAlbumArt && !cfg.colorMode) { showImg = true; bgUrl = el.albumArt.src; } 
            else showColor = true;
            
            if (showImg) {
                el.bgImg.style.backgroundImage = `url(${bgUrl})`; el.bgImg.classList.add('active'); el.bgColor.classList.remove('active');
            } else if (showColor) {
                el.bgColor.style.background = `linear-gradient(135deg, ${targetColor} 0%, var(--bg-dark) 100%)`; el.bgColor.classList.add('active'); el.bgImg.classList.remove('active');
            }
        };

        // ================= 性能优化的可视化 =================
        class Particle {
            constructor(x, y, vx, vy, color, size) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.color = color; this.size = size; this.life = 1; this.maxLife = 1;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= 0.02; this.size *= 0.95; this.vx *= 0.95; this.vy *= 0.95; return this.life > 0; }
            draw(ctx) { ctx.save(); ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); ctx.restore(); }
        }
        class Ripple {
            constructor(x, y, color) { this.x = x; this.y = y; this.radius = 5; this.color = color; this.life = 1; }
            update() { this.radius += 10; this.life -= 0.04; return this.life > 0; }
            draw(ctx) { ctx.save(); ctx.globalAlpha = this.life; ctx.strokeStyle = this.color; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.stroke(); ctx.restore(); }
        }

        const initVis = () => {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)(); analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
                const src = audioCtx.createMediaElementSource(audio); src.connect(analyser); analyser.connect(audioCtx.destination);
                dataArray = new Uint8Array(analyser.frequencyBinCount); renderVis();
            } catch (e) { console.log(e); }
        };

        const renderVis = () => {
            requestAnimationFrame(renderVis);
            const cvs = el.canvas, ctx = cvs.getContext('2d');
            if (cvs.width !== window.innerWidth || cvs.height !== window.innerHeight) { cvs.width = window.innerWidth; cvs.height = window.innerHeight; }
            
            time += 0.01; idleFrames++; ctx.clearRect(0, 0, cvs.width, cvs.height);
            
            // 丝滑颜色过渡
            if (cfg.colorMode) {
                // 缓慢逼近 targetHue
                let diff = targetHue - currentHue;
                if (diff > 180) diff -= 360; else if (diff < -180) diff += 360;
                currentHue += diff * 0.05; 
            } else {
                currentHue = (currentHue + 0.1) % 360; // 梦幻彩虹流转
            }
            if (currentHue < 0) currentHue += 360;

            if (idleFrames > 120 && !gamepadActive) { targetX = cvs.width/2 + Math.sin(time*0.5)*100; targetY = cvs.height/2 + Math.cos(time*0.7)*100; }
            emitterX += (targetX - emitterX) * 0.1; emitterY += (targetY - emitterY) * 0.1;
            
            if (analyser && isPlaying) {
                analyser.getByteFrequencyData(dataArray);
                const bass = (dataArray[2] + dataArray[3])/2; const mid = dataArray[20];
                
                // 渲染环形频段
                const cx = cvs.width/2, cy = cvs.height/2; const radius = 120 + bass*0.6;
                ctx.save(); ctx.translate(cx, cy);
                for (let i=0; i<64; i+=2) {
                    const angle = (i/64)*Math.PI*2; const val = dataArray[i]/255;
                    const extR = radius + val*120;
                    const h = (currentHue + i*2) % 360; // 微弱色相偏移增加立体感
                    ctx.strokeStyle = `hsla(${h}, 80%, 65%, ${0.4 + val*0.6})`; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.moveTo(Math.cos(angle)*radius, Math.sin(angle)*radius); ctx.lineTo(Math.cos(angle)*extR, Math.sin(angle)*extR); ctx.stroke();
                } ctx.restore();
                
                if (bass > 210 && Math.random() < 0.2) createExplosion(emitterX, emitterY, 1.2);
                if (mid > 190 && Math.random() < 0.1) ripples.push(new Ripple(emitterX, emitterY, `hsl(${currentHue},80%,70%)`));
            }
            
            // 数组裁剪防止溢出
            if (particles.length > MAX_PARTICLES) particles.splice(0, particles.length - MAX_PARTICLES);
            if (ripples.length > MAX_RIPPLES) ripples.shift();

            particles = particles.filter(p => { if(p.update()){ p.draw(ctx); return true; } return false; });
            ripples = ripples.filter(r => { if(r.update()){ r.draw(ctx); return true; } return false; });
        };

        const createExplosion = (x, y, intensity) => {
            const count = Math.floor(6 * intensity);
            for (let i=0; i<count; i++) {
                const ang = Math.random() * Math.PI*2, spd = 1 + Math.random()*3*intensity;
                particles.push(new Particle(x, y, Math.cos(ang)*spd, Math.sin(ang)*spd, `hsl(${currentHue},80%,70%)`, 2+Math.random()*4));
            }
        };

        // ================= 解析与播放 =================
        const parseMeta = (file) => {
            return new Promise(resolve => {
                const url = URL.createObjectURL(file); const meta = { title: file.name.replace(/\.[^/.]+$/, ""), artist: "未知", url, file };
                if (window.jsmediatags) {
                    jsmediatags.read(file, {
                        onSuccess: tag => {
                            if(tag.tags.title) meta.title = decodeText(tag.tags.title); if(tag.tags.artist) meta.artist = decodeText(tag.tags.artist);
                            if(tag.tags.picture) { let b64 = ''; const d = tag.tags.picture.data; for(let i=0; i<d.length; i++) b64 += String.fromCharCode(d[i]); meta.art = `data:${tag.tags.picture.format};base64,${window.btoa(b64)}`; }
                            resolve(meta);
                        }, onError: () => resolve(meta)
                    });
                } else resolve(meta);
            });
        };

        el.fileIn.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files); if (!files.length) return;
            audio.pause(); playlist = []; lrcMap.clear(); playHistory = []; const audios = [];
            
            files.forEach(f => {
                const ext = f.name.slice(f.name.lastIndexOf('.')).toLowerCase();
                if (['.mp3','.flac','.wav','.m4a'].includes(ext)) audios.push(f); else if (ext === '.lrc') lrcMap.set(f.name.replace('.lrc','').toLowerCase(), f);
            });
            if (!audios.length) return showToast("⚠️ 未发现音频");
            
            showToast(`🚀 解析 ${audios.length} 首音乐中...`);
            
            // 接续播放逻辑
            let startIdx = 0;
            if (pendingResume && resumeIndex < audios.length) startIdx = resumeIndex;

            // 加载目标曲目和前后几首
            const toLoad = [startIdx];
            for (let idx of toLoad) { if(audios[idx]) playlist[idx] = await parseMeta(audios[idx]); }
            
            // 后台慢速加载其余
            setTimeout(async () => {
                for(let i=0; i<audios.length; i++) { if(!playlist[i]) playlist[i] = await parseMeta(audios[i]); }
            }, 1000);

            currentIndex = startIdx; await playAudio(currentIndex);
            if (pendingResume) { audio.currentTime = resumeTime; pendingResume = false; showToast("✨ 进度已完美恢复"); }
        });

        const playAudio = async (idx) => {
            if (!playlist[idx]) return;
            currentIndex = idx; const song = playlist[idx]; playHistory.push(idx);
            
            audio.src = song.url;
            el.songTitle.textContent = song.title; el.songArtist.textContent = song.artist;
            document.title = `${song.title} - ${song.artist}`;
            
            hasCurrentAlbumArt = !!song.art;
            if (hasCurrentAlbumArt) { el.albumArt.src = song.art; el.trackCard.classList.remove('no-cover'); currentAlbumColor = await extractColor(song.art); } 
            else { el.trackCard.classList.add('no-cover'); el.albumArt.src = ""; currentAlbumColor = null; }
            
            applyThemeLogic(); await parseLyrics(song);
            
            try { await audio.play(); isPlaying = true; el.btnPlay.classList.add('playing'); initVis(); } catch(e) { showToast("❌ 播放受阻"); }
        };

        const togglePlay = () => {
            if (!playlist.length) return el.fileIn.click();
            if (isPlaying) { audio.pause(); isPlaying=false; } else { audio.play(); isPlaying=true; initVis(); }
            el.btnPlay.classList.toggle('playing', isPlaying); createRipple(el.canvas.width/2, el.canvas.height/2);
        };
        const goNext = () => { if(!playlist.length) return; playAudio(isShuffle ? Math.floor(Math.random()*playlist.length) : (currentIndex + 1) % playlist.length); createExplosion(window.innerWidth*0.8, window.innerHeight/2, 2); };
        const goPrev = () => { if(!playlist.length) return; if(isShuffle) { playHistory.pop(); playAudio(playHistory.length ? playHistory.pop() : Math.floor(Math.random()*playlist.length)); } else playAudio((currentIndex - 1 + playlist.length) % playlist.length); createExplosion(window.innerWidth*0.2, window.innerHeight/2, 2); };

        audio.onended = goNext;
        audio.ontimeupdate = () => { 
            if(audio.duration) { el.progFill.style.width = `${(audio.currentTime/audio.duration)*100}%`; el.timeCur.textContent = formatTime(audio.currentTime); syncLrc(); }
            if (Date.now() - lastSaveTime > 2000) { saveState(); lastSaveTime = Date.now(); }
        };
        audio.onloadedmetadata = () => el.timeTot.textContent = formatTime(audio.duration);
        el.progCont.onclick = (e) => { if(audio.duration) audio.currentTime = ((e.clientX - el.progCont.getBoundingClientRect().left)/el.progCont.offsetWidth)*audio.duration; createExplosion(e.clientX, e.clientY, 1.5); };
        el.volSlider.oninput = (e) => { audio.volume = e.target.value; saveState(); };

        // ================= 歌词引擎 =================
        const parseLyrics = async (song) => {
            parsedLyrics = []; el.currLine.textContent = ''; el.nextLine.textContent = '';
            const base = song.file.name.replace(/\.[^/.]+$/, "").toLowerCase(); let file = lrcMap.get(base);
            if(!file) for (let [k, v] of lrcMap.entries()) if (k.includes(base) || base.includes(k)) { file = v; break; }

            if (!file) { el.currLine.textContent = "纯音乐 / 无滚动歌词"; return; }

            const text = await new Promise(resolve => {
                const r = new FileReader(); r.onload = e => { try { resolve(new TextDecoder('utf-8', {fatal: true}).decode(e.target.result)); } catch { const r2=new FileReader(); r2.onload=ev=>resolve(ev.target.result); r2.readAsText(file, 'gbk'); } }; r.readAsArrayBuffer(file);
            });

            text.split(/\r?\n/).forEach(line => {
                const times = line.match(/\[\d{2}:\d{2}(\.\d{2,3})?\]/g);
                if (times) {
                    const txt = decodeText(line.replace(/\[.*?\]/g, '').trim());
                    if (txt) { times.forEach(t => { const match = t.match(/\[(\d{2}):(\d{2})(?:\.(\d{2,3}))?\]/); if (match) { const ms = match[3] ? parseInt(match[3].padEnd(3,'0')) : 0; parsedLyrics.push({ time: parseInt(match[1])*60 + parseInt(match[2]) + ms/1000, text: txt }); } }); }
                }
            }); parsedLyrics.sort((a,b) => a.time - b.time);
            if(!parsedLyrics.length) el.currLine.textContent = "无有效歌词数据";
        };

        const syncLrc = () => {
            if(!parsedLyrics.length) return; const cur = audio.currentTime; let act = -1;
            for (let i=0; i<parsedLyrics.length; i++) { if(cur >= parsedLyrics[i].time - 0.2) act = i; else break; }
            if (act !== -1) {
                const curTxt = parsedLyrics[act].text; const nextTxt = act+1 < parsedLyrics.length ? parsedLyrics[act+1].text : '';
                if(el.currLine.textContent !== curTxt) { el.currLine.style.opacity=0; setTimeout(()=>{ el.currLine.textContent=curTxt; el.currLine.style.opacity=1; }, 200); }
                if(el.nextLine.textContent !== nextTxt) { el.nextLine.style.opacity=0; setTimeout(()=>{ el.nextLine.textContent=nextTxt; el.nextLine.style.opacity=1; }, 200); }
            }
        };

        // ================= UI 交互 & 手柄 =================
        const updateModeUI = () => { el.btnShuffle.classList.toggle('active', isShuffle); el.modeText.textContent = isShuffle?'随机播放':'顺序播放'; el.modeInd.querySelector('span').textContent = isShuffle?'🔀':'⇄'; };
        const updateColorModeUI = () => { el.btnColorMode.classList.toggle('active', cfg.colorMode); };

        el.btnLoad.onclick = () => el.fileIn.click();
        el.btnPlay.onclick = togglePlay; el.btnNext.onclick = goNext; el.btnPrev.onclick = goPrev;
        el.btnShuffle.onclick = () => { isShuffle = !isShuffle; updateModeUI(); saveState(); showToast(isShuffle?"模式：随机":"模式：顺序", "🔄"); };
        el.btnColorMode.onclick = () => { cfg.colorMode = !cfg.colorMode; updateColorModeUI(); applyThemeLogic(); saveState(); showToast(cfg.colorMode?"取色跟随已开启":"取色跟随已关闭", "🎨"); };
        el.btnExit.onclick = () => { saveState(); window.close(); if(!window.closed) history.back(); };
        el.btnFull.onclick = () => { if(!document.fullscreenElement) { document.documentElement.requestFullscreen(); showToast("已进入全屏", "⛶"); } else { document.exitFullscreen(); } };

        window.addEventListener('keydown', (e) => {
            if(e.target.tagName==='INPUT') return;
            switch(e.key.toLowerCase()){
                case ' ': case 'enter': e.preventDefault(); togglePlay(); break;
                case 'arrowleft': e.preventDefault(); goPrev(); break;
                case 'arrowright': e.preventDefault(); goNext(); break;
                case 'arrowup': e.preventDefault(); audio.volume=Math.min(1, audio.volume+0.1); el.volSlider.value=audio.volume; saveState(); break;
                case 'arrowdown': e.preventDefault(); audio.volume=Math.max(0, audio.volume-0.1); el.volSlider.value=audio.volume; saveState(); break;
                case 'x': el.btnShuffle.click(); break; case 'y': el.btnColorMode.click(); break;
                case 'f': el.btnFull.click(); break; case 'escape': if(document.fullscreenElement) document.exitFullscreen(); else el.btnExit.click(); break;
            }
        });

        // 鼠标视差
        window.addEventListener('mousemove', (e) => {
            targetX = e.clientX; targetY = e.clientY; idleFrames = 0; gamepadActive = false;
        });

        window.addEventListener("gamepadconnected", () => { gamepadConnected = true; el.padHint.innerHTML = '<span>🎮</span> <span>手柄已就绪</span>'; el.padHint.classList.add('connected'); });
        window.addEventListener("gamepaddisconnected", () => { gamepadConnected = false; el.padHint.innerHTML = '<span>🎮</span> <span>等待手柄连接</span>'; el.padHint.classList.remove('connected'); });
        
        const pollPad = () => {
            if (!gamepadConnected) { requestAnimationFrame(pollPad); return; }
            const pad = navigator.getGamepads()[0];
            if (pad) {
                leftStickX = pad.axes[0]; leftStickY = pad.axes[1];
                if(Math.abs(leftStickX)>0.1 || Math.abs(leftStickY)>0.1) { targetX = window.innerWidth/2 + leftStickX*300; targetY = window.innerHeight/2 + leftStickY*300; idleFrames=0; gamepadActive=true; }

                const btns = pad.buttons.map(b => b.pressed);
                if (btns[0] && !prevPadBtns[0]) togglePlay(); // A
                if (btns[1] && !prevPadBtns[1]) el.btnExit.click(); // B - Exit
                if (btns[2] && !prevPadBtns[2]) el.btnShuffle.click(); // X - Mode
                if (btns[3] && !prevPadBtns[3]) el.btnColorMode.click(); // Y - Color
                if (btns[4] && !prevPadBtns[4]) goPrev(); // LB
                if (btns[5] && !prevPadBtns[5]) goNext(); // RB
                if (btns[8] && !prevPadBtns[8]) el.btnFull.click(); // View
                if (btns[9] && !prevPadBtns[9]) el.btnExit.click(); // Menu -> Exit
                if (btns[14]) { audio.volume=Math.max(0, audio.volume-0.02); el.volSlider.value=audio.volume; saveState(); } // Left
                if (btns[15]) { audio.volume=Math.min(1, audio.volume+0.02); el.volSlider.value=audio.volume; saveState(); } // Right
                prevPadBtns = btns;
            } requestAnimationFrame(pollPad);
        }; requestAnimationFrame(pollPad);

        loadState();
    </script>
</body>
</html>
