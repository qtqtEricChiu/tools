<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MBolka Player - Ultimate Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            --primary: #9ac8e2;
            --primary-glow: rgba(154, 200, 226, 0.4);
            --bg-dark: #0a0a1a;
            --glass: rgba(26, 26, 46, 0.6);
            --glass-heavy: rgba(10, 10, 25, 0.85);
            --curve: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; height: 100vh; }

        /* ================= 动画定义 ================= */
        @keyframes rotateArt { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ================= 背景层 ================= */
        #bg-layer {
            position: fixed; inset: -5%; z-index: -2;
            background-size: cover; background-position: center;
            filter: blur(50px) brightness(0.4);
            transition: background-image 1.2s ease;
            opacity: 0.6;
        }
        #visCanvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        /* ================= 一级页面 (Player) ================= */
        .page-ui {
            position: relative; z-index: 10; height: 100vh; padding: 40px;
            display: grid; grid-template-columns: 400px 1fr 350px; gap: 30px;
            transition: opacity 0.6s var(--curve), transform 0.6s var(--curve);
        }

        /* 专辑部分 */
        .col-art { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .art-wrap {
            width: 320px; height: 320px; border-radius: 30px; overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            view-transition-name: album-art;
        }
        .art-wrap img { width: 100%; height: 100%; object-fit: cover; }

        /* 控制中心 */
        .col-main { display: flex; flex-direction: column; justify-content: center; padding: 0 20px; }
        .song-info { margin-bottom: 40px; }
        .song-info h1 { font-size: 32px; font-weight: 800; margin-bottom: 10px; view-transition-name: song-title; }
        .song-info p { font-size: 18px; color: var(--primary); view-transition-name: song-artist; }

        .progress-area { margin-bottom: 30px; }
        .prog-bg { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; cursor: pointer; position: relative; }
        .prog-fill { height: 100%; width: 0%; background: var(--primary); border-radius: 4px; box-shadow: 0 0 15px var(--primary); transition: width 0.1s linear; }

        .controls-row { display: flex; align-items: center; justify-content: center; gap: 30px; }
        button { background: none; border: none; color: white; cursor: pointer; transition: 0.3s var(--curve); }
        button:hover { transform: scale(1.1); color: var(--primary); }
        .play-btn {
            width: 80px; height: 80px; background: var(--primary); color: #000;
            border-radius: 50%; font-size: 32px; display: flex; align-items: center; justify-content: center;
        }
        .play-btn i { transition: transform 0.3s var(--curve); }
        .play-btn.playing i { transform: scale(1.1) rotate(180deg); }

        /* 歌词部分 (一级页面侧边) */
        .col-lrc { background: var(--glass); border-radius: 24px; padding: 20px; display: flex; flex-direction: column; mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent); }
        .lrc-list { flex: 1; overflow-y: auto; scroll-behavior: smooth; text-align: center; padding: 200px 0; }
        .lrc-line { padding: 12px 0; font-size: 16px; opacity: 0.3; transition: 0.4s; }
        .lrc-line.active { opacity: 1; font-size: 20px; font-weight: bold; color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }

        /* ================= 二级页面 (Immersive) ================= */
        .immersive-ui {
            position: fixed; inset: 0; z-index: 20; padding: 60px;
            display: flex; flex-direction: column; justify-content: space-between;
            opacity: 0; pointer-events: none; transform: scale(1.1);
            transition: 0.6s var(--curve);
        }

        .imm-top { display: flex; align-items: center; gap: 30px; }
        .imm-art { width: 120px; height: 120px; border-radius: 20px; }
        .imm-info h1 { font-size: 48px; font-weight: 900; }

        .imm-bottom { width: 100%; max-width: 1000px; margin: 0 auto; text-align: center; }
        .subtitle-lrc {
            min-height: 100px; margin-bottom: 40px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.8);
        }
        .subtitle-lrc .curr { font-size: 36px; font-weight: bold; color: #fff; margin-bottom: 10px; }
        .subtitle-lrc .next { font-size: 20px; opacity: 0.5; }

        /* ================= 状态切换 ================= */
        body.is-immersive .page-ui { opacity: 0; transform: scale(0.9); pointer-events: none; }
        body.is-immersive .immersive-ui { opacity: 1; pointer-events: auto; transform: scale(1); }

        .top-nav { position: fixed; top: 20px; right: 40px; z-index: 100; display: flex; gap: 15px; }
        .nav-btn { background: var(--glass); padding: 10px 20px; border-radius: 12px; font-weight: bold; font-size: 14px; border: 1px solid rgba(255,255,255,0.1); }
        
        #loadStatus { position: fixed; top: 20px; left: 40px; font-size: 12px; opacity: 0.5; z-index: 100; }
        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; padding: 10px 30px; border-radius: 25px; font-weight: bold; z-index: 1000; display: none; }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <canvas id="visCanvas"></canvas>
    <div id="loadStatus">曲库: 0 / 0</div>

    <div class="top-nav">
        <button class="nav-btn" id="btnToggleImm">✨ 进入沉浸空间</button>
        <button class="nav-btn" onclick="document.getElementById('fIn').click()">📁 载入目录</button>
    </div>

    <!-- 一级页面 -->
    <div class="page-ui">
        <div class="col-art">
            <div class="art-wrap"><img id="albumArt" src=""></div>
        </div>
        <div class="col-main">
            <div class="song-info">
                <h1 id="songTitle">等待播放</h1>
                <p id="songArtist">MBolka Player Pro</p>
            </div>
            <div class="progress-area">
                <div class="prog-bg" id="progWrap"><div class="prog-fill" id="progFill"></div></div>
                <div style="display:flex; justify-content:space-between; margin-top:12px; font-family:monospace; opacity:0.6;">
                    <span id="timeCur">00:00</span>
                    <span id="timeTot">00:00</span>
                </div>
            </div>
            <div class="controls-row">
                <button id="btnShuffle" class="active" style="font-size: 24px;">🔀</button>
                <button id="btnPrev" style="font-size: 30px;">⏮</button>
                <button class="play-btn" id="btnPlay"><i>▶</i></button>
                <button id="btnNext" style="font-size: 30px;">⏭</button>
            </div>
        </div>
        <div class="col-lrc">
            <div class="lrc-list" id="lrcList">
                <div class="lrc-line">尚未载入歌词</div>
            </div>
        </div>
    </div>

    <!-- 二级页面 (沉浸式) -->
    <div class="immersive-ui" id="immLayer">
        <div class="imm-top">
            <img class="imm-art" id="immAlbumArt" src="">
            <div class="imm-info">
                <h1 id="immSongTitle">标题</h1>
                <p id="immSongArtist">艺术家</p>
            </div>
        </div>
        <div class="imm-bottom">
            <div class="subtitle-lrc" id="subtitleBox">
                <div class="curr" id="subCurr">享受音乐</div>
                <div class="next" id="subNext">Waiting...</div>
            </div>
            <div class="progress-area" style="max-width: 800px; margin: 0 auto;">
                <div class="prog-bg" id="immProgWrap"><div class="prog-fill" id="immProgFill"></div></div>
            </div>
        </div>
    </div>

    <input type="file" id="fIn" webkitdirectory directory multiple style="display:none">
    <div class="toast" id="toast"></div>

    <script>
        /** === 核心配置与状态 === */
        const audio = new Audio(); audio.crossOrigin = "anonymous";
        let playlist = [], playHistory = [], currentIndex = -1, isShuffle = true;
        let audioCtx, analyser, dataArray, particles = [];
        let lrcData = []; // [{time, text}]
        
        const el = {
            body: document.body,
            title: document.getElementById('songTitle'),
            artist: document.getElementById('songArtist'),
            art: document.getElementById('albumArt'),
            immTitle: document.getElementById('immSongTitle'),
            immArtist: document.getElementById('immSongArtist'),
            immArt: document.getElementById('immAlbumArt'),
            lrcList: document.getElementById('lrcList'),
            subCurr: document.getElementById('subCurr'),
            subNext: document.getElementById('subNext'),
            bg: document.getElementById('bg-layer')
        };

        /** === 1. Chrome 媒体会话支持 === */
        function updateMediaSession(song) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.title,
                    artist: song.artist,
                    artwork: song.art ? [{ src: song.art, sizes: '512x512', type: 'image/jpeg' }] : []
                });
                navigator.mediaSession.setActionHandler('play', togglePlay);
                navigator.mediaSession.setActionHandler('pause', togglePlay);
                navigator.mediaSession.setActionHandler('previoustrack', goPrev);
                navigator.mediaSession.setActionHandler('nexttrack', goNext);
            }
        }

        /** === 2. 丝滑页面切换 === */
        document.getElementById('btnToggleImm').onclick = () => {
            if (!document.startViewTransition) {
                el.body.classList.toggle('is-immersive');
                return;
            }
            document.startViewTransition(() => {
                el.body.classList.toggle('is-immersive');
                document.getElementById('btnToggleImm').innerText = 
                    el.body.classList.contains('is-immersive') ? "🔙 返回播放器" : "✨ 进入沉浸空间";
            });
        };

        /** === 3. 歌曲载入与元数据解析 === */
        document.getElementById('fIn').onchange = async (e) => {
            const files = Array.from(e.target.files);
            const audioFiles = files.filter(f => /\.(mp3|flac|wav|m4a)$/i.test(f.name));
            const lrcFiles = files.filter(f => f.name.endsWith('.lrc'));
            
            if (!audioFiles.length) return;

            playlist = audioFiles.map(f => ({
                title: f.name.replace(/\.[^/.]+$/, ""),
                artist: "未知歌手",
                url: URL.createObjectURL(f),
                file: f,
                art: null,
                lrc: lrcFiles.find(l => l.name.replace('.lrc','') === f.name.replace(/\.[^/.]+$/,''))
            }));

            document.getElementById('loadStatus').innerText = `已载入: ${playlist.length} 首`;
            goNext(); // 自动开始

            // 异步解析元数据
            for(let i=0; i<playlist.length; i++){
                parseMetadata(i);
            }
        };

        async function parseMetadata(idx) {
            jsmediatags.read(playlist[idx].file, {
                onSuccess: (tag) => {
                    const t = tag.tags;
                    playlist[idx].title = t.title || playlist[idx].title;
                    playlist[idx].artist = t.artist || "未知歌手";
                    if (t.picture) {
                        const d = t.picture.data;
                        let b = ""; for(let i=0; i<d.length; i++) b += String.fromCharCode(d[i]);
                        playlist[idx].art = `data:${t.picture.format};base64,${btoa(b)}`;
                    }
                    if (idx === currentIndex) updateUI(playlist[idx]);
                }
            });
        }

        /** === 4. 播放逻辑与随机历史修复 === */
        function playSong(idx) {
            if (idx < 0 || idx >= playlist.length) return;
            
            currentIndex = idx;
            const song = playlist[idx];
            audio.src = song.url;
            updateUI(song);
            loadLrc(song.lrc);
            updateMediaSession(song);
            
            audio.play().catch(()=>{});
            document.getElementById('btnPlay').classList.add('playing');
            document.getElementById('btnPlay').innerHTML = "<i>⏸</i>";
            
            if (!audioCtx) initAudioVis();
        }

        function goNext() {
            if (!playlist.length) return;
            playHistory.push(currentIndex); // 记录历史
            if (isShuffle) {
                currentIndex = Math.floor(Math.random() * playlist.length);
            } else {
                currentIndex = (currentIndex + 1) % playlist.length;
            }
            playSong(currentIndex);
        }

        function goPrev() {
            if (playHistory.length > 0) {
                const lastIdx = playHistory.pop();
                playSong(lastIdx);
            } else {
                currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
                playSong(currentIndex);
            }
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                document.getElementById('btnPlay').classList.add('playing');
                document.getElementById('btnPlay').innerHTML = "<i>⏸</i>";
            } else {
                audio.pause();
                document.getElementById('btnPlay').classList.remove('playing');
                document.getElementById('btnPlay').innerHTML = "<i>▶</i>";
            }
        }

        /** === 5. 歌词处理 === */
        async function loadLrc(file) {
            el.lrcList.innerHTML = "";
            lrcData = [];
            if (!file) {
                el.lrcList.innerHTML = "<div class='lrc-line'>暂无歌词</div>";
                el.subCurr.innerText = ""; el.subNext.innerText = "";
                return;
            }
            const text = await file.text();
            text.split('\n').forEach(line => {
                const match = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                if (match) {
                    lrcData.push({
                        time: parseInt(match[1])*60 + parseInt(match[2]) + parseInt(match[3])/1000,
                        text: line.replace(/\[.*?\]/g, '').trim()
                    });
                }
            });
            lrcData.forEach((l, i) => {
                const div = document.createElement('div');
                div.className = 'lrc-line';
                div.innerText = l.text;
                div.id = `lrc-${i}`;
                el.lrcList.appendChild(div);
            });
        }

        function syncLrc() {
            if (!lrcData.length) return;
            const cur = audio.currentTime;
            let activeIdx = -1;
            for(let i=0; i<lrcData.length; i++) {
                if(cur >= lrcData[i].time - 0.2) activeIdx = i; else break;
            }
            if (activeIdx !== -1) {
                document.querySelectorAll('.lrc-line').forEach(l => l.classList.remove('active'));
                const line = document.getElementById(`lrc-${activeIdx}`);
                if (line) {
                    line.classList.add('active');
                    line.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                // 沉浸字幕
                el.subCurr.innerText = lrcData[activeIdx].text;
                el.subNext.innerText = lrcData[activeIdx+1] ? lrcData[activeIdx+1].text : "";
            }
        }

        /** === 6. 现代可视化与自主粒子 === */
        let currentHue = 210, emitterX = 0, emitterY = 0, targetX = 0, targetY = 0;
        let isIdle = true, idleTimer;

        function initAudioVis() {
            audioCtx = new AudioContext();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 512;
            const src = audioCtx.createMediaElementSource(audio);
            src.connect(analyser); analyser.connect(audioCtx.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            emitterX = window.innerWidth / 2;
            emitterY = window.innerHeight / 2;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const canvas = document.getElementById('visCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // 拖尾清空
            ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
            ctx.fillRect(0,0,canvas.width,canvas.height);

            // 自主平移逻辑 (李萨如曲线)
            if (isIdle) {
                const t = Date.now() / 2000;
                targetX = (Math.sin(t * 0.7) * 0.3 + 0.5) * canvas.width;
                targetY = (Math.cos(t * 0.5) * 0.3 + 0.5) * canvas.height;
            }
            emitterX += (targetX - emitterX) * 0.05;
            emitterY += (targetY - emitterY) * 0.05;

            analyser.getByteFrequencyData(dataArray);

            // 1. 绘制底层动态光晕
            const bass = dataArray[5] / 255;
            const grad = ctx.createRadialGradient(emitterX, emitterY, 0, emitterX, emitterY, 300 * bass);
            grad.addColorStop(0, `hsla(${currentHue}, 80%, 60%, 0.3)`);
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,canvas.width,canvas.height);

            // 2. 频谱线条
            ctx.beginPath();
            ctx.strokeStyle = `hsla(${currentHue}, 70%, 70%, 0.5)`;
            ctx.lineWidth = 2;
            const step = canvas.width / dataArray.length;
            for(let i=0; i<dataArray.length; i++) {
                const h = (dataArray[i]/255) * canvas.height * 0.4;
                i===0 ? ctx.moveTo(0, canvas.height-h) : ctx.lineTo(i*step, canvas.height-h);
            }
            ctx.stroke();

            // 3. 粒子系统
            if (dataArray[10] > 180) {
                for(let i=0; i<2; i++) {
                    const ang = Math.random()*Math.PI*2;
                    const spd = Math.random()*4+1;
                    particles.push({
                        x: emitterX, y: emitterY,
                        vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd,
                        life: 1, size: Math.random()*3+1,
                        hue: currentHue
                    });
                }
            }
            particles = particles.filter(p => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.01;
                ctx.fillStyle = `hsla(${p.hue}, 80%, 70%, ${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                return p.life > 0;
            });
        }

        /** === 7. 交互监听 === */
        window.addEventListener('mousemove', (e) => {
            isIdle = false;
            targetX = e.clientX; targetY = e.clientY;
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => isIdle = true, 3000);
        });

        // 手柄轮询
        function pollGamepad() {
            const gp = navigator.getGamepads()[0];
            if (gp) {
                isIdle = false;
                targetX = (gp.axes[0] + 1) * window.innerWidth / 2;
                targetY = (gp.axes[1] + 1) * window.innerHeight / 2;
                if (gp.buttons[0].pressed) togglePlay(); 
            }
            requestAnimationFrame(pollGamepad);
        }
        window.addEventListener("gamepadconnected", () => requestAnimationFrame(pollGamepad));

        /** === UI 通用逻辑 === */
        function updateUI(s) {
            el.title.innerText = s.title; el.immTitle.innerText = s.title;
            el.artist.innerText = s.artist; el.immArtist.innerText = s.artist;
            const cover = s.art || "data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iODAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iIzFExMWEyZSIvPjwvc3ZnPg==";
            el.art.src = cover; el.immArt.src = cover;
            el.bg.style.backgroundImage = `url(${cover})`;
        }

        audio.ontimeupdate = () => {
            const p = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progFill').style.width = p + '%';
            document.getElementById('immProgFill').style.width = p + '%';
            document.getElementById('timeCur').innerText = format(audio.currentTime);
            document.getElementById('timeTot').innerText = format(audio.duration);
            syncLrc();
        };

        const format = (s) => { const m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec.toString().padStart(2,'0')}`; };
        
        document.getElementById('btnPlay').onclick = togglePlay;
        document.getElementById('btnNext').onclick = goNext;
        document.getElementById('btnPrev').onclick = goPrev;
        document.getElementById('btnShuffle').onclick = () => {
            isShuffle = !isShuffle;
            document.getElementById('btnShuffle').classList.toggle('active', isShuffle);
        };
        
        // 进度跳转
        const seek = (e, wrap) => {
            const rect = wrap.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        };
        document.getElementById('progWrap').onclick = (e) => seek(e, document.getElementById('progWrap'));
        document.getElementById('immProgWrap').onclick = (e) => seek(e, document.getElementById('immProgWrap'));

        // 默认初始化
        audio.onended = goNext;
    </script>
</body>
</html>
