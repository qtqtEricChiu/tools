<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBolka Player</title>
    <!-- 引入jsmediatags库用于读取音频元数据 -->
    <!-- 注意：此版本为3.9.5，不得更改 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #9ac8e2;
            --primary-light: #b4d6ea;
            --primary-dark: #7db0d0;
            --secondary: #f8b6c1;
            --dark: #1a1a2e;
            --dark-light: #2a2a3e;
            --light: #f0f8ff;
            --gray: #8a8aa0;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --success: #4ecdc4;
            --warning: #ffd166;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(154, 200, 226, 0.3); }
            50% { box-shadow: 0 0 30px rgba(154, 200, 226, 0.6); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes color-pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Segoe UI Emoji', 'Segoe UI Symbol', sans-serif;
            color: var(--light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, 
                #1a1a2e 0%, 
                #2a2a3e 25%, 
                #3a3a4e 50%, 
                #4a4a5e 75%, 
                #1a1a2e 100%);
            background-size: 400% 400%;
            animation: gradient-shift 20s ease infinite;
            z-index: -2;
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.6);
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .background-overlay.active {
            opacity: 1;
        }

        .color-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            opacity: 0;
            z-index: -1;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            animation: color-pulse 8s ease-in-out infinite;
        }

        .color-overlay.active {
            opacity: 0.8;
        }

        .player-container {
            width: 100%;
            max-width: 1400px;
            background: rgba(26, 26, 46, 0.3);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                0 20px 40px rgba(154, 200, 226, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .player-header {
            padding: 24px 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(26, 26, 46, 0.4);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideIn 0.6s ease-out;
        }

        .header-controls {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .control-btn-small {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            font-size: 14px;
            color: var(--light);
        }

        .control-btn-small::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.6s;
        }

        .control-btn-small:hover::before {
            left: 100%;
        }

        .control-btn-small:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            border-color: var(--primary-light);
        }

        .control-btn-small:active {
            transform: translateY(0);
        }

        .file-input {
            display: none;
        }

        /* 加载进度条样式 */
        .loading-progress-container {
            padding: 0 32px 20px;
            display: none;
        }

        .loading-progress-container.show {
            display: block;
            animation: slideIn 0.5s ease-out;
        }

        .loading-progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .loading-progress-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--light);
        }

        .loading-progress-text {
            font-size: 14px;
            color: var(--gray);
        }

        .loading-progress-bar-container {
            background: rgba(255, 255, 255, 0.08);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .loading-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .loading-progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.3), 
                transparent);
            animation: shimmer 2s infinite;
        }

        .player-content {
            display: flex;
            flex: 1;
            padding: 32px;
            gap: 32px;
            min-height: 600px;
        }

        .album-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        .album-art-container {
            width: 340px;
            height: 340px;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            animation: float 6s ease-in-out infinite;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .album-art-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(154, 200, 226, 0.2), rgba(248, 182, 193, 0.2));
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1;
        }

        .album-art-container:hover::before {
            opacity: 1;
        }

        .album-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .album-art-container:hover .album-art {
            transform: scale(1.05);
        }

        .album-info {
            text-align: center;
            width: 100%;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        .song-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--light) 0%, rgba(255, 255, 255, 0.9) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .song-artist {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .song-album {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            opacity: 0.9;
        }

        .controls-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 28px;
            justify-content: center;
        }

        .progress-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 频谱可视化 */
        .spectrum-visualizer {
            width: 100%;
            height: 60px;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .spectrum-visualizer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent, rgba(154, 200, 226, 0.1));
            z-index: 1;
        }

        .spectrum-visualizer canvas {
            width: 100%;
            height: 100%;
        }

        .progress-bar-container {
            background: rgba(255, 255, 255, 0.08);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            position: relative;
            transition: width 0.1s;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            background: var(--light);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(154, 200, 226, 0.8);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .progress-bar-container:hover .progress-bar::after {
            opacity: 1;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--gray);
            font-weight: 500;
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .control-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .control-btn:hover::before {
            opacity: 0.2;
        }

        .control-btn:hover {
            transform: translateY(-3px) scale(1.05);
            border-color: var(--primary-light);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .control-btn i {
            position: relative;
            z-index: 1;
            font-size: 20px;
        }

        .play-btn {
            width: 84px;
            height: 84px;
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            animation: glow 2s ease-in-out infinite;
        }

        .play-btn::before {
            display: none;
        }

        .play-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 30px rgba(154, 200, 226, 0.4);
        }

        .volume-section {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 24px;
        }

        .volume-slider-container {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            position: relative;
            cursor: pointer;
        }

        .volume-slider {
            position: absolute;
            height: 100%;
            background: linear-gradient(90deg, var(--primary-light), var(--secondary));
            width: 70%;
            border-radius: 4px;
        }

        .lyrics-section {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .lyrics-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lyrics-title {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--light);
        }

        .lyrics-title i {
            color: var(--primary);
        }

        .lyrics-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 24px;
            overflow-y: auto;
            max-height: 420px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
            position: relative;
        }

        .lyrics-container::-webkit-scrollbar {
            width: 6px;
        }

        .lyrics-container::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 3px;
        }

        .lyrics-container::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        .lyrics-container::-webkit-scrollbar-thumb:hover {
            background: var(--primary-light);
        }

        .lyric-line {
            padding: 14px 0;
            font-size: 18px;
            line-height: 1.6;
            text-align: center;
            opacity: 0.4;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
            color: var(--light);
        }

        .lyric-line.active {
            opacity: 1;
            color: var(--light);
            font-size: 22px;
            font-weight: 600;
            text-shadow: 0 0 20px rgba(154, 200, 226, 0.5);
            transform: scale(1.05);
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--primary-light);
            font-style: italic;
            padding: 40px 0;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .no-lyrics {
            text-align: center;
            color: var(--gray);
            font-style: italic;
            padding: 40px 20px;
        }

        .player-footer {
            padding: 20px 32px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: var(--gray);
            background: rgba(26, 26, 46, 0.4);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-info i {
            color: var(--primary);
        }

        .playlist-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.1);
        }

        .playlist-section.show {
            max-height: 300px;
        }

        .playlist-header {
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.3s;
        }

        .playlist-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .playlist-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--light);
        }

        .playlist-items {
            padding: 0 32px 20px;
            overflow-y: auto;
            max-height: 250px;
        }

        .playlist-item {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .playlist-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(154, 200, 226, 0.1), transparent);
            transition: left 0.6s;
        }

        .playlist-item:hover::before {
            left: 100%;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        .playlist-item.active {
            background: rgba(154, 200, 226, 0.15);
            border-left: 4px solid var(--primary);
        }

        .playlist-item-title {
            font-weight: 500;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--light);
        }

        .playlist-item-duration {
            font-size: 13px;
            color: var(--gray);
            margin-left: 12px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(42, 42, 62, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transform: translateY(100px) scale(0.9);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
        }

        .toast.show {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .toast i {
            color: var(--primary);
            font-size: 20px;
        }

        /* 播放模式按钮 */
        .play-mode-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .play-mode-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--primary-light);
        }

        .play-mode-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .play-mode-btn.active i {
            color: white;
        }

        .mode-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }

        .shortcut-hint {
            font-size: 12px;
            color: var(--gray);
            text-align: center;
            margin-top: 10px;
        }

        @media (max-width: 1200px) {
            .player-content {
                flex-direction: column;
            }
            
            .album-section, .controls-section, .lyrics-section {
                width: 100%;
            }
            
            .album-art-container {
                width: 300px;
                height: 300px;
            }
            
            .player-controls {
                gap: 15px;
            }
            
            .control-btn {
                width: 56px;
                height: 56px;
            }
            
            .play-btn {
                width: 72px;
                height: 72px;
            }
        }

        @media (max-width: 768px) {
            .player-header {
                flex-direction: column;
                gap: 20px;
            }
            
            .header-controls {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .player-content {
                padding: 24px;
            }
            
            .song-title {
                font-size: 24px;
            }
            
            .mode-controls {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="background-overlay" id="backgroundOverlay"></div>
    <div class="color-overlay" id="colorOverlay"></div>

    <div class="player-container">
        <div class="player-header">
            <div class="logo">
                <i>♪</i>
                <span>MBolka Player</span>
            </div>
            <div class="header-controls">
                <button class="control-btn-small" id="loadFolderBtn" title="打开音乐文件夹">
                    <i>📁</i> 打开音乐文件夹
                </button>
                <button class="control-btn-small" id="colorModeBtn" title="切换取色模式">
                    <i>🎨</i> 取色模式
                </button>
                <input type="file" id="folderInput" class="file-input" webkitdirectory directory multiple>
            </div>
        </div>

        <!-- 加载进度条 -->
        <div class="loading-progress-container" id="loadingProgressContainer">
            <div class="loading-progress-header">
                <div class="loading-progress-title">正在加载音乐文件...</div>
                <div class="loading-progress-text" id="loadingProgressText">0/0</div>
            </div>
            <div class="loading-progress-bar-container">
                <div id="loadingProgressBar" class="loading-progress-bar"></div>
            </div>
        </div>

        <div class="playlist-header" id="playlistToggle">
            <div class="playlist-title">
                <i>📃</i>
                播放列表
            </div>
            <i id="playlistIcon">▼</i>
        </div>
        
        <div class="playlist-section" id="playlistSection">
            <div class="playlist-items" id="playlistItems">
                <!-- 播放列表项将通过JavaScript动态添加 -->
            </div>
        </div>

        <div class="player-content">
            <div class="album-section">
                <div class="album-art-container">

    <script>
        // 全局变量
        let audioContext;
        let analyser;
        let source;
        let dataArray;
        let bufferLength;
        let spectrumCtx;
        let isPlaying = false;
        let currentSongIndex = 0;
        let playlist = [];
        let currentLyrics = [];
        let shuffleMode = false;
        let isBackgroundLoading = false;
        let audioFiles = [];
        let lrcFiles = new Map();
        let playHistory = [];
        let currentPlayHistoryIndex = -1;
        let customBackgroundImage = null;
        let gamepadConnected = false;
        let gamepadIndex = null;
        let colorMode = false; // 取色模式开关
        let previousGamepadButtons = []; // 存储上一帧手柄按钮状态
        
        // DOM元素
        const folderInput = document.getElementById('folderInput');
        const loadFolderBtn = document.getElementById('loadFolderBtn');
        const colorModeBtn = document.getElementById('colorModeBtn');
        const albumArt = document.getElementById('albumArt');
        const songTitle = document.getElementById('songTitle');
        const songArtist = document.getElementById('songArtist');
        const songAlbum = document.getElementById('songAlbum');
        const playBtn = document.getElementById('playBtn');
        const playBtnIcon = playBtn.querySelector('i');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeSlider = document.getElementById('volumeSlider');
        const lyricsContainer = document.getElementById('lyricsContainer');
        const lyricsContent = document.getElementById('lyricsContent');
        const loadingLyrics = document.getElementById('loadingLyrics');
        const noLyrics = document.getElementById('noLyrics');
        const audioInfo = document.getElementById('audioInfo');
        const playlistItems = document.getElementById('playlistItems');
        const playlistSection = document.getElementById('playlistSection');
        const playlistToggle = document.getElementById('playlistToggle');
        const playlistIcon = document.getElementById('playlistIcon');
        const spectrumCanvas = document.getElementById('spectrumCanvas');
        const toast = document.getElementById('toast');
        const loadingProgressContainer = document.getElementById('loadingProgressContainer');
        const loadingProgressBar = document.getElementById('loadingProgressBar');
        const loadingProgressText = document.getElementById('loadingProgressText');
        const sequentialModeBtn = document.getElementById('sequentialModeBtn');
        const shuffleModeBtn = document.getElementById('shuffleModeBtn');
        const backgroundOverlay = document.getElementById('backgroundOverlay');
        const colorOverlay = document.getElementById('colorOverlay');
        
        // 创建音频元素
        const audio = new Audio();
        audio.crossOrigin = "anonymous";
        
        // 初始化音频分析器和可视化
        function initAudioAnalyzers() {
            // 频谱可视化
            spectrumCtx = spectrumCanvas.getContext('2d');
            spectrumCanvas.width = spectrumCanvas.offsetWidth;
            spectrumCanvas.height = spectrumCanvas.offsetHeight;
            
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            
            analyser.fftSize = 256;
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
        }
        
        // 绘制频谱可视化
        function drawSpectrum() {
            if (!spectrumCtx) return;
            
            requestAnimationFrame(drawSpectrum);
            analyser.getByteFrequencyData(dataArray);
            
            spectrumCtx.clearRect(0, 0, spectrumCanvas.width, spectrumCanvas.height);
            
            const barWidth = (spectrumCanvas.width / bufferLength) * 1.5;
            let barHeight;
            let x = 0;
            
            for(let i = 0; i < bufferLength; i++) {
                barHeight = (dataArray[i] / 255) * spectrumCanvas.height;
                
                const gradient = spectrumCtx.createLinearGradient(0, 0, 0, spectrumCanvas.height);
                gradient.addColorStop(0, '#9ac8e2');
                gradient.addColorStop(0.5, '#b4d6ea');
                gradient.addColorStop(1, '#f8b6c1');
                
                spectrumCtx.fillStyle = gradient;
                spectrumCtx.fillRect(x, spectrumCanvas.height - barHeight, barWidth, barHeight);
                
                x += barWidth + 1;
            }
        }
        
        // 解码HTML实体
        function decodeHtmlEntities(text) {
            const textArea = document.createElement('textarea');
            textArea.innerHTML = text;
            return textArea.value;
        }
        
        // 显示消息
        function showToast(message, type = 'info') {
            const icons = {
                info: '💡',
                success: '✅',
                warning: '⚠️',
                error: '❌'
            };
            
            const decodedMessage = decodeHtmlEntities(message);
            
            toast.innerHTML = `
                <i>${icons[type] || icons.info}</i>
                <span>${decodedMessage}</span>
            `;
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // 格式化时间
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        
        // 更新进度条
        function updateProgress() {
            if (audio.duration && !isNaN(audio.duration)) {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = `${progress}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
                updateLyricsHighlight();
            }
        }
        
        // 从图片中提取主要颜色
        function extractColorFromImage(imageElement) {
            return new Promise((resolve) => {
                if (!imageElement.complete) {
                    imageElement.onload = function() {
                        getColorFromImage(imageElement, resolve);
                    };
                } else {
                    getColorFromImage(imageElement, resolve);
                }
            });
        }
        
        function getColorFromImage(imageElement, resolve) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // 设置canvas尺寸
            canvas.width = 100;
            canvas.height = 100;
            
            // 绘制图片到canvas
            ctx.drawImage(imageElement, 0, 0, canvas.width, canvas.height);
            
            // 获取图片数据
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            // 颜色统计
            const colorMap = {};
            let maxCount = 0;
            let dominantColor = '#9ac8e2'; // 默认颜色
            
            // 采样颜色
            for (let i = 0; i < data.length; i += 16) { // 每4个像素采样一个
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                
                // 跳过太暗或太亮的颜色
                if (r < 20 && g < 20 && b < 20) continue; // 太暗
                if (r > 240 && g > 240 && b > 240) continue; // 太亮
                
                const color = `rgb(${r},${g},${b})`;
                colorMap[color] = (colorMap[color] || 0) + 1;
                
                if (colorMap[color] > maxCount) {
                    maxCount = colorMap[color];
                    dominantColor = color;
                }
            }
            
            // 将RGB转换为十六进制
            const rgb = dominantColor.match(/\d+/g);
            if (rgb) {
                const hex = '#' + rgb.map(x => {
                    const hex = parseInt(x).toString(16);
                    return hex.length === 1 ? '0' + hex : hex;
                }).join('');
                resolve(hex);
            } else {
                resolve('#9ac8e2');
            }
        }
        
        // 更新背景
        function updateBackground(albumArtUrl, dominantColor = null) {
            if (colorMode && dominantColor) {
                // 使用取色模式
                colorOverlay.style.background = `linear-gradient(135deg, ${dominantColor} 0%, ${lightenColor(dominantColor, 20)} 100%)`;
                backgroundOverlay.classList.remove('active');
                colorOverlay.classList.add('active');
            } else if (albumArtUrl) {
                // 使用专辑封面高斯模糊背景
                backgroundOverlay.style.backgroundImage = `url(${albumArtUrl})`;
                backgroundOverlay.classList.add('active');
                colorOverlay.classList.remove('active');
            } else {
                // 无背景
                backgroundOverlay.classList.remove('active');
                colorOverlay.classList.remove('active');
            }
        }
        
        // 颜色变亮函数
        function lightenColor(color, percent) {
            const num = parseInt(color.slice(1), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return `#${(0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (G<255?G<1?0:G:255)*0x100 + (B<255?B<1?0:B:255)).toString(16).slice(1)}`;
        }
        
        // 读取音频文件元数据
        async function extractMetadata(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const arrayBuffer = e.target.result;
                    const blob = new Blob([arrayBuffer]);
                    const url = URL.createObjectURL(blob);
                    
                    const tempAudio = new Audio();
                    tempAudio.src = url;
                    
                    tempAudio.addEventListener('loadedmetadata', () => {
                        const metadata = {
                            title: file.name.replace(/\.[^/.]+$/, ""),
                            artist: "未知艺术家",
                            album: "未知专辑",
                            duration: tempAudio.duration || 0,
                            url: url,
                            filepath: file.webkitRelativePath || file.name,
                            file: file
                        };
                        
                        if (typeof jsmediatags !== 'undefined') {
                            jsmediatags.read(file, {
                                onSuccess: function(tag) {
                                    if (tag.tags.title) metadata.title = tag.tags.title;
                                    if (tag.tags.artist) metadata.artist = tag.tags.artist;
                                    if (tag.tags.album) metadata.album = tag.tags.album;
                                    if (tag.tags.year) metadata.year = tag.tags.year;
                                    if (tag.tags.genre) metadata.genre = tag.tags.genre;
                                    if (tag.tags.track) metadata.track = tag.tags.track;
                                    
                                    if (tag.tags.picture) {
                                        const base64String = arrayBufferToBase64(tag.tags.picture.data);
                                        const format = tag.tags.picture.format || 'image/jpeg';
                                        metadata.albumArt = `data:${format};base64,${base64String}`;
                                    }
                                    
                                    resolve(metadata);
                                },
                                onError: function(error) {
                                    console.log("jsmediatags无法读取元数据:", error);
                                    resolve(metadata);
                                }
                            });
                        } else {
                            resolve(metadata);
                        }
                    });
                    
                    tempAudio.addEventListener('error', () => {
                        resolve({
                            title: file.name.replace(/\.[^/.]+$/, ""),
                            artist: "未知艺术家",
                            album: "未知专辑",
                            duration: 0,
                            url: url,
                            filepath: file.webkitRelativePath || file.name,
                            file: file
                        });
                    });
                };
                
                reader.readAsArrayBuffer(file);
            });
        }
        
        // ArrayBuffer转Base64
        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return window.btoa(binary);
        }
        
        // 更新媒体会话
        function updateMediaSession(song) {
            if ('mediaSession' in navigator) {
                try {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: song.metadata.title,
                        artist: song.metadata.artist,
                        album: song.metadata.album,
                        artwork: song.metadata.albumArt ? [
                            { src: song.metadata.albumArt, sizes: '512x512', type: 'image/jpeg' }
                        ] : []
                    });
                    
                    navigator.mediaSession.setActionHandler('play', () => {
                        if (!isPlaying) {
                            audio.play();
                        }
                    });
                    
                    navigator.mediaSession.setActionHandler('pause', () => {
                        if (isPlaying) {
                            audio.pause();
                        }
                    });
                    
                    navigator.mediaSession.setActionHandler('previoustrack', () => {
                        const newIndex = getPrevSongIndex();
                        playSong(newIndex, true);
                    });
                    
                    navigator.mediaSession.setActionHandler('nexttrack', () => {
                        const newIndex = getNextSongIndex();
                        playSong(newIndex, true);
                    });
                    
                    navigator.mediaSession.setActionHandler('seekto', (details) => {
                        if (details.fastSeek && 'fastSeek' in audio) {
                            audio.fastSeek(details.seekTime);
                        } else {
                            audio.currentTime = details.seekTime;
                        }
                    });
                    
                } catch (e) {
                    console.log("媒体会话更新失败:", e);
                }
            }
        }
        
        // 处理文件夹
        async function handleFolder(files) {
            console.log("开始处理文件夹，文件数量:", files.length);
            
            // 清空现有数据
            playlist = [];
            currentSongIndex = 0;
            playHistory = [];
            currentPlayHistoryIndex = -1;
            lrcFiles.clear();
            updatePlaylist();
            
            // 分离音频文件和歌词文件
            audioFiles = [];
            const allLrcFiles = [];
            
            Array.from(files).forEach(file => {
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                if (['.mp3', '.flac', '.wav', '.m4a'].includes(ext)) {
                    audioFiles.push(file);
                } else if (ext === '.lrc') {
                    allLrcFiles.push(file);
                }
            });
            
            console.log("音频文件数量:", audioFiles.length, "歌词文件数量:", allLrcFiles.length);
            
            if (audioFiles.length === 0) {
                showToast("文件夹中没有找到音频文件", "warning");
                return;
            }
            
            // 建立歌词文件映射
            allLrcFiles.forEach(lrcFile => {
                const baseName = lrcFile.name.replace(/\.lrc$/i, '').toLowerCase();
                lrcFiles.set(baseName, lrcFile);
            });
            
            // 显示加载进度
            loadingProgressContainer.classList.add('show');
            
            // 分批加载参数
            const batchSize = 20;
            const initialLoadCount = 100;
            const totalFiles = audioFiles.length;
            let loadedFiles = 0;
            
            // 更新进度条
            function updateLoadingProgress(current, total) {
                const progress = (current / total) * 100;
                loadingProgressBar.style.width = `${progress}%`;
                loadingProgressText.textContent = `${current}/${total}`;
            }
            
            showToast(`发现 ${totalFiles} 个音频文件，正在实时加载...`, "info");
            
            // 实时加载前100个文件
            const initialFiles = audioFiles.slice(0, Math.min(initialLoadCount, totalFiles));
            
            for (let i = 0; i < initialFiles.length; i++) {
                try {
                    const metadata = await extractMetadata(initialFiles[i]);
                    playlist.push({
                        file: initialFiles[i],
                        metadata: metadata
                    });
                    loadedFiles++;
                    
                    updateLoadingProgress(loadedFiles, totalFiles);
                    
                    if (i % 10 === 0 || i === initialFiles.length - 1) {
                        updatePlaylist();
                    }
                    
                    if (i % 20 === 0) {
                        await new Promise(resolve => setTimeout(resolve, 0));
                    }
                } catch (error) {
                    console.error(`加载文件失败: ${initialFiles[i].name}`, error);
                }
            }
            
            if (playlist.length > 0) {
                playlist.sort((a, b) => a.metadata.title.localeCompare(b.metadata.title));
                
                playSong(0, true);
                updatePlaylist();
                
                showToast(`已实时加载 ${playlist.length} 首歌曲，开始播放`, "success");
                
                if (totalFiles > initialLoadCount) {
                    isBackgroundLoading = true;
                    const remainingFiles = audioFiles.slice(initialLoadCount);
                    let batchCount = 0;
                    
                    for (let i = 0; i < remainingFiles.length; i += batchSize) {
                        const batch = remainingFiles.slice(i, i + batchSize);
                        batchCount++;
                        
                        for (const file of batch) {
                            try {
                                const metadata = await extractMetadata(file);
                                playlist.push({
                                    file: file,
                                    metadata: metadata
                                });
                                loadedFiles++;
                                updateLoadingProgress(loadedFiles, totalFiles);
                            } catch (error) {
                                console.error(`后台加载文件失败: ${file.name}`, error);
                            }
                        }
                        
                        if (loadedFiles % 100 === 0 || loadedFiles === totalFiles) {
                            showToast(`已加载 ${loadedFiles}/${totalFiles} 个文件`, "info");
                        }
                        
                        playlist.sort((a, b) => a.metadata.title.localeCompare(b.metadata.title));
                        updatePlaylist();
                        
                        await new Promise(resolve => setTimeout(resolve, 100));
                    }
                    
                    isBackgroundLoading = false;
                }
                
                loadingProgressContainer.classList.remove('show');
                showToast(`全部 ${playlist.length} 首歌曲加载完成`, "success");
            } else {
                loadingProgressContainer.classList.remove('show');
                showToast("无法加载任何音频文件", "error");
            }
        }
        
        // 播放指定索引的歌曲
        async function playSong(index, autoPlay = false, addToHistory = true) {
            if (index < 0 || index >= playlist.length) return;
            
            if (addToHistory && currentSongIndex !== index) {
                if (currentPlayHistoryIndex < playHistory.length - 1) {
                    playHistory = playHistory.slice(0, currentPlayHistoryIndex + 1);
                }
                playHistory.push(index);
                currentPlayHistoryIndex = playHistory.length - 1;
            }
            
            currentSongIndex = index;
            const song = playlist[index];
            
            audio.pause();
            isPlaying = false;
            playBtnIcon.textContent = '▶';
            
            audio.src = song.metadata.url;
            
            try {
                await audio.load();
                
                const decodedTitle = decodeHtmlEntities(song.metadata.title);
                const decodedArtist = decodeHtmlEntities(song.metadata.artist);
                const decodedAlbum = decodeHtmlEntities(song.metadata.album);
                
                songTitle.innerHTML = decodedTitle;
                songArtist.innerHTML = decodedArtist;
                songAlbum.innerHTML = decodedAlbum;
                
                let dominantColor = null;
                
                if (song.metadata.albumArt) {
                    albumArt.src = song.metadata.albumArt;
                    
                    // 如果启用取色模式，提取专辑封面颜色
                    if (colorMode) {
                        try {
                            dominantColor = await extractColorFromImage(albumArt);
                        } catch (error) {
                            console.error("提取颜色失败:", error);
                        }
                    }
                    
                    updateBackground(song.metadata.albumArt, dominantColor);
                } else {

        // 获取下一首歌曲的索引
        function getNextSongIndex() {
            if (playlist.length === 0) return 0;
            
            if (shuffleMode) {
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * playlist.length);
                } while (randomIndex === currentSongIndex && playlist.length > 1);
                return randomIndex;
            } else {
                return (currentSongIndex + 1) % playlist.length;
            }
        }
        
        // 获取上一首歌曲的索引
        function getPrevSongIndex() {
            if (playlist.length === 0) return 0;
            
            if (shuffleMode && playHistory.length > 1 && currentPlayHistoryIndex > 0) {
                return playHistory[currentPlayHistoryIndex - 1];
            } else {
                return (currentSongIndex - 1 + playlist.length) % playlist.length;
            }
        }
        
        // 解析LRC歌词
        function parseLRC(lrcText) {
            // 处理Unix(LF)和Windows(CRLF)换行符
            const lines = lrcText.split(/\r?\n/);
            const lyrics = [];
            
            lines.forEach(line => {
                const timeMatches = line.match(/\[(\d{2}):(\d{2})(?:\.(\d{2,3}))?\]/g);
                
                if (timeMatches) {
                    const text = line.replace(/\[.*?\]/g, '').trim();
                    
                    if (text) {
                        timeMatches.forEach(timeMatch => {
                            const timeParts = timeMatch.match(/\[(\d{2}):(\d{2})(?:\.(\d{2,3}))?\]/);
                            if (timeParts) {
                                const minutes = parseInt(timeParts[1]);
                                const seconds = parseInt(timeParts[2]);
                                const milliseconds = timeParts[3] ? parseInt(timeParts[3].length === 3 ? timeParts[3] : timeParts[3] * 10) : 0;
                                const time = minutes * 60 + seconds + milliseconds / 1000;
                                
                                lyrics.push({
                                    time: time,
                                    text: text
                                });
                            }
                        });
                    }
                }
            });
            
            lyrics.sort((a, b) => a.time - b.time);
            return lyrics;
        }
        
        // 尝试多种编码读取歌词文件
        async function readLrcFileWithEncoding(lrcFile) {
            const encodings = ['utf-8', 'gbk', 'gb2312', 'big5', 'utf-16', 'windows-1252'];
            
            for (const encoding of encodings) {
                try {
                    const text = await readFileAsText(lrcFile, encoding);
                    // 检查文本是否包含乱码（常见的中文字符）
                    const chineseChars = text.match(/[\u4e00-\u9fa5]/g);
                    if (chineseChars && chineseChars.length > 5) {
                        return text; // 包含足够的中文字符，可能是正确的编码
                    }
                    // 如果没有中文字符，检查是否有歌词时间标签
                    if (text.match(/\[\d{2}:\d{2}/)) {
                        return text;
                    }
                } catch (e) {
                    // 尝试下一个编码
                    continue;
                }
            }
            
            // 如果所有编码都失败，尝试使用默认UTF-8
            return await readFileAsText(lrcFile, 'utf-8');
        }
        
        // 读取文件为文本（支持编码）
        function readFileAsText(file, encoding = 'utf-8') {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    // 如果指定了编码，尝试使用TextDecoder
                    if (encoding !== 'utf-8') {
                        try {
                            const decoder = new TextDecoder(encoding);
                            const arrayBuffer = e.target.result;
                            const text = decoder.decode(arrayBuffer);
                            resolve(text);
                        } catch (error) {
                            // 如果TextDecoder失败，使用原始结果
                            resolve(e.target.result);
                        }
                    } else {
                        resolve(e.target.result);
                    }
                };
                reader.onerror = (e) => reject(e);
                reader.readAsArrayBuffer(file);
            });
        }
        
        // 加载歌词
        async function loadLyrics(song) {
            const baseName = song.file.name.replace(/\.[^/.]+$/, "").toLowerCase();
            
            // 查找同名LRC文件
            if (lrcFiles.has(baseName)) {
                const lrcFile = lrcFiles.get(baseName);
                try {
                    const text = await readLrcFileWithEncoding(lrcFile);
                    currentLyrics = parseLRC(text);
                    displayLyrics();
                    showToast("从本地文件加载歌词", "success");
                } catch (error) {
                    console.error("读取歌词文件失败:", error);
                    loadingLyrics.style.display = 'none';
                    noLyrics.style.display = 'block';
                    lyricsContent.innerHTML = '';
                    currentLyrics = [];
                }
            } else {
                // 尝试查找其他可能的歌词文件
                let found = false;
                for (const [key, lrcFile] of lrcFiles.entries()) {
                    if (key.includes(baseName) || baseName.includes(key)) {
                        try {
                            const text = await readLrcFileWithEncoding(lrcFile);
                            currentLyrics = parseLRC(text);
                            displayLyrics();
                            showToast("找到匹配的歌词文件", "success");
                            found = true;
                            break;
                        } catch (error) {
                            console.error("读取歌词文件失败:", error);
                        }
                    }
                }
                
                if (!found) {
                    loadingLyrics.style.display = 'none';
                    noLyrics.style.display = 'block';
                    lyricsContent.innerHTML = '';
                    currentLyrics = [];
                }
            }
        }
        
        // 显示歌词
        function displayLyrics() {
            lyricsContent.innerHTML = '';
            
            if (currentLyrics.length === 0) {
                noLyrics.style.display = 'block';
                loadingLyrics.style.display = 'none';
                return;
            }
            
            noLyrics.style.display = 'none';
            loadingLyrics.style.display = 'none';
            
            currentLyrics.forEach(lyric => {
                const lyricLine = document.createElement('div');
                lyricLine.className = 'lyric-line';
                // 解码HTML实体
                const decodedText = decodeHtmlEntities(lyric.text);
                lyricLine.textContent = decodedText;
                lyricLine.dataset.time = lyric.time;
                lyricsContent.appendChild(lyricLine);
            });
        }
        
        // 更新歌词高亮
        function updateLyricsHighlight() {
            const currentTime = audio.currentTime;
            const lyricLines = document.querySelectorAll('.lyric-line');
            
            let activeIndex = -1;
            
            for (let i = 0; i < currentLyrics.length; i++) {
                if (currentTime >= currentLyrics[i].time) {
                    activeIndex = i;
                } else {
                    break;
                }
            }
            
            lyricLines.forEach((line, index) => {
                if (index === activeIndex) {
                    line.classList.add('active');
                    
                    // 滚动到活动歌词
                    line.scrollIntoView({
                        behavior: 'smooth',
                        block: 'center'
                    });
                } else {
                    line.classList.remove('active');
                }
            });
        }
        
        // 切换播放模式
        function toggleShuffleMode() {
            shuffleMode = !shuffleMode;
            
            if (shuffleMode) {
                shuffleModeBtn.classList.add('active');
                sequentialModeBtn.classList.remove('active');
                showToast("随机播放模式已开启", "info");
            } else {
                sequentialModeBtn.classList.add('active');
                shuffleModeBtn.classList.remove('active');
                showToast("顺序播放模式已开启", "info");
            }
        }

        function toggleColorMode() {
            colorMode = !colorMode;
            
            if (colorMode) {
                colorModeBtn.style.background = 'var(--primary)';
                colorModeBtn.style.borderColor = 'var(--primary)';
                showToast("取色模式已开启", "info");
                
                // 重新应用当前歌曲的背景
                if (playlist.length > 0) {
                    const song = playlist[currentSongIndex];
                    if (song.metadata.albumArt) {
                        // 重新提取颜色
                        extractColorFromImage(albumArt).then(color => {
                            updateBackground(song.metadata.albumArt, color);
                        });
                    }
                }
            } else {
                colorModeBtn.style.background = '';
                colorModeBtn.style.borderColor = '';
                showToast("取色模式已关闭", "info");
                
                // 恢复高斯模糊背景
                if (playlist.length > 0) {
                    const song = playlist[currentSongIndex];
                    updateBackground(song.metadata.albumArt, null);
                }
            }
        }
        
        // 游戏手柄支持
        function initGamepadSupport() {
            // 监听手柄连接
            window.addEventListener("gamepadconnected", (e) => {
                console.log("游戏手柄已连接: ", e.gamepad.id);
                gamepadConnected = true;
                gamepadIndex = e.gamepad.index;
                showToast("游戏手柄已连接", "success");
            });

            window.addEventListener("gamepaddisconnected", (e) => {
                console.log("游戏手柄已断开: ", e.gamepad.id);
                gamepadConnected = false;
                gamepadIndex = null;
                showToast("游戏手柄已断开", "info");
            });

            // 初始化上一帧按钮状态
            previousGamepadButtons = new Array(16).fill(false);
            
            // 手柄按钮轮询
            function pollGamepad() {
                if (!gamepadConnected || gamepadIndex === null) {
                    requestAnimationFrame(pollGamepad);
                    return;
                }

                const gamepad = navigator.getGamepads()[gamepadIndex];
                if (!gamepad) {
                    requestAnimationFrame(pollGamepad);
                    return;
                }

                // Xbox手柄按钮映射:
                // 0: A, 1: B, 2: X, 3: Y
                // 4: LB, 5: RB, 6: LT, 7: RT
                // 8: View, 9: Menu, 10: LS, 11: RS
                // 12: 上, 13: 下, 14: 左, 15: 右
                
                // 检查A键 (播放/暂停)
                if (gamepad.buttons[0].pressed && !previousGamepadButtons[0]) {
                    playBtn.click();
                }
                
                // 检查B键 (可以分配给其他功能，这里不分配)
                if (gamepad.buttons[1].pressed && !previousGamepadButtons[1]) {
                    // 可以分配功能，比如显示/隐藏歌词
                }
                
                // 检查X键 (顺序播放)
                if (gamepad.buttons[2].pressed && !previousGamepadButtons[2]) {
                    if (shuffleMode) {
                        toggleShuffleMode();
                    }
                }
                
                // 检查Y键 (随机播放)
                if (gamepad.buttons[3].pressed && !previousGamepadButtons[3]) {
                    if (!shuffleMode) {
                        toggleShuffleMode();
                    }
                }
                
                // 检查LB键 (上一曲)
                if (gamepad.buttons[4].pressed && !previousGamepadButtons[4]) {
                    prevBtn.click();
                }
                
                // 检查RB键 (下一曲)
                if (gamepad.buttons[5].pressed && !previousGamepadButtons[5]) {
                    nextBtn.click();
                }
                
                // 检查View键 (可以分配功能，比如切换播放列表)
                if (gamepad.buttons[8].pressed && !previousGamepadButtons[8]) {
                    playlistToggle.click();
                }
                
                // 检查Menu键 (可以分配功能，比如切换取色模式)
                if (gamepad.buttons[9].pressed && !previousGamepadButtons[9]) {
                    toggleColorMode();
                }
                
                // 方向键控制音量
                if (gamepad.buttons[12].pressed) { // 上 - 音量+
                    audio.volume = Math.min(audio.volume + 0.01, 1);
                    volumeSlider.style.width = `${audio.volume * 100}%`;
                }
                
                if (gamepad.buttons[13].pressed) { // 下 - 音量-
                    audio.volume = Math.max(audio.volume - 0.01, 0);
                    volumeSlider.style.width = `${audio.volume * 100}%`;
                }
                
                // 左摇杆控制进度
                if (Math.abs(gamepad.axes[0]) > 0.5) {
                    // 左摇杆水平轴 - 可以用于快进/快退
                }
                
                if (Math.abs(gamepad.axes[1]) > 0.5) {
                    // 左摇杆垂直轴
                }
                
                // 保存当前帧按钮状态
                for (let i = 0; i < gamepad.buttons.length; i++) {
                    previousGamepadButtons[i] = gamepad.buttons[i].pressed;
                }
                
                requestAnimationFrame(pollGamepad);
            }

            pollGamepad();
        }
        
        // 事件监听器
        loadFolderBtn.addEventListener('click', () => {
            folderInput.click();
        });
        
        folderInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            
            if (files.length === 0) {
                showToast("请选择包含音频文件的文件夹", "warning");
                return;
            }
            
            await handleFolder(files);
        });
        
        // 取色模式切换
        colorModeBtn.addEventListener('click', toggleColorMode);
        
        playBtn.addEventListener('click', () => {
            if (playlist.length === 0) {
                showToast("请先选择音乐文件夹", "warning");
                return;
            }
            
            if (isPlaying) {
                audio.pause();
                playBtnIcon.textContent = '▶';
                isPlaying = false;
            } else {
                isPlaying = true;
                playBtnIcon.textContent = '⏸';
                audio.play().catch(e => {
                    console.error("播放失败:", e);
                    showToast("播放失败，请检查音频文件", "error");
                    isPlaying = false;
                    playBtnIcon.textContent = '▶';

                if (!audioContext) {
                    initAudioAnalyzers();
                    drawSpectrum();

            if (playlist.length === 0) return;

            playSong(newIndex, true);

            if (playlist.length === 0) return;
            
            const newIndex = getNextSongIndex();
            playSong(newIndex, true);
        });

        audio.addEventListener('ended', () => {
            const newIndex = getNextSongIndex();
            playSong(newIndex, true);
        });
        
        audio.addEventListener('loadedmetadata', () => {
            totalTimeEl.textContent = formatTime(audio.duration);
        });
        
        audio.addEventListener('error', (e) => {
            console.error("音频播放错误:", e);
            showToast("音频播放失败，尝试下一首", "error");
            const newIndex = getNextSongIndex();
            playSong(newIndex, true);
        });

        document.querySelector('.progress-bar-container').addEventListener('click', (e) => {
            if (!audio.duration || isNaN(audio.duration)) return;
            
            const rect = e.currentTarget.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        });
        
        // 音量控制
        document.querySelector('.volume-slider-container').addEventListener('click', (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const percent = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
            volumeSlider.style.width = `${percent * 100}%`;
            audio.volume = percent;
        });

                '▲' : '▼';
        });

        sequentialModeBtn.addEventListener('click', () => {
            if (!shuffleMode) return;
            toggleShuffleMode();
        });
        
        shuffleModeBtn.addEventListener('click', () => {
            if (shuffleMode) return;
            toggleShuffleMode();
        });
        
        // 窗口大小变化时重新调整可视化
        window.addEventListener('resize', () => {
            if (spectrumCanvas) {
                spectrumCanvas.width = spectrumCanvas.offsetWidth;
                spectrumCanvas.height = spectrumCanvas.offsetHeight;
            }
        });
        
        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            // 防止在输入框中触发快捷键
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            
            switch(e.key) {
                case ' ':
                case 'Spacebar':
                case 'Enter': // 回车键也可以播放/暂停
                    e.preventDefault();
                    playBtn.click();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    prevBtn.click();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    nextBtn.click();
                    break;
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    audio.volume = Math.min(audio.volume + 0.1, 1);
                    volumeSlider.style.width = `${audio.volume * 100}%`;
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    audio.volume = Math.max(audio.volume - 0.1, 0);
                    volumeSlider.style.width = `${audio.volume * 100}%`;
                    break;
                case 'm':
                case 'M':
                    e.preventDefault();
                    audio.volume = audio.volume > 0 ? 0 : 0.7;
                    volumeSlider.style.width = `${audio.volume * 100}%`;
                    break;
                case 'x':
                case 'X':
                    e.preventDefault();
                    if (shuffleMode) {
                        toggleShuffleMode();
                    }
                    break;
                case 'y':
                case 'Y':
                case 'r':
                case 'R':
                    e.preventDefault();
                    if (!shuffleMode) {
                        toggleShuffleMode();
                    }
                    break;
                case 'c':
                case 'C':
                    e.preventDefault();
                    toggleColorMode();
                    break;
                case 'Escape':
                    e.preventDefault();
                    if (playlistSection.classList.contains('show')) {
                        playlistSection.classList.remove('show');
                        playlistIcon.textContent = '▼';
                    }
                    break;
                case 'l':
                case 'L':
                    e.preventDefault();
                    // 切换歌词显示
                    if (lyricsContainer.style.display === 'none') {
                        lyricsContainer.style.display = 'block';
                    } else {
                        lyricsContainer.style.display = 'none';
                    }
                    break;
            }
        });
        
        // 修复歌词容器滚动问题
        // 监听歌词容器的滚轮事件
        lyricsContainer.addEventListener('wheel', (e) => {
            e.stopPropagation(); // 阻止事件冒泡
        }, { passive: true });
        
        // 监听歌词容器的触摸事件
        lyricsContainer.addEventListener('touchmove', (e) => {
            e.stopPropagation(); // 阻止事件冒泡
        }, { passive: true });
        
        // 初始化
        audio.volume = 0.7;
        volumeSlider.style.width = '70%';
        
        // 初始化游戏手柄支持
        initGamepadSupport();
        
        // 检查是否有背景图
        if (customBackgroundImage) {
            updateBackground(customBackgroundImage);
        }
        
        // 显示欢迎消息
        setTimeout(() => {
            showToast("欢迎使用MBolka Player！", "info");
        }, 1000);
        
        // 检查是否支持媒体会话
        if ('mediaSession' in navigator) {
            console.log("支持媒体会话API");
        }
        
        // 检查是否支持Gamepad API
        if ('getGamepads' in navigator) {
            console.log("支持Gamepad API");
        }
