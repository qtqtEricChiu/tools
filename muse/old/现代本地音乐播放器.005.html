<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Player</title>
    <!-- 引入jsmediatags库用于读取音频元数据 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7c3aed;
            --primary-light: #8b5cf6;
            --primary-dark: #5b21b6;
            --secondary: #f472b6;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --warning: #f59e0b;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(124, 58, 237, 0.3); }
            50% { box-shadow: 0 0 30px rgba(124, 58, 237, 0.6); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(244, 114, 182, 0.15) 0%, transparent 50%);
            z-index: -1;
        }

        .player-container {
            width: 100%;
            max-width: 1400px;
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.8s ease-out;
        }

        .player-header {
            padding: 24px 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.4);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideIn 0.6s ease-out;
        }

        .folder-select-container {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .folder-select-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 12px 24px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .folder-select-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.6s;
        }

        .folder-select-btn:hover::before {
            left: 100%;
        }

        .folder-select-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            border-color: var(--primary-light);
        }

        .folder-select-btn:active {
            transform: translateY(0);
        }

        .folder-select-btn i {
            font-size: 18px;
        }

        .folder-input {
            display: none;
        }

        /* 加载进度条样式 */
        .loading-progress-container {
            padding: 0 32px 20px;
            display: none;
        }

        .loading-progress-container.show {
            display: block;
            animation: slideIn 0.5s ease-out;
        }

        .loading-progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .loading-progress-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--light);
        }

        .loading-progress-text {
            font-size: 14px;
            color: var(--gray);
        }

        .loading-progress-bar-container {
            background: rgba(255, 255, 255, 0.08);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .loading-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .loading-progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.3), 
                transparent);
            animation: shimmer 2s infinite;
        }

        .player-content {
            display: flex;
            flex: 1;
            padding: 32px;
            gap: 32px;
            min-height: 600px;
        }

        .album-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }

        .album-art-container {
            width: 340px;
            height: 340px;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            animation: float 6s ease-in-out infinite;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .album-art-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(244, 114, 182, 0.2));
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1;
        }

        .album-art-container:hover::before {
            opacity: 1;
        }

        .album-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .album-art-container:hover .album-art {
            transform: scale(1.05);
        }

        .album-info {
            text-align: center;
            width: 100%;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        .song-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--light) 0%, rgba(255, 255, 255, 0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .song-artist {
            font-size: 20px;
            color: var(--gray);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .song-album {
            font-size: 16px;
            color: var(--gray);
            opacity: 0.9;
        }

        .controls-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 28px;
            justify-content: center;
        }

        .progress-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .progress-bar-container {
            background: rgba(255, 255, 255, 0.08);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            position: relative;
            transition: width 0.1s;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            background: var(--light);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.8);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .progress-bar-container:hover .progress-bar::after {
            opacity: 1;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--gray);
            font-weight: 500;
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .control-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .control-btn:hover::before {
            opacity: 0.2;
        }

        .control-btn:hover {
            transform: translateY(-3px) scale(1.05);
            border-color: var(--primary-light);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .control-btn i {
            position: relative;
            z-index: 1;
            font-size: 20px;
        }

        .play-btn {
            width: 84px;
            height: 84px;
            font-size: 28px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            animation: glow 2s ease-in-out infinite;
        }

        .play-btn::before {
            display: none;
        }

        .play-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 30px rgba(124, 58, 237, 0.4);
        }

        .volume-section {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 24px;
        }

        .volume-slider-container {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            position: relative;
            cursor: pointer;
        }

        .volume-slider {
            position: absolute;
            height: 100%;
            background: linear-gradient(90deg, var(--primary-light), var(--secondary));
            width: 70%;
            border-radius: 4px;
        }

        .lyrics-section {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .lyrics-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lyrics-title {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lyrics-title i {
            color: var(--primary);
        }

        .lyrics-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 24px;
            overflow-y: auto;
            max-height: 420px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
            position: relative;
        }

        .lyrics-container::-webkit-scrollbar {
            width: 6px;
        }

        .lyrics-container::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 3px;
        }

        .lyrics-container::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
        }

        .lyrics-container::-webkit-scrollbar-thumb:hover {
            background: var(--primary-light);
        }

        .lyric-line {
            padding: 14px 0;
            font-size: 18px;
            line-height: 1.6;
            text-align: center;
            opacity: 0.4;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
        }

        .lyric-line.active {
            opacity: 1;
            color: var(--light);
            font-size: 22px;
            font-weight: 600;
            text-shadow: 0 0 20px rgba(124, 58, 237, 0.5);
            transform: scale(1.05);
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--primary-light);
            font-style: italic;
            padding: 40px 0;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .no-lyrics {
            text-align: center;
            color: var(--gray);
            font-style: italic;
            padding: 40px 20px;
        }

        .player-footer {
            padding: 20px 32px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: var(--gray);
            background: rgba(15, 23, 42, 0.4);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-info i {
            color: var(--primary);
        }

        .playlist-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.1);
        }

        .playlist-section.show {
            max-height: 300px;
        }

        .playlist-header {
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.3s;
        }

        .playlist-header:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .playlist-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .playlist-items {
            padding: 0 32px 20px;
            overflow-y: auto;
            max-height: 250px;
        }

        .playlist-item {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .playlist-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(124, 58, 237, 0.1), transparent);
            transition: left 0.6s;
        }

        .playlist-item:hover::before {
            left: 100%;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        .playlist-item.active {
            background: rgba(124, 58, 237, 0.15);
            border-left: 4px solid var(--primary);
        }

        .playlist-item-title {
            font-weight: 500;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .playlist-item-duration {
            font-size: 13px;
            color: var(--gray);
            margin-left: 12px;
        }

        .visualizer {
            width: 100%;
            height: 140px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            margin-top: 24px;
            overflow: hidden;
            position: relative;
        }

        .visualizer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent, rgba(124, 58, 237, 0.1));
            z-index: 1;
        }

        .visualizer canvas {
            width: 100%;
            height: 100%;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transform: translateY(100px) scale(0.9);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
        }

        .toast.show {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .toast i {
            color: var(--primary);
            font-size: 20px;
        }

        /* 播放模式按钮 */
        .play-mode-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .play-mode-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--primary-light);
        }

        .play-mode-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .play-mode-btn.active i {
            color: white;
        }

        .mode-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }

        @media (max-width: 1200px) {
            .player-content {
                flex-direction: column;
            }
            
            .album-section, .controls-section, .lyrics-section {
                width: 100%;
            }
            
            .album-art-container {
                width: 300px;
                height: 300px;
            }
            
            .player-controls {
                gap: 15px;
            }
            
            .control-btn {
                width: 56px;
                height: 56px;
            }
            
            .play-btn {
                width: 72px;
                height: 72px;
            }
        }

        @media (max-width: 768px) {
            .player-header {
                flex-direction: column;
                gap: 20px;
            }
            
            .folder-select-container {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .player-content {
                padding: 24px;
            }
            
            .song-title {
                font-size: 24px;
            }
            
            .mode-controls {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

        // 创建音频元素
        const audio = new Audio();
        audio.crossOrigin = "anonymous";
        
        // 初始化可视化
        function initVisualizer() {
            canvasCtx = visualizerCanvas.getContext('2d');
            visualizerCanvas.width = visualizerCanvas.offsetWidth;
            visualizerCanvas.height = visualizerCanvas.offsetHeight;
            
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            
            analyser.fftSize = 256;
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
        }
        
        // 绘制可视化
        function drawVisualizer() {
            if (!canvasCtx) return;
            
            requestAnimationFrame(drawVisualizer);
            analyser.getByteFrequencyData(dataArray);
            
            canvasCtx.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
            
            const barWidth = (visualizerCanvas.width / bufferLength) * 2.5;
            let barHeight;
            let x = 0;
            
            for(let i = 0; i < bufferLength; i++) {
                barHeight = dataArray[i] / 1.5;
                
                const gradient = canvasCtx.createLinearGradient(0, 0, 0, visualizerCanvas.height);
                gradient.addColorStop(0, '#7c3aed');
                gradient.addColorStop(0.5, '#8b5cf6');
                gradient.addColorStop(1, '#f472b6');
                
                canvasCtx.fillStyle = gradient;
                canvasCtx.fillRect(x, visualizerCanvas.height - barHeight, barWidth, barHeight);
                
                x += barWidth + 1;
            }
        }
        
        // 显示消息
        function showToast(message, type = 'info') {
            const icons = {
                info: '💡',
                success: '✅',
                warning: '⚠️',
                error: '❌'
            };
            
            toast.innerHTML = `
                <i>${icons[type] || icons.info}</i>
                <span>${message}</span>
            `;
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // 格式化时间
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        
        // 更新进度条
        function updateProgress() {
            if (audio.duration && !isNaN(audio.duration)) {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = `${progress}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
                
                // 更新歌词高亮
                updateLyricsHighlight();
            }
        }
        
        // 读取音频文件元数据
        async function extractMetadata(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const arrayBuffer = e.target.result;
                    const blob = new Blob([arrayBuffer]);
                    const url = URL.createObjectURL(blob);
                    
                    // 创建临时音频元素来获取元数据
                    const tempAudio = new Audio();
                    tempAudio.src = url;
                    
                    tempAudio.addEventListener('loadedmetadata', () => {
                        const metadata = {
                            title: file.name.replace(/\.[^/.]+$/, ""),
                            artist: "未知艺术家",
                            album: "未知专辑",
                            duration: tempAudio.duration || 0,
                            url: url,
                            filepath: file.webkitRelativePath || file.name
                        };
                        
                        // 使用jsmediatags库读取元数据
                        if (typeof jsmediatags !== 'undefined') {
                            jsmediatags.read(file, {
                                onSuccess: function(tag) {
                                    if (tag.tags.title) metadata.title = tag.tags.title;
                                    if (tag.tags.artist) metadata.artist = tag.tags.artist;
                                    if (tag.tags.album) metadata.album = tag.tags.album;
                                    if (tag.tags.year) metadata.year = tag.tags.year;
                                    if (tag.tags.genre) metadata.genre = tag.tags.genre;
                                    if (tag.tags.track) metadata.track = tag.tags.track;
                                    
                                    // 提取专辑封面
                                    if (tag.tags.picture) {
                                        const base64String = arrayBufferToBase64(tag.tags.picture.data);
                                        const format = tag.tags.picture.format || 'image/jpeg';
                                        metadata.albumArt = `data:${format};base64,${base64String}`;
                                    }
                                    
                                    resolve(metadata);
                                },
                                onError: function(error) {
                                    console.log("jsmediatags无法读取元数据:", error);
                                    resolve(metadata);
                                }
                            });
                        } else {
                            resolve(metadata);
                        }
                    });
                    
                    tempAudio.addEventListener('error', () => {
                        resolve({
                            title: file.name.replace(/\.[^/.]+$/, ""),
                            artist: "未知艺术家",
                            album: "未知专辑",
                            duration: 0,
                            url: url,
                            filepath: file.webkitRelativePath || file.name
                        });
                    });
                };
                
                reader.readAsArrayBuffer(file);
            });
        }
        
        // ArrayBuffer转Base64
        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return window.btoa(binary);
        }
        
        // 处理文件夹
        async function handleFolder(files) {
            // 清空现有数据
            playlist = [];
            currentSongIndex = 0;
            lrcFiles.clear();
            updatePlaylist();
            
            // 分离音频文件和歌词文件
            audioFiles = [];
            const allLrcFiles = [];
            
            Array.from(files).forEach(file => {
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                if (['.mp3', '.flac', '.wav', '.m4a'].includes(ext)) {
                    audioFiles.push(file);
                } else if (ext === '.lrc') {
                    allLrcFiles.push(file);
                }
            });
            
            if (audioFiles.length === 0) {
                showToast("文件夹中没有找到音频文件", "warning");
                return;
            }
            
            // 建立歌词文件映射
            allLrcFiles.forEach(lrcFile => {
                const baseName = lrcFile.name.replace(/\.lrc$/i, '');
                lrcFiles.set(baseName.toLowerCase(), lrcFile);
            });
            
            // 显示加载进度
            loadingProgressContainer.classList.add('show');
            
            // 分批加载参数
            const batchSize = 20;
            const initialLoadCount = 100;
            const totalFiles = audioFiles.length;
            let loadedFiles = 0;
            
            // 更新进度条
            function updateLoadingProgress(current, total) {
                const progress = (current / total) * 100;
                loadingProgressBar.style.width = `${progress}%`;
                loadingProgressText.textContent = `${current}/${total}`;
            }
            
            showToast(`发现 ${totalFiles} 个音频文件，正在实时加载...`, "info");
            
            // 实时加载前100个文件
            const initialFiles = audioFiles.slice(0, Math.min(initialLoadCount, totalFiles));
            
            for (let i = 0; i < initialFiles.length; i++) {
                try {
                    const metadata = await extractMetadata(initialFiles[i]);
                    playlist.push({
                        file: initialFiles[i],
                        metadata: metadata
                    });
                    loadedFiles++;
                    
                    // 实时更新进度条
                    updateLoadingProgress(loadedFiles, totalFiles);
                    
                    // 每加载10个文件更新一次播放列表
                    if (i % 10 === 0 || i === initialFiles.length - 1) {
                        updatePlaylist();
                    }
                    
                    // 每加载20个文件休息一下，避免阻塞UI
                    if (i % 20 === 0) {
                        await new Promise(resolve => setTimeout(resolve, 0));
                    }
                } catch (error) {
                    console.error(`加载文件失败: ${initialFiles[i].name}`, error);
                }
            }
            
            if (playlist.length > 0) {
                // 排序播放列表
                playlist.sort((a, b) => a.metadata.title.localeCompare(b.metadata.title));
                
                // 播放第一首歌
                playSong(0, true);
                
                // 更新播放列表UI
                updatePlaylist();
                
                showToast(`已实时加载 ${playlist.length} 首歌曲，开始播放`, "success");
                
                // 后台加载剩余文件
                if (totalFiles > initialLoadCount) {
                    isBackgroundLoading = true;
                    const remainingFiles = audioFiles.slice(initialLoadCount);
                    let batchCount = 0;
                    
                    for (let i = 0; i < remainingFiles.length; i += batchSize) {
                        const batch = remainingFiles.slice(i, i + batchSize);
                        batchCount++;
                        
                        for (const file of batch) {
                            try {
                                const metadata = await extractMetadata(file);
                                playlist.push({
                                    file: file,
                                    metadata: metadata
                                });
                                loadedFiles++;
                                updateLoadingProgress(loadedFiles, totalFiles);
                            } catch (error) {
                                console.error(`后台加载文件失败: ${file.name}`, error);
                            }
                        }
                        
                        // 每加载100个文件提示一次
                        if (loadedFiles % 100 === 0 || loadedFiles === totalFiles) {
                            showToast(`已加载 ${loadedFiles}/${totalFiles} 个文件`, "info");
                        }
                        
                        // 批量添加后重新排序
                        playlist.sort((a, b) => a.metadata.title.localeCompare(b.metadata.title));
                        
                        // 每批加载后更新播放列表
                        updatePlaylist();
                        
                        // 每批加载后休息
                        await new Promise(resolve => setTimeout(resolve, 100));
                    }
                    
                    isBackgroundLoading = false;
                }
                
                loadingProgressContainer.classList.remove('show');
                showToast(`全部 ${playlist.length} 首歌曲加载完成`, "success");
            } else {
                loadingProgressContainer.classList.remove('show');
                showToast("无法加载任何音频文件", "error");
            }
        }
        
        // 播放指定索引的歌曲

        // 更新播放列表
        function updatePlaylist() {
            playlistItems.innerHTML = '';
            
            playlist.forEach((song, index) => {

        // 获取下一首歌曲的索引
        function getNextSongIndex() {
            if (playlist.length === 0) return 0;
            
            if (shuffleMode) {
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * playlist.length);
                } while (randomIndex === currentSongIndex && playlist.length > 1);
                return randomIndex;
            } else {
                return (currentSongIndex + 1) % playlist.length;
            }
        }
        
        // 获取上一首歌曲的索引
        function getPrevSongIndex() {
            if (playlist.length === 0) return 0;
            
            if (shuffleMode) {
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * playlist.length);
                } while (randomIndex === currentSongIndex && playlist.length > 1);
                return randomIndex;
            } else {
                return (currentSongIndex - 1 + playlist.length) % playlist.length;
            }
        }
        
        // 解析LRC歌词
        function parseLRC(lrcText) {
            const lines = lrcText.split('\n');
            const lyrics = [];
            
            lines.forEach(line => {
                const timeMatches = line.match(/\[(\d{2}):(\d{2})(?:\.(\d{2,3}))?\]/g);
                
                if (timeMatches) {
                    const text = line.replace(/\[.*?\]/g, '').trim();
                    
                    if (text) {
                        timeMatches.forEach(timeMatch => {
                            const timeParts = timeMatch.match(/\[(\d{2}):(\d{2})(?:\.(\d{2,3}))?\]/);
                            if (timeParts) {
                                const minutes = parseInt(timeParts[1]);
                                const seconds = parseInt(timeParts[2]);
                                const milliseconds = timeParts[3] ? parseInt(timeParts[3].length === 3 ? timeParts[3] : timeParts[3] * 10) : 0;
                                const time = minutes * 60 + seconds + milliseconds / 1000;
                                
                                lyrics.push({
                                    time: time,
                                    text: text
                                });
                            }
                        });
                    }
                }
            });
            
            lyrics.sort((a, b) => a.time - b.time);
            return lyrics;
        }
        
        // 尝试多种编码读取歌词文件
        async function readLrcFileWithEncoding(lrcFile) {
            const encodings = ['utf-8', 'gbk', 'gb2312', 'big5', 'utf-16'];
            
            for (const encoding of encodings) {
                try {
                    const text = await readFileAsText(lrcFile, encoding);
                    // 检查文本是否包含乱码（常见的中文字符）
                    const chineseChars = text.match(/[\u4e00-\u9fa5]/g);
                    if (chineseChars && chineseChars.length > 5) {
                        return text; // 包含足够的中文字符，可能是正确的编码
                    }
                    // 如果没有中文字符，检查是否有歌词时间标签
                    if (text.match(/\[\d{2}:\d{2}/)) {
                        return text;
                    }
                } catch (e) {
                    // 尝试下一个编码
                    continue;
                }
            }
            
            // 如果所有编码都失败，尝试使用默认UTF-8
            return await readFileAsText(lrcFile, 'utf-8');
        }
        
        // 读取文件为文本（支持编码）
        function readFileAsText(file, encoding = 'utf-8') {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    // 如果指定了编码，尝试使用TextDecoder
                    if (encoding !== 'utf-8') {
                        try {
                            const decoder = new TextDecoder(encoding);
                            const arrayBuffer = e.target.result;
                            const text = decoder.decode(arrayBuffer);
                            resolve(text);
                        } catch (error) {
                            // 如果TextDecoder失败，使用原始结果
                            resolve(e.target.result);
                        }
                    } else {
                        resolve(e.target.result);
                    }
                };
                reader.onerror = (e) => reject(e);
                reader.readAsArrayBuffer(file);
            });
        }
        
        // 加载歌词
        async function loadLyrics(song) {
            const baseName = song.file.name.replace(/\.[^/.]+$/, "").toLowerCase();
            
            // 查找同名LRC文件
            if (lrcFiles.has(baseName)) {
                const lrcFile = lrcFiles.get(baseName);
                try {
                    const text = await readLrcFileWithEncoding(lrcFile);
                    currentLyrics = parseLRC(text);
                    displayLyrics();
                    showToast("从本地文件加载歌词", "success");
                } catch (error) {
                    console.error("读取歌词文件失败:", error);
                    loadingLyrics.style.display = 'none';
                    noLyrics.style.display = 'block';
                    lyricsContent.innerHTML = '';
                    currentLyrics = [];
                }
            } else {
                // 尝试查找其他可能的歌词文件
                let found = false;
                for (const [key, lrcFile] of lrcFiles.entries()) {
                    if (key.includes(baseName) || baseName.includes(key)) {
                        try {
                            const text = await readLrcFileWithEncoding(lrcFile);
                            currentLyrics = parseLRC(text);
                            displayLyrics();
                            showToast("找到匹配的歌词文件", "success");
                            found = true;
                            break;
                        } catch (error) {
                            console.error("读取歌词文件失败:", error);
                        }
                    }
                }
                
                if (!found) {
                    loadingLyrics.style.display = 'none';
                    noLyrics.style.display = 'block';
                    lyricsContent.innerHTML = '';
                    currentLyrics = [];
                }
            }
        }
        
        // 显示歌词
        function displayLyrics() {
            lyricsContent.innerHTML = '';
            
            if (currentLyrics.length === 0) {
                noLyrics.style.display = 'block';
                loadingLyrics.style.display = 'none';
                return;
            }
            
            noLyrics.style.display = 'none';
            loadingLyrics.style.display = 'none';
            
            currentLyrics.forEach(lyric => {
                const lyricLine = document.createElement('div');
                lyricLine.className = 'lyric-line';
                lyricLine.textContent = lyric.text;
                lyricLine.dataset.time = lyric.time;
                lyricsContent.appendChild(lyricLine);
            });
        }
        
        // 更新歌词高亮
        function updateLyricsHighlight() {
            const currentTime = audio.currentTime;
            const lyricLines = document.querySelectorAll('.lyric-line');
            
            let activeIndex = -1;
            
            for (let i = 0; i < currentLyrics.length; i++) {
                if (currentTime >= currentLyrics[i].time) {
                    activeIndex = i;
                } else {
                    break;
                }
            }
            
            lyricLines.forEach((line, index) => {
                if (index === activeIndex) {
                    line.classList.add('active');
                    
                    // 滚动到活动歌词
                    line.scrollIntoView({
                        behavior: 'smooth',
                        block: 'center'
                    });
                } else {
                    line.classList.remove('active');
                }
            });
        }
        
        // 切换播放模式
        function toggleShuffleMode() {
            shuffleMode = !shuffleMode;
            
            if (shuffleMode) {
                shuffleModeBtn.classList.add('active');
                sequentialModeBtn.classList.remove('active');
                showToast("随机播放模式已开启", "info");
            } else {
                sequentialModeBtn.classList.add('active');
                shuffleModeBtn.classList.remove('active');
                showToast("顺序播放模式已开启", "info");
            }
        }
        
        // 事件监听器
        folderInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            
            if (files.length === 0) {
                showToast("请选择包含音频文件的文件夹", "warning");
                return;
            }
            
            await handleFolder(files);
        });
        
        playBtn.addEventListener('click', () => {
            if (playlist.length === 0) {
                showToast("请先选择音乐文件夹", "warning");
                return;
            }
            
            if (isPlaying) {
                audio.pause();
                playBtnIcon.textContent = '▶';
                isPlaying = false;
            } else {
                isPlaying = true;
                playBtnIcon.textContent = '⏸';
                audio.play().catch(e => {
                    console.error("播放失败:", e);
                    showToast("播放失败，请检查音频文件", "error");
                    isPlaying = false;
                    playBtnIcon.textContent = '▶';
                });
                
                if (!audioContext) {
                    initVisualizer();
                    drawVisualizer();
                }
            }
        });
        
        prevBtn.addEventListener('click', () => {
            if (playlist.length === 0) return;
            
            const newIndex = getPrevSongIndex();
            playSong(newIndex, true);
        });
        
        nextBtn.addEventListener('click', () => {
            if (playlist.length === 0) return;
            
            const newIndex = getNextSongIndex();
            playSong(newIndex, true);
        });
        
        audio.addEventListener('timeupdate', updateProgress);
        
        audio.addEventListener('ended', () => {
            const newIndex = getNextSongIndex();
            playSong(newIndex, true);
        });
        
        audio.addEventListener('loadedmetadata', () => {
            totalTimeEl.textContent = formatTime(audio.duration);
        });
        
        audio.addEventListener('error', (e) => {
            console.error("音频播放错误:", e);
            showToast("音频播放失败，尝试下一首", "error");
            const newIndex = getNextSongIndex();
            playSong(newIndex, true);
        });
        
        // 进度条点击
        document.querySelector('.progress-bar-container').addEventListener('click', (e) => {
            if (!audio.duration || isNaN(audio.duration)) return;
            
            const rect = e.currentTarget.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        });
        
        // 音量控制
        document.querySelector('.volume-slider-container').addEventListener('click', (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const percent = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
            volumeSlider.style.width = `${percent * 100}%`;
            audio.volume = percent;
        });
        
        // 播放列表切换
        playlistToggle.addEventListener('click', () => {
            playlistSection.classList.toggle('show');
            playlistIcon.textContent = playlistSection.classList.contains('show') ? 
                '▲' : '▼';
        });
        
        // 播放模式切换
        sequentialModeBtn.addEventListener('click', () => {
            if (!shuffleMode) return;
            toggleShuffleMode();
        });
        
        shuffleModeBtn.addEventListener('click', () => {
            if (shuffleMode) return;
            toggleShuffleMode();
        });
        
        // 窗口大小变化时重新调整可视化
        window.addEventListener('resize', () => {
            if (visualizerCanvas) {
                visualizerCanvas.width = visualizerCanvas.offsetWidth;
                visualizerCanvas.height = visualizerCanvas.offsetHeight;
            }
        });
        
        // 初始化
        audio.volume = 0.7;
        showToast("欢迎使用Nexus音乐播放器！请点击打开音乐文件夹开始播放。", "info");
    </script>
</body>
</html>
