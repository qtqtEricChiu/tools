<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MBolka Player - Ultimate</title>
    <!-- jsmediatags: 提取音频元数据 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        /* ================= 核心变量与重置 ================= */
        :root {
            --primary: #9ac8e2;
            --primary-light: #b4d6ea;
            --bg-dark: #0a0a1a;
            --bg-dark-light: #1a1a2e;
            --text-main: #f0f8ff;
            --text-sub: #8a8aa0;
            --glass-bg: rgba(26, 26, 46, 0.45);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            --bg-blur: 40px;
            --curve-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --curve-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* 采用附件014的优秀字体栈 */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Segoe UI Emoji', 'Segoe UI Symbol', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-dark-light) 50%, var(--bg-dark) 100%);
            -webkit-font-smoothing: antialiased;
        }

        /* 现代滚动条 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* ================= 高级动画效果 ================= */
        @keyframes appFadeIn {
            from { opacity: 0; transform: translateY(25px) scale(0.96); filter: blur(12px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        @keyframes floatArt {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-8px) rotate(1.5deg); box-shadow: 0 30px 50px rgba(0,0,0,0.4); }
            75% { transform: translateY(6px) rotate(-1.5deg); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        }
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(0,0,0,0.3); }
            50% { box-shadow: 0 0 35px var(--primary), 0 0 15px rgba(0,0,0,0.4); }
        }
        @keyframes shimmerBar {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ================= 动态背景层 ================= */
        #bg-layer-img, #bg-layer-color {
            position: fixed; top: -5%; left: -5%; right: -5%; bottom: -5%;
            z-index: -2; opacity: 0; pointer-events: none;
            transition: opacity 1.2s var(--curve-smooth), background 1.2s var(--curve-smooth);
        }
        #bg-layer-img {
            background-size: cover; background-position: center;
            filter: blur(var(--bg-blur)) brightness(0.6) saturate(1.2);
            transform: scale(1.05);
        }
        #bg-layer-color {
            background: linear-gradient(135deg, var(--primary) 0%, var(--bg-dark) 100%);
        }
        #bg-layer-img.active, #bg-layer-color.active { opacity: 1; }

        /* ================= 播放器主体结构 ================= */
        .player-wrapper {
            width: 96vw; max-width: 1400px; height: 92vh;
            background: var(--glass-bg);
            backdrop-filter: blur(35px) saturate(180%);
            -webkit-backdrop-filter: blur(35px) saturate(180%);
            border-radius: 32px;
            border: var(--glass-border);
            box-shadow: var(--glass-shadow);
            display: flex; flex-direction: column;
            animation: appFadeIn 1s var(--curve-spring) both;
            overflow: hidden;
        }

        /* 头部栏 */
        .header {
            padding: 24px 36px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(10, 10, 26, 0.2);
        }
        .brand { font-size: 24px; font-weight: 800; display: flex; gap: 10px; align-items: center; letter-spacing: -0.5px;}
        .brand i { color: var(--primary); transition: color 0.5s; }
        
        .nav-actions { display: flex; gap: 14px; }
        .btn-glass {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main); padding: 10px 20px; border-radius: 14px;
            cursor: pointer; font-weight: 500; font-size: 14px;
            transition: all 0.3s var(--curve-smooth);
            display: flex; align-items: center; gap: 8px;
        }
        .btn-glass:hover { background: rgba(255,255,255,0.12); transform: translateY(-2px); border-color: var(--primary); }

        /* 加载进度 */
        .load-strip-container { height: 4px; background: rgba(255,255,255,0.05); width: 100%; display: none; position: relative; overflow: hidden;}
        .load-strip-container.show { display: block; }
        .load-strip { height: 100%; width: 0%; background: var(--primary); position: relative; transition: width 0.2s; }
        .load-strip::after {
            content: ''; position: absolute; top:0; left:0; bottom:0; right:0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmerBar 1.5s infinite;
        }

        /* 三列主内容区 */
        .content-grid {
            display: flex; flex: 1; padding: 32px 40px; gap: 40px; overflow: hidden;
        }

        /* 1. 专辑与信息列 */
        .col-album { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px; }
        .art-box {
            width: 340px; height: 340px; border-radius: 28px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            animation: floatArt 8s ease-in-out infinite;
        }
        .art-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s var(--curve-smooth); }
        .art-box:hover .art-img { transform: scale(1.06); }
        
        .track-info { text-align: center; width: 100%; }
        .track-title { font-size: 32px; font-weight: 800; margin-bottom: 8px; line-height: 1.2; text-shadow: 0 4px 12px rgba(0,0,0,0.3); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
        .track-artist { font-size: 18px; color: var(--text-sub); font-weight: 500; }

        /* 2. 控制核心列 */
        .col-controls { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 32px; }
        
        .vis-canvas { width: 100%; height: 70px; background: rgba(0,0,0,0.2); border-radius: 16px; margin-bottom: -10px; }
        
        .progress-area { width: 100%; cursor: pointer; padding: 10px 0; }
        .prog-bg { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; position: relative; }
        .prog-fill { height: 100%; width: 0%; background: var(--primary); border-radius: 3px; position: relative; transition: background 0.5s; }
        .prog-fill::after {
            content: ''; position: absolute; right: -6px; top: 50%; transform: translateY(-50%) scale(0);
            width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: transform 0.2s var(--curve-spring); box-shadow: 0 0 10px var(--primary);
        }
        .progress-area:hover .prog-fill::after { transform: translateY(-50%) scale(1); }
        .time-labels { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-sub); margin-top: 8px; font-weight: 500; }

        .btn-group-main { display: flex; justify-content: center; align-items: center; gap: 24px; }
        .btn-ctrl {
            width: 60px; height: 60px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04); color: #fff; font-size: 20px; cursor: pointer;
            transition: all 0.3s var(--curve-spring); display: flex; justify-content: center; align-items: center;
        }
        .btn-ctrl:hover { background: rgba(255,255,255,0.12); transform: scale(1.08); border-color: var(--primary); color: var(--primary); }
        .btn-play {
            width: 84px; height: 84px; font-size: 32px; border: none;
            background: var(--primary); color: #000;
            animation: glowPulse 3s infinite;
        }
        .btn-play:hover { transform: scale(1.08); filter: brightness(1.1); color: #000; }

        .btn-group-sub { display: flex; justify-content: space-between; align-items: center; }
        .mode-toggles { display: flex; gap: 12px; }
        .btn-mode { width: 46px; height: 46px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #fff; cursor: pointer; transition: 0.3s; }
        .btn-mode.active { background: var(--primary); color: #000; border-color: var(--primary); }
        
        .vol-control { display: flex; align-items: center; gap: 12px; flex: 1; margin-left: 24px; background: rgba(0,0,0,0.2); padding: 12px 18px; border-radius: 16px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--primary); margin-top: -5px; cursor: pointer; transition: background 0.5s; box-shadow: 0 2px 5px rgba(0,0,0,0.5);}

        /* 3. 歌词列 (精细化居中) */
        .col-lyrics {
            flex: 1.2; background: rgba(0,0,0,0.15); border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; position: relative;
            /* 顶部底部渐隐效果 */
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
        }
        .lrc-viewport {
            flex: 1; overflow-y: auto; text-align: center;
            /* 关键：使用大内边距确保首尾歌词能滚动到正中心 */
            padding: 50% 20px; 
            scroll-behavior: smooth;
        }
        .lrc-line {
            font-size: 18px; line-height: 2.2; color: rgba(255,255,255,0.35);
            transition: all 0.4s var(--curve-spring); transform-origin: center;
            min-height: 40px; cursor: pointer;
        }
        .lrc-line:hover { color: rgba(255,255,255,0.8); }
        .lrc-line.active {
            color: #fff; font-size: 26px; font-weight: 700;
            text-shadow: 0 0 20px rgba(154,200,226,0.6); transform: scale(1.05);
        }

        /* 抽屉面板 (设置) */
        .drawer {
            position: fixed; top: 0; right: -420px; width: 400px; height: 100vh;
            background: rgba(15, 20, 30, 0.9); backdrop-filter: blur(40px);
            border-left: 1px solid rgba(255,255,255,0.1); padding: 32px;
            transition: right 0.4s var(--curve-spring); z-index: 100;
            display: flex; flex-direction: column; gap: 24px; overflow-y: auto;
        }
        .drawer.open { right: 0; box-shadow: -20px 0 50px rgba(0,0,0,0.5); }
        .drawer-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .drawer-title { font-size: 15px; color: var(--text-sub); margin-bottom: 14px; font-weight: 600; }
        
        .hotkey-grid { display: grid; grid-template-columns: auto 1fr; gap: 10px; font-size: 13px; color: var(--text-sub); line-height: 1.6; }
        .hotkey-grid kbd { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; color: #fff; border-bottom: 2px solid rgba(0,0,0,0.3); font-family: monospace;}

        /* Toast 提示 */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 50px);
            background: rgba(20,25,40,0.95); color: #fff; border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 28px; border-radius: 30px; font-weight: 500; font-size: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            opacity: 0; transition: all 0.4s var(--curve-spring); z-index: 1000; display: flex; align-items: center; gap: 10px;
        }
        .toast.show { transform: translate(-50%, 0); opacity: 1; }

        input[type="file"] { display: none; }

        @media (max-width: 1024px) {
            .content-grid { flex-direction: column; overflow-y: auto; padding: 20px; }
            .col-lyrics { min-height: 400px; mask-image: none; -webkit-mask-image: none;}
            .player-wrapper { width: 100vw; height: 100vh; border-radius: 0; border: none; }
        }
    </style>
</head>
<body>

    <!-- 动态背景层 -->
    <div id="bg-layer-img"></div>
    <div id="bg-layer-color"></div>

    <!-- 播放器主体 -->
    <div class="player-wrapper">
        <div class="header">
            <div class="brand"><i id="logoIcon">♪</i> MBolka Player</div>
            <div class="nav-actions">
                <button class="btn-glass" id="btnToggleLrc"><i>📝</i> 歌词</button>
                <button class="btn-glass" id="btnSettings"><i>⚙️</i> 设置</button>
                <button class="btn-glass" id="btnLoadFolder" style="background: var(--primary); color: #000; border:none;"><i>📁</i> 选择音乐夹</button>
                <input type="file" id="folderInput" webkitdirectory directory multiple>
            </div>
        </div>

        <div class="load-strip-container" id="loadWrap">
            <div class="load-strip" id="loadBar"></div>
        </div>

        <div class="content-grid">
            <!-- 左侧：专辑 -->
            <div class="col-album">
                <div class="art-box">
                    <img id="albumArt" class="art-img" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzQwIiBoZWlnaHQ9IjM0MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMWExYTJlIi8+PC9zdmc+">
                </div>
                <div class="track-info">
                    <div class="track-title" id="songTitle">MBolka Player</div>
                    <div class="track-artist" id="songArtist">等待载入音乐...</div>
                </div>
            </div>

            <!-- 中部：控制 -->
            <div class="col-controls">
                <canvas class="vis-canvas" id="spectrumCanvas"></canvas>

                <div>
                    <div class="progress-area" id="progArea">
                        <div class="prog-bg"><div class="prog-fill" id="progFill"></div></div>
                    </div>
                    <div class="time-labels">
                        <span id="timeCur">0:00</span>
                        <span id="timeTot">0:00</span>
                    </div>
                </div>

                <div class="btn-group-main">
                    <button class="btn-ctrl" id="btnPrev">⏮</button>
                    <button class="btn-ctrl btn-play" id="btnPlay">▶</button>
                    <button class="btn-ctrl" id="btnNext">⏭</button>
                </div>

                <div class="btn-group-sub">
                    <div class="mode-toggles">
                        <button class="btn-mode active" id="btnSeq" title="顺序播放">⇄</button>
                        <button class="btn-mode" id="btnRnd" title="随机播放">🔀</button>
                    </div>
                    <div class="vol-control">
                        <span>🔊</span>
                        <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.7">
                    </div>
                </div>
            </div>

            <!-- 右侧：歌词 -->
            <div class="col-lyrics" id="lrcPanel">
                <div class="lrc-viewport" id="lrcViewport">
                    <div class="lrc-line" style="opacity: 0.5;">请载入音乐开始播放</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 设置抽屉 -->
    <div class="drawer" id="settingsDrawer">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h2 style="font-size: 20px;">系统设置</h2>
            <button class="btn-glass" id="btnCloseSettings" style="padding: 6px 12px;">关闭</button>
        </div>

        <div class="drawer-box">
            <div class="drawer-title">UI 视觉引擎</div>
            <button class="btn-glass" id="btnToggleColorMode" style="width: 100%; justify-content: center; margin-bottom: 15px;">开启取色模式 (UI跟随变色)</button>
            <div style="font-size: 13px; color: var(--text-sub); margin-bottom: 8px;">背景模糊强度: <span id="blurVal">40px</span></div>
            <input type="range" id="blurSlider" min="0" max="100" value="40">
        </div>

        <div class="drawer-box">
            <div class="drawer-title">自定义背景壁纸</div>
            <button class="btn-glass" id="btnSetBg" style="width: 100%; justify-content: center; margin-bottom: 10px;">上传本地图片</button>
            <button class="btn-glass" id="btnClearBg" style="width: 100%; justify-content: center; color: #ff6b6b; border-color: rgba(255,107,107,0.3);">恢复默认背景</button>
            <input type="file" id="bgInput" accept="image/*">
        </div>

        <div class="drawer-box">
            <div class="drawer-title">快捷键与外设支持</div>
            <div class="hotkey-grid">
                <span><kbd>空格</kbd> / <kbd>Enter</kbd></span> <span>播放 / 暂停</span>
                <span><kbd>←</kbd> / <kbd>→</kbd></span> <span>上一曲 / 下一曲</span>
                <span><kbd>↑</kbd> / <kbd>↓</kbd></span> <span>增减音量</span>
                <span><kbd>S</kbd> / <kbd>R</kbd></span> <span>顺序 / 随机模式</span>
                <span><kbd>L</kbd></span> <span>显隐歌词面板</span>
            </div>
            <div style="margin-top: 15px; font-size: 12px; color: var(--primary); padding-top: 10px; border-top: 1px dashed rgba(255,255,255,0.1);">
                <i id="gamepadStatus">⌨️ 自动检测 Xbox/PS 游戏手柄接入...</i><br>
                (按键: A播放 LB/RB切歌 X/Y模式 十字键音量)
            </div>
        </div>
    </div>

    <!-- 提示框 -->
    <div class="toast" id="toastMsg"></div>

    <script>
        /**
         * 全局状态管理
         */
        const audio = new Audio();
        audio.crossOrigin = "anonymous";
        let audioCtx, analyser, source, dataArray, spectrumCtx;
        
        let playlist = [];
        let lrcMap = new Map();
        let currentIndex = -1;
        let isPlaying = false;
        let isShuffle = false;
        let parsedLyrics = [];
        let playHistory = [];

        // 歌词滚动打断判定锁
        let isUserScrollingLyrics = false;
        let lyricsScrollTimeout = null;

        // 手柄状态
        let gamepadConnected = false;
        let prevPadBtns = [];

        // 背景/UI引擎配置
        let cfg = {
            colorMode: false,
            customBgImg: null,
            customBgColor: null,
            blurAmt: 40,
            defaultColor: '#9ac8e2'
        };
        let currentAlbumColor = null; 
        let hasCurrentAlbumArt = false;

        // DOM 引用
        const el = {
            folderIn: document.getElementById('folderInput'),
            btnLoad: document.getElementById('btnLoadFolder'),
            btnPlay: document.getElementById('btnPlay'),
            btnPrev: document.getElementById('btnPrev'),
            btnNext: document.getElementById('btnNext'),
            progArea: document.getElementById('progArea'),
            progFill: document.getElementById('progFill'),
            timeCur: document.getElementById('timeCur'),
            timeTot: document.getElementById('timeTot'),
            volSlider: document.getElementById('volSlider'),
            title: document.getElementById('songTitle'),
            artist: document.getElementById('songArtist'),
            artImg: document.getElementById('albumArt'),
            lrcView: document.getElementById('lrcViewport'),
            lrcPanel: document.getElementById('lrcPanel'),
            btnToggleLrc: document.getElementById('btnToggleLrc'),
            bgImg: document.getElementById('bg-layer-img'),
            bgColor: document.getElementById('bg-layer-color'),
            toast: document.getElementById('toastMsg'),
            loadBar: document.getElementById('loadBar'),
            loadWrap: document.getElementById('loadWrap'),
            btnSeq: document.getElementById('btnSeq'),
            btnRnd: document.getElementById('btnRnd'),
            padStatus: document.getElementById('gamepadStatus')
        };

        // ================= 工具函数 =================

        const showToast = (msg) => {
            el.toast.innerHTML = msg;
            el.toast.classList.add('show');
            setTimeout(() => el.toast.classList.remove('show'), 2500);
        };

        const formatTime = (sec) => {
            if (!sec || isNaN(sec)) return '0:00';
            const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        };

        // 终极解码器 (HTML Entities + Unicode)
        const decodeText = (str) => {
            if (!str) return '';
            let s = str.replace(/\\u([0-9a-fA-F]{4})/g, (m, g) => String.fromCharCode(parseInt(g, 16)));
            const txt = document.createElement("textarea");
            txt.innerHTML = s;
            return txt.value;
        };

        // Canvas 高效提取主色调
        const extractColor = (imgSrc) => {
            return new Promise((resolve) => {
                if (!imgSrc || imgSrc.startsWith('data:image/svg')) return resolve(null);
                const img = new Image();
                img.onload = () => {
                    const cvs = document.createElement('canvas');
                    cvs.width = 32; cvs.height = 32;
                    const ctx = cvs.getContext('2d', { willReadFrequently: true });
                    ctx.drawImage(img, 0, 0, 32, 32);
                    try {
                        const data = ctx.getImageData(0, 0, 32, 32).data;
                        let r=0, g=0, b=0, count=0;
                        for(let i=0; i<data.length; i+=16) {
                            if(data[i]>20 && data[i]<235) { // 剔除极值
                                r+=data[i]; g+=data[i+1]; b+=data[i+2]; count++;
                            }
                        }
                        resolve(count > 0 ? `rgb(${~~(r/count)},${~~(g/count)},${~~(b/count)})` : null);
                    } catch(e) { resolve(null); }
                };
                img.onerror = () => resolve(null);
                img.src = imgSrc;
            });
        };

        // ================= 核心背景状态机 =================
        const applyThemeLogic = () => {
            let targetColor = cfg.defaultColor;
            let showImg = false, showColor = false, bgUrl = '';

            document.documentElement.style.setProperty('--bg-blur', `${cfg.blurAmt}px`);

            if (cfg.colorMode) {
                showColor = true;
                targetColor = cfg.customBgImg ? (cfg.customBgColor || targetColor) : (currentAlbumColor || targetColor);
                // 更新UI控件变色
                document.documentElement.style.setProperty('--primary', targetColor);
            } else {
                document.documentElement.style.setProperty('--primary', cfg.defaultColor);
                if (cfg.customBgImg) {
                    showImg = true;
                    bgUrl = hasCurrentAlbumArt ? el.artImg.src : cfg.customBgImg;
                } else {
                    if (hasCurrentAlbumArt) { showImg = true; bgUrl = el.artImg.src; }
                    else { showColor = true; targetColor = cfg.defaultColor; }
                }
            }
            
            if (showImg) {
                el.bgImg.style.backgroundImage = `url(${bgUrl})`;
                el.bgImg.classList.add('active'); el.bgColor.classList.remove('active');
            } else if (showColor) {
                el.bgColor.style.background = `linear-gradient(135deg, ${targetColor} 0%, var(--bg-dark) 100%)`;
                el.bgColor.classList.add('active'); el.bgImg.classList.remove('active');
            }
        };

        // ================= 文件极速解析 =================
        const parseMetadata = (file) => {
            return new Promise(resolve => {
                const url = URL.createObjectURL(file);
                const meta = { title: file.name.replace(/\.[^/.]+$/, ""), artist: "未知", url, file };
                
                if (window.jsmediatags) {
                    jsmediatags.read(file, {
                        onSuccess: tag => {
                            if(tag.tags.title) meta.title = decodeText(tag.tags.title);
                            if(tag.tags.artist) meta.artist = decodeText(tag.tags.artist);
                            if(tag.tags.picture) {
                                let b64 = '';
                                const d = tag.tags.picture.data;
                                for(let i=0; i<d.length; i++) b64 += String.fromCharCode(d[i]);
                                meta.art = `data:${tag.tags.picture.format};base64,${window.btoa(b64)}`;
                            }
                            resolve(meta);
                        },
                        onError: () => resolve(meta)
                    });
                } else resolve(meta);
            });
        };

        el.folderIn.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            
            playlist = []; lrcMap.clear(); const audios = [];
            files.forEach(f => {
                const ext = f.name.slice(f.name.lastIndexOf('.')).toLowerCase();
                if (['.mp3','.flac','.wav','.m4a'].includes(ext)) audios.push(f);
                else if (ext === '.lrc') lrcMap.set(f.name.replace('.lrc','').toLowerCase(), f);
            });

            if (!audios.length) return showToast("⚠️ 未发现音频文件");
            
            el.loadWrap.classList.add('show');
            const initLen = Math.min(20, audios.length);
            
            // 首批同步加载保证立刻可播
            for(let i=0; i<initLen; i++) {
                playlist.push(await parseMetadata(audios[i]));
                el.loadBar.style.width = `${((i+1)/audios.length)*100}%`;
            }

            showToast(`🚀 首批 ${initLen} 首就绪，随机开播`);
            isShuffle = true; updateModeUI();
            await playAudio(Math.floor(Math.random() * playlist.length));

            // 剩余异步加载
            if (audios.length > initLen) {
                let curr = initLen;
                const parseChunk = async () => {
                    const end = Math.min(curr + 10, audios.length);
                    for(let i = curr; i < end; i++) playlist.push(await parseMetadata(audios[i]));
                    curr = end;
                    el.loadBar.style.width = `${(curr/audios.length)*100}%`;
                    if (curr < audios.length) requestAnimationFrame(parseChunk);
                    else { setTimeout(()=> el.loadWrap.classList.remove('show'), 1000); showToast(`✅ 全库 ${audios.length} 首加载完毕`); }
                };
                requestAnimationFrame(parseChunk);
            } else {
                setTimeout(()=> el.loadWrap.classList.remove('show'), 500);
            }
        });

        // ================= 歌词解析与精细化居中 =================
        const loadLrc = async (song) => {
            parsedLyrics = []; el.lrcView.innerHTML = '';
            
            const base = song.file.name.replace(/\.[^/.]+$/, "").toLowerCase();
            let file = lrcMap.get(base);
            if(!file) { // 模糊匹配
                for (let [k, v] of lrcMap.entries()) { if (k.includes(base) || base.includes(k)) { file = v; break; } }
            }

            if (!file) {
                el.lrcView.innerHTML = '<div class="lrc-line" style="opacity:0.5;">纯音乐，请欣赏</div>';
                return;
            }

            const text = await new Promise(resolve => {
                const r = new FileReader();
                r.onload = e => {
                    try { resolve(new TextDecoder('utf-8', {fatal: true}).decode(e.target.result)); }
                    catch { const r2=new FileReader(); r2.onload=ev=>resolve(ev.target.result); r2.readAsText(file, 'gbk'); }
                };
                r.readAsArrayBuffer(file);
            });

            text.split(/\r?\n/).forEach(line => {
                const times = line.match(/\[\d{2}:\d{2}(\.\d{2,3})?\]/g);
                if (times) {
                    const txt = decodeText(line.replace(/\[.*?\]/g, '').trim());
                    if (txt) {
                        times.forEach(t => {
                            const match = t.match(/\[(\d{2}):(\d{2})(?:\.(\d{2,3}))?\]/);
                            if (match) {
                                const ms = match[3] ? parseInt(match[3].padEnd(3,'0')) : 0;
                                parsedLyrics.push({ time: parseInt(match[1])*60 + parseInt(match[2]) + ms/1000, text: txt });
                            }
                        });
                    }
                }
            });
            parsedLyrics.sort((a,b) => a.time - b.time);

            if(parsedLyrics.length) {
                parsedLyrics.forEach((l, i) => {
                    const d = document.createElement('div');
                    d.className = 'lrc-line'; d.textContent = l.text;
                    d.onclick = () => { audio.currentTime = l.time; syncLyrics(true); }; // 点击歌词跳转
                    el.lrcView.appendChild(d);
                });
            } else el.lrcView.innerHTML = '<div class="lrc-line">无滚动歌词数据</div>';
        };

        // 监听用户滚动，防止抢夺焦点
        const handleUserScroll = () => {
            isUserScrollingLyrics = true;
            clearTimeout(lyricsScrollTimeout);
            lyricsScrollTimeout = setTimeout(() => { isUserScrollingLyrics = false; syncLyrics(); }, 2000);
        };
        el.lrcView.addEventListener('wheel', handleUserScroll, {passive: true});
        el.lrcView.addEventListener('touchmove', handleUserScroll, {passive: true});

        const syncLyrics = (force = false) => {
            if(!parsedLyrics.length) return;
            const cur = audio.currentTime;
            let activeIdx = -1;
            for (let i = 0; i < parsedLyrics.length; i++) {
                if (cur >= parsedLyrics[i].time - 0.2) activeIdx = i; else break;
            }

            const lines = el.lrcView.querySelectorAll('.lrc-line');
            lines.forEach((line, i) => {
                if (i === activeIdx) {
                    if (!line.classList.contains('active')) {
                        line.classList.add('active');
                        // 核心居中算法：严格计算视口一半，减去自身高度一半
                        if (!isUserScrollingLyrics || force) {
                            const offset = line.offsetTop - el.lrcView.offsetTop - (el.lrcView.clientHeight / 2) + (line.clientHeight / 2);
                            el.lrcView.scrollTo({ top: offset, behavior: 'smooth' });
                        }
                    }
                } else line.classList.remove('active');
            });
        };

        // ================= 播放控制 =================
        const playAudio = async (idx) => {
            if (!playlist[idx]) return;
            if (currentIndex !== idx) { playHistory.push(idx); currentIndex = idx; }
            
            const song = playlist[idx];
            audio.src = song.url; el.title.textContent = song.title; el.artist.textContent = song.artist;
            
            hasCurrentAlbumArt = !!song.art;
            if (hasCurrentAlbumArt) { el.artImg.src = song.art; currentAlbumColor = await extractColor(song.art); } 
            else { el.artImg.src = "data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzQwIiBoZWlnaHQ9IjM0MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMWExYTJlIi8+PC9zdmc+"; currentAlbumColor = null; }
            
            applyThemeLogic();
            await loadLrc(song);

            try {
                await audio.play();
                isPlaying = true; el.btnPlay.textContent = '⏸';
                if(!audioCtx) initVis();
            } catch(e) { showToast("❌ 播放失败，请重试"); }
        };

        const togglePlay = () => {
            if (!playlist.length) return el.btnLoad.click();
            if (isPlaying) { audio.pause(); isPlaying=false; el.btnPlay.textContent='▶'; }
            else { audio.play(); isPlaying=true; el.btnPlay.textContent='⏸'; if(!audioCtx) initVis(); }
        };

        const goNext = () => {
            if(!playlist.length) return;
            playAudio(isShuffle ? Math.floor(Math.random()*playlist.length) : (currentIndex + 1) % playlist.length);
        };
        
        const goPrev = () => {
            if(!playlist.length) return;
            if(isShuffle) { playHistory.pop(); playAudio(playHistory.length ? playHistory.pop() : Math.floor(Math.random()*playlist.length)); } 
            else playAudio((currentIndex - 1 + playlist.length) % playlist.length);
        };

        el.btnPlay.onclick = togglePlay; el.btnNext.onclick = goNext; el.btnPrev.onclick = goPrev;
        audio.onended = goNext;
        
        audio.ontimeupdate = () => {
            if (audio.duration) {
                el.progFill.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
                el.timeCur.textContent = formatTime(audio.currentTime);
                syncLyrics();
            }
        };
        audio.onloadedmetadata = () => el.timeTot.textContent = formatTime(audio.duration);

        el.progArea.onclick = (e) => {
            if (audio.duration) {
                const r = el.progArea.getBoundingClientRect();
                audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
            }
        };
        el.volSlider.oninput = (e) => audio.volume = e.target.value;

        // ================= 频谱可视化 =================
        const initVis = () => {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser); analyser.connect(audioCtx.destination);
                analyser.fftSize = 128; bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                spectrumCtx = document.getElementById('spectrumCanvas').getContext('2d');
                drawVis();
            } catch(e) {}
        };
        const drawVis = () => {
            if(!spectrumCtx) return;
            requestAnimationFrame(drawVis);
            const cvs = document.getElementById('spectrumCanvas');
            cvs.width = cvs.offsetWidth; cvs.height = cvs.offsetHeight;
            analyser.getByteFrequencyData(dataArray);
            spectrumCtx.clearRect(0,0, cvs.width, cvs.height);
            const w = (cvs.width / bufferLength) * 2; let x = 0;
            for(let i=0; i<bufferLength; i++) {
                const h = (dataArray[i]/255) * cvs.height;
                spectrumCtx.fillStyle = 'rgba(255, 255, 255, 0.45)';
                spectrumCtx.fillRect(x, cvs.height - h, w-1, h);
                x += w;
            }
        };

        // ================= 界面控制与外设 =================
        el.btnLoad.onclick = () => el.folderIn.click();
        
        el.btnToggleLrc.onclick = () => {
            el.lrcPanel.style.display = el.lrcPanel.style.display === 'none' ? 'flex' : 'none';
            el.btnToggleLrc.style.color = el.lrcPanel.style.display === 'none' ? '' : 'var(--primary)';
            el.btnToggleLrc.style.borderColor = el.lrcPanel.style.display === 'none' ? '' : 'var(--primary)';
        };

        const updateModeUI = () => {
            el.btnSeq.classList.toggle('active', !isShuffle);
            el.btnRnd.classList.toggle('active', isShuffle);
        };
        el.btnSeq.onclick = () => { isShuffle = false; updateModeUI(); showToast("模式：顺序播放"); };
        el.btnRnd.onclick = () => { isShuffle = true; updateModeUI(); showToast("模式：随机播放"); };

        document.getElementById('btnSettings').onclick = () => document.getElementById('settingsDrawer').classList.add('open');
        document.getElementById('btnCloseSettings').onclick = () => document.getElementById('settingsDrawer').classList.remove('open');

        document.getElementById('btnToggleColorMode').onclick = function() {
            cfg.colorMode = !cfg.colorMode;
            this.textContent = cfg.colorMode ? '关闭取色模式' : '开启取色模式 (UI跟随变色)';
            this.style.color = cfg.colorMode ? 'var(--primary)' : '';
            this.style.borderColor = cfg.colorMode ? 'var(--primary)' : '';
            applyThemeLogic(); showToast(cfg.colorMode ? "已开启取色跟随" : "已关闭取色跟随");
        };

        document.getElementById('blurSlider').oninput = function() {
            cfg.blurAmt = this.value; document.getElementById('blurVal').textContent = `${this.value}px`; applyThemeLogic();
        };

        document.getElementById('btnSetBg').onclick = () => document.getElementById('bgInput').click();
        document.getElementById('bgInput').onchange = (e) => {
            const f = e.target.files[0];
            if(f) {
                const r = new FileReader();
                r.onload = async (ev) => {
                    cfg.customBgImg = ev.target.result; cfg.customBgColor = await extractColor(cfg.customBgImg);
                    applyThemeLogic(); showToast("🖼️ 自定义背景应用成功");
                };
                r.readAsDataURL(f);
            }
        };
        document.getElementById('btnClearBg').onclick = () => {
            cfg.customBgImg = null; cfg.customBgColor = null; applyThemeLogic(); showToast("🗑️ 已恢复默认背景");
        };

        // 键盘快捷键
        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            switch(e.key.toLowerCase()) {
                case ' ': case 'enter': e.preventDefault(); togglePlay(); break;
                case 'arrowleft': e.preventDefault(); goPrev(); break;
                case 'arrowright': e.preventDefault(); goNext(); break;
                case 'arrowup': e.preventDefault(); audio.volume=Math.min(1, audio.volume+0.1); el.volSlider.value=audio.volume; break;
                case 'arrowdown': e.preventDefault(); audio.volume=Math.max(0, audio.volume-0.1); el.volSlider.value=audio.volume; break;
                case 's': el.btnSeq.click(); break;
                case 'r': el.btnRnd.click(); break;
                case 'l': el.btnToggleLrc.click(); break;
            }
        });

        // ================= Gamepad 游戏手柄接入 =================
        window.addEventListener("gamepadconnected", (e) => {
            gamepadConnected = true; 
            el.padStatus.innerHTML = `🎮 手柄接入成功: ${e.gamepad.id}`;
            el.padStatus.style.color = 'var(--primary)';
            showToast("🎮 游戏手柄已连接");
        });
        window.addEventListener("gamepaddisconnected", () => {
            gamepadConnected = false;
            el.padStatus.innerHTML = `⌨️ 手柄已断开连接`;
            el.padStatus.style.color = 'var(--text-sub)';
        });

        const pollGamepad = () => {
            if (!gamepadConnected) { requestAnimationFrame(pollGamepad); return; }
            const pad = navigator.getGamepads()[0];
            if (pad) {
                const btns = pad.buttons.map(b => b.pressed);
                if (btns[0] && !prevPadBtns[0]) togglePlay(); // A键
                if (btns[4] && !prevPadBtns[4]) goPrev(); // LB
                if (btns[5] && !prevPadBtns[5]) goNext(); // RB
                if (btns[2] && !prevPadBtns[2]) el.btnSeq.click(); // X
                if (btns[3] && !prevPadBtns[3]) el.btnRnd.click(); // Y
                if (btns[12]) { audio.volume=Math.min(1, audio.volume+0.02); el.volSlider.value=audio.volume; } // D-Pad 上
                if (btns[13]) { audio.volume=Math.max(0, audio.volume-0.02); el.volSlider.value=audio.volume; } // D-Pad 下
                prevPadBtns = btns;
            }
            requestAnimationFrame(pollGamepad);
        };
        requestAnimationFrame(pollGamepad);

        audio.volume = 0.7;
    </script>
</body>
</html>
