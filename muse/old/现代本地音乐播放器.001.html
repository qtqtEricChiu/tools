<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>现代本地音乐播放器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --dark-color: #2d3436;
            --light-color: #dfe6e9;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark-color), #0984e3);
            color: var(--light-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .player-container {
            width: 100%;
            max-width: 1200px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .player-header {
            padding: 25px 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-title {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-title i {
            color: var(--primary-color);
        }

        .file-upload-container {
            display: flex;
            gap: 15px;
        }

        .file-input-label {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 12px 20px;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .file-input-label:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .file-input {
            display: none;
        }

        .player-content {
            display: flex;
            flex: 1;
            padding: 30px;
            gap: 30px;
        }

        .album-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .album-art-container {
            width: 320px;
            height: 320px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        .album-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .album-art-container:hover .album-art {
            transform: scale(1.05);
        }

        .album-info {
            text-align: center;
            width: 100%;
        }

        .song-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: white;
        }

        .song-artist {
            font-size: 18px;
            color: var(--secondary-color);
            margin-bottom: 5px;
        }

        .song-album {
            font-size: 16px;
            opacity: 0.8;
        }

        .controls-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .progress-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .progress-bar-container {
            background: var(--glass-bg);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            width: 0%;
            transition: width 0.1s;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-top: 10px;
        }

        .control-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 20px;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.1);
        }

        .play-btn {
            width: 80px;
            height: 80px;
            font-size: 28px;
            background: var(--primary-color);
            border: none;
        }

        .play-btn:hover {
            background: #5a4bd8;
        }

        .volume-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .volume-slider-container {
            flex: 1;
            height: 8px;
            background: var(--glass-bg);
            border-radius: 4px;
            position: relative;
        }

        .volume-slider {
            position: absolute;
            height: 100%;
            background: var(--secondary-color);
            width: 70%;
            border-radius: 4px;
        }

        .lyrics-section {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .lyrics-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lyrics-title {
            font-size: 20px;
            font-weight: 600;
        }

        .lyrics-source-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .lyrics-source-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .lyrics-container {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            overflow-y: auto;
            max-height: 400px;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-color) transparent;
        }

        .lyrics-container::-webkit-scrollbar {
            width: 6px;
        }

        .lyrics-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .lyrics-container::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 3px;
        }

        .lyric-line {
            padding: 12px 0;
            font-size: 18px;
            line-height: 1.5;
            text-align: center;
            opacity: 0.5;
            transition: all 0.3s;
        }

        .lyric-line.active {
            opacity: 1;
            color: white;
            font-size: 22px;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--secondary-color);
            font-style: italic;
        }

        .no-lyrics {
            text-align: center;
            color: #aaa;
            font-style: italic;
            padding: 20px;
        }

        .player-footer {
            padding: 20px 30px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            opacity: 0.7;
        }

        .playlist-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s;
            background: rgba(0, 0, 0, 0.1);
        }

        .playlist-section.show {
            max-height: 300px;
        }

        .playlist-header {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .playlist-title {
            font-size: 18px;
            font-weight: 600;
        }

        .playlist-items {
            padding: 0 30px 20px;
            overflow-y: auto;
            max-height: 250px;
        }

        .playlist-item {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .playlist-item.active {
            background: var(--glass-bg);
            border-left: 4px solid var(--primary-color);
        }

        .playlist-item-title {
            font-weight: 500;
        }

        .playlist-item-duration {
            font-size: 13px;
            opacity: 0.7;
        }

        .visualizer {
            width: 100%;
            height: 120px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            margin-top: 20px;
            overflow: hidden;
        }

        .visualizer canvas {
            width: 100%;
            height: 100%;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--dark-color);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @media (max-width: 1024px) {
            .player-content {
                flex-direction: column;
            }
            
            .album-section, .controls-section, .lyrics-section {
                width: 100%;
            }
            
            .album-art-container {
                width: 280px;
                height: 280px;
            }
        }

        @media (max-width: 768px) {
            .player-header {
                flex-direction: column;
                gap: 20px;
            }
            
            .file-upload-container {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .player-controls {
                gap: 15px;
            }
            
            .control-btn {
                width: 50px;
                height: 50px;
            }
            
            .play-btn {
                width: 70px;
                height: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="player-header">
            <div class="player-title">
                <i class="fas fa-music"></i>
                <span>现代本地音乐播放器</span>
            </div>
            <div class="file-upload-container">
                <label class="file-input-label">
                    <i class="fas fa-folder-open"></i>
                    选择音频文件
                    <input type="file" id="audioInput" class="file-input" accept=".mp3,.flac,.wav,.m4a" multiple>
                </label>
                <label class="file-input-label">
                    <i class="fas fa-file-alt"></i>
                    选择歌词文件
                    <input type="file" id="lyricsInput" class="file-input" accept=".lrc" multiple>
                </label>
            </div>
        </div>

        <div class="playlist-header" id="playlistToggle">
            <div class="playlist-title">
                <i class="fas fa-list"></i>
                播放列表
            </div>
            <i class="fas fa-chevron-down" id="playlistIcon"></i>
        </div>
        
        <div class="playlist-section" id="playlistSection">
            <div class="playlist-items" id="playlistItems">
                <!-- 播放列表项将通过JavaScript动态添加 -->
            </div>
        </div>

        <div class="player-content">
            <div class="album-section">
                <div class="album-art-container">
                    <img id="albumArt" class="album-art" src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="专辑封面">
                </div>
                <div class="album-info">
                    <div id="songTitle" class="song-title">未选择歌曲</div>
                    <div id="songArtist" class="song-artist">未知艺术家</div>
                    <div id="songAlbum" class="song-album">未知专辑</div>
                </div>
                
                <div class="visualizer">
                    <canvas id="visualizerCanvas"></canvas>
                </div>
            </div>

            <div class="controls-section">
                <div class="progress-section">
                    <div class="progress-bar-container">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                    <div class="time-display">
                        <span id="currentTime">0:00</span>
                        <span id="totalTime">0:00</span>
                    </div>
                </div>

                <div class="player-controls">
                    <div class="control-btn" id="prevBtn">
                        <i class="fas fa-step-backward"></i>
                    </div>
                    <div class="control-btn" id="playBtn">
                        <i class="fas fa-play"></i>
                    </div>
                    <div class="control-btn" id="nextBtn">
                        <i class="fas fa-step-forward"></i>
                    </div>
                </div>

                <div class="volume-section">
                    <i class="fas fa-volume-up"></i>
                    <div class="volume-slider-container">
                        <div id="volumeSlider" class="volume-slider"></div>
                    </div>
                </div>
            </div>

            <div class="lyrics-section">
                <div class="lyrics-header">
                    <div class="lyrics-title">
                        <i class="fas fa-quote-right"></i>
                        歌词
                    </div>
                    <button class="lyrics-source-btn" id="fetchLyricsBtn">
                        <i class="fas fa-search"></i>
                        从QQ音乐搜索歌词
                    </button>
                </div>
                
                <div class="lyrics-container" id="lyricsContainer">
                    <div id="loadingLyrics" class="loading">加载歌词中...</div>
                    <div id="noLyrics" class="no-lyrics">暂无歌词</div>
                    <div id="lyricsContent">
                        <!-- 歌词将通过JavaScript动态添加 -->
                    </div>
                </div>
            </div>
        </div>

        <div class="player-footer">
            <div>支持格式: MP3, FLAC, WAV, M4A</div>
            <div id="audioInfo">未加载音频文件</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 全局变量
        let audioContext;
        let analyser;
        let source;
        let dataArray;
        let bufferLength;
        let canvasCtx;
        let isPlaying = false;
        let currentSongIndex = 0;
        let playlist = [];
        let currentLyrics = [];
        
        // DOM元素
        const audioInput = document.getElementById('audioInput');
        const lyricsInput = document.getElementById('lyricsInput');
        const albumArt = document.getElementById('albumArt');
        const songTitle = document.getElementById('songTitle');
        const songArtist = document.getElementById('songArtist');
        const songAlbum = document.getElementById('songAlbum');
        const playBtn = document.getElementById('playBtn');
        const playBtnIcon = playBtn.querySelector('i');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeSlider = document.getElementById('volumeSlider');
        const lyricsContainer = document.getElementById('lyricsContainer');
        const lyricsContent = document.getElementById('lyricsContent');
        const loadingLyrics = document.getElementById('loadingLyrics');
        const noLyrics = document.getElementById('noLyrics');
        const fetchLyricsBtn = document.getElementById('fetchLyricsBtn');
        const audioInfo = document.getElementById('audioInfo');
        const playlistItems = document.getElementById('playlistItems');
        const playlistSection = document.getElementById('playlistSection');
        const playlistToggle = document.getElementById('playlistToggle');
        const playlistIcon = document.getElementById('playlistIcon');
        const visualizerCanvas = document.getElementById('visualizerCanvas');
        const toast = document.getElementById('toast');
        
        // 创建音频元素
        const audio = new Audio();
        audio.crossOrigin = "anonymous";
        
        // 初始化可视化
        function initVisualizer() {
            canvasCtx = visualizerCanvas.getContext('2d');
            visualizerCanvas.width = visualizerCanvas.offsetWidth;
            visualizerCanvas.height = visualizerCanvas.offsetHeight;
            
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioContext.destination);
            
            analyser.fftSize = 256;
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
        }
        
        // 绘制可视化
        function drawVisualizer() {
            if (!canvasCtx) return;
            
            requestAnimationFrame(drawVisualizer);
            analyser.getByteFrequencyData(dataArray);
            
            canvasCtx.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
            
            const barWidth = (visualizerCanvas.width / bufferLength) * 2.5;
            let barHeight;
            let x = 0;
            
            for(let i = 0; i < bufferLength; i++) {
                barHeight = dataArray[i] / 2;
                
                const gradient = canvasCtx.createLinearGradient(0, 0, 0, visualizerCanvas.height);
                gradient.addColorStop(0, '#6c5ce7');
                gradient.addColorStop(1, '#a29bfe');
                
                canvasCtx.fillStyle = gradient;
                canvasCtx.fillRect(x, visualizerCanvas.height - barHeight, barWidth, barHeight);
                
                x += barWidth + 1;
            }
        }
        
        // 显示消息
        function showToast(message, duration = 3000) {
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }
        
        // 格式化时间
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
        
        // 更新进度条
        function updateProgress() {
            if (audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = `${progress}%`;
                currentTimeEl.textContent = formatTime(audio.currentTime);
                
                // 更新歌词高亮
                updateLyricsHighlight();
            }
        }
        
        // 从音频文件提取元数据
        function extractMetadata(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const arrayBuffer = e.target.result;
                    const blob = new Blob([arrayBuffer]);
                    const url = URL.createObjectURL(blob);
                    
                    // 创建临时音频元素来获取元数据
                    const tempAudio = new Audio();
                    tempAudio.src = url;
                    
                    tempAudio.addEventListener('loadedmetadata', () => {
                        const metadata = {
                            title: file.name.replace(/\.[^/.]+$/, ""), // 默认使用文件名
                            artist: "未知艺术家",
                            album: "未知专辑",
                            duration: tempAudio.duration,
                            url: url
                        };
                        
                        // 尝试从ID3标签获取更多信息
                        if (typeof jsmediatags !== 'undefined') {
                            jsmediatags.read(file, {
                                onSuccess: function(tag) {
                                    if (tag.tags.title) metadata.title = tag.tags.title;
                                    if (tag.tags.artist) metadata.artist = tag.tags.artist;
                                    if (tag.tags.album) metadata.album = tag.tags.album;
                                    
                                    // 提取专辑封面
                                    if (tag.tags.picture) {
                                        const base64String = btoa(
                                            new Uint8Array(tag.tags.picture.data)
                                            .reduce((data, byte) => data + String.fromCharCode(byte), '')
                                        );
                                        metadata.albumArt = `data:${tag.tags.picture.format};base64,${base64String}`;
                                    }
                                    
                                    resolve(metadata);
                                },
                                onError: function(error) {
                                    console.log("无法读取元数据:", error);
                                    resolve(metadata);
                                }
                            });
                        } else {
                            resolve(metadata);
                        }
                    });
                    
                    tempAudio.addEventListener('error', () => {
                        resolve({
                            title: file.name.replace(/\.[^/.]+$/, ""),
                            artist: "未知艺术家",
                            album: "未知专辑",
                            duration: 0,
                            url: url
                        });
                    });
                };
                
                reader.readAsArrayBuffer(file);
            });
        }
        
        // 加载音频文件
        async function loadAudioFile(file) {
            const metadata = await extractMetadata(file);
            
            // 添加到播放列表
            playlist.push({
                file: file,
                metadata: metadata
            });
            
            // 如果是第一个文件，直接播放
            if (playlist.length === 1) {
                playSong(0);
            }
            
            // 更新播放列表UI
            updatePlaylist();
            showToast(`已添加: ${metadata.title}`);
        }
        
        // 播放指定索引的歌曲
        function playSong(index) {
            if (index < 0 || index >= playlist.length) return;
            
            currentSongIndex = index;
            const song = playlist[index];
            
            // 更新音频源
            audio.src = song.metadata.url;
            
            // 更新UI
            songTitle.textContent = song.metadata.title;
            songArtist.textContent = song.metadata.artist;
            songAlbum.textContent = song.metadata.album;
            
            if (song.metadata.albumArt) {
                albumArt.src = song.metadata.albumArt;
            } else {
                albumArt.src = "https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80";
            }
            
            totalTimeEl.textContent = formatTime(song.metadata.duration);
            audioInfo.textContent = `${song.file.name} | ${song.file.type}`;
            
            // 更新播放列表高亮
            updatePlaylistHighlight();
            
            // 尝试加载歌词
            loadLyrics(song.file.name);
            
            // 如果当前正在播放，继续播放
            if (isPlaying) {
                audio.play();
            }
        }
        
        // 更新播放列表
        function updatePlaylist() {
            playlistItems.innerHTML = '';
            
            playlist.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = `playlist-item ${index === currentSongIndex ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="playlist-item-title">${song.metadata.title}</div>
                    <div class="playlist-item-duration">${formatTime(song.metadata.duration)}</div>
                `;
                
                item.addEventListener('click', () => {
                    playSong(index);
                });
                
                playlistItems.appendChild(item);
            });
        }
        
        // 更新播放列表高亮
        function updatePlaylistHighlight() {
            const items = document.querySelectorAll('.playlist-item');
            items.forEach((item, index) => {
                if (index === currentSongIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }
        
        // 解析LRC歌词
        function parseLRC(lrcText) {
            const lines = lrcText.split('\n');
            const lyrics = [];
            
            lines.forEach(line => {
                // 匹配时间标签
                const timeMatches = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/g);
                
                if (timeMatches) {
                    const text = line.replace(/\[.*?\]/g, '').trim();
                    
                    if (text) {
                        timeMatches.forEach(timeMatch => {
                            const timeParts = timeMatch.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/);
                            if (timeParts) {
                                const minutes = parseInt(timeParts[1]);
                                const seconds = parseInt(timeParts[2]);
                                const milliseconds = parseInt(timeParts[3].length === 3 ? timeParts[3] : timeParts[3] * 10);
                                const time = minutes * 60 + seconds + milliseconds / 1000;
                                
                                lyrics.push({
                                    time: time,
                                    text: text
                                });
                            }
                        });
                    }
                }
            });
            
            // 按时间排序
            lyrics.sort((a, b) => a.time - b.time);
            
            return lyrics;
        }
        
        // 加载歌词
        async function loadLyrics(filename) {
            const baseName = filename.replace(/\.[^/.]+$/, "");
            
            // 首先检查用户是否上传了歌词文件
            const lyricsFiles = lyricsInput.files;
            let lrcFile = null;
            
            for (let i = 0; i < lyricsFiles.length; i++) {
                if (lyricsFiles[i].name.replace(/\.[^/.]+$/, "") === baseName) {
                    lrcFile = lyricsFiles[i];
                    break;
                }
            }
            
            if (lrcFile) {
                // 从上传的文件加载歌词
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentLyrics = parseLRC(e.target.result);
                    displayLyrics();
                };
                reader.readAsText(lrcFile);
                showToast("从本地文件加载歌词");
            } else {
                // 尝试从QQ音乐API获取歌词
                try {
                    loadingLyrics.style.display = 'block';
                    noLyrics.style.display = 'none';
                    lyricsContent.innerHTML = '';
                    
                    const songTitleText = songTitle.textContent;
                    const songArtistText = songArtist.textContent;
                    
                    // 这里应该调用QQ音乐API，但由于跨域限制，我们模拟一个响应
                    // 在实际应用中，您需要使用代理服务器或支持CORS的API
                    setTimeout(() => {
                        loadingLyrics.style.display = 'none';
                        
                        // 模拟歌词数据
                        if (songTitleText !== "未选择歌曲") {
                            const mockLyrics = `[00:00.00]${songTitleText} - ${songArtistText}
[00:15.00]这是示例歌词
[00:30.00]在实际应用中
[00:45.00]您需要连接QQ音乐API
[01:00.00]获取真实的歌词数据`;
                            
                            currentLyrics = parseLRC(mockLyrics);
                            displayLyrics();
                            showToast("加载示例歌词（实际需要连接QQ音乐API）");
                        } else {
                            noLyrics.style.display = 'block';
                        }
                    }, 1000);
                    
                } catch (error) {
                    console.error("获取歌词失败:", error);
                    loadingLyrics.style.display = 'none';
                    noLyrics.style.display = 'block';
                    showToast("获取歌词失败");
                }
            }
        }
        
        // 从QQ音乐API获取歌词
        async function fetchLyricsFromQQMusic() {
            const songTitleText = songTitle.textContent;
            const songArtistText = songArtist.textContent;
            
            if (songTitleText === "未选择歌曲") {
                showToast("请先选择歌曲");
                return;
            }
            
            try {
                loadingLyrics.style.display = 'block';
                noLyrics.style.display = 'none';
                lyricsContent.innerHTML = '';
                
                // 注意：由于跨域限制，这只是一个示例
                // 在实际应用中，您需要使用代理服务器
                const response = await fetch(`https://api.qq.jsososo.com/search/quick?key=${encodeURIComponent(songTitleText + ' ' + songArtistText)}`);
                const data = await response.json();
                
                if (data.code === 200 && data.data.song.itemlist.length > 0) {
                    const songId = data.data.song.itemlist[0].id;
                    
                    const lyricResponse = await fetch(`https://api.qq.jsososo.com/lyric?songmid=${songId}`);
                    const lyricData = await lyricResponse.json();
                    
                    if (lyricData.code === 200 && lyricData.lyric) {
                        currentLyrics = parseLRC(lyricData.lyric);
                        displayLyrics();
                        showToast("从QQ音乐获取歌词成功");
                    } else {
                        throw new Error("未找到歌词");
                    }
                } else {
                    throw new Error("未找到歌曲");
                }
                
            } catch (error) {
                console.error("从QQ音乐获取歌词失败:", error);
                
                // 模拟歌词作为后备
                const mockLyrics = `[00:00.00]${songTitleText} - ${songArtistText}
[00:15.00]这是示例歌词
[00:30.00]由于跨域限制
[00:45.00]无法直接连接QQ音乐API
[01:00.00]在实际部署中需要配置代理`;
                
                currentLyrics = parseLRC(mockLyrics);
                displayLyrics();
                showToast("使用示例歌词（需要配置代理连接QQ音乐API）");
                
            } finally {
                loadingLyrics.style.display = 'none';
            }
        }
        
        // 显示歌词
        function displayLyrics() {
            lyricsContent.innerHTML = '';
            
            if (currentLyrics.length === 0) {
                noLyrics.style.display = 'block';
                return;
            }
            
            noLyrics.style.display = 'none';
            
            currentLyrics.forEach(lyric => {
                const lyricLine = document.createElement('div');
                lyricLine.className = 'lyric-line';
                lyricLine.textContent = lyric.text;
                lyricLine.dataset.time = lyric.time;
                lyricsContent.appendChild(lyricLine);
            });
        }
        
        // 更新歌词高亮
        function updateLyricsHighlight() {
            const currentTime = audio.currentTime;
            const lyricLines = document.querySelectorAll('.lyric-line');
            
            let activeIndex = -1;
            
            for (let i = 0; i < currentLyrics.length; i++) {
                if (currentTime >= currentLyrics[i].time) {
                    activeIndex = i;
                } else {
                    break;
                }
            }
            
            lyricLines.forEach((line, index) => {
                if (index === activeIndex) {
                    line.classList.add('active');
                    
                    // 滚动到活动歌词
                    line.scrollIntoView({
                        behavior: 'smooth',
                        block: 'center'
                    });
                } else {
                    line.classList.remove('active');
                }
            });
        }
        
        // 事件监听器
        audioInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            
            for (const file of files) {
                await loadAudioFile(file);
            }
            
            // 重置文件输入，允许再次选择相同文件
            audioInput.value = '';
        });
        
        lyricsInput.addEventListener('change', () => {
            if (playlist.length > 0) {
                const currentSong = playlist[currentSongIndex];
                loadLyrics(currentSong.file.name);
                showToast("歌词文件已加载");
            }
        });
        
        playBtn.addEventListener('click', () => {
            if (playlist.length === 0) {
                showToast("请先选择音频文件");
                return;
            }
            
            if (isPlaying) {
                audio.pause();
                playBtnIcon.className = 'fas fa-play';
            } else {
                audio.play();
                playBtnIcon.className = 'fas fa-pause';
                
                // 初始化可视化
                if (!audioContext) {
                    initVisualizer();
                    drawVisualizer();
                }
            }
            
            isPlaying = !isPlaying;
        });
        
        prevBtn.addEventListener('click', () => {
            if (playlist.length === 0) return;
            
            let newIndex = currentSongIndex - 1;
            if (newIndex < 0) newIndex = playlist.length - 1;
            
            playSong(newIndex);
            
            if (isPlaying) {
                audio.play();
            }
        });
        
        nextBtn.addEventListener('click', () => {
            if (playlist.length === 0) return;
            
            let newIndex = currentSongIndex + 1;
            if (newIndex >= playlist.length) newIndex = 0;
            
            playSong(newIndex);
            
            if (isPlaying) {
                audio.play();
            }
        });
        
        audio.addEventListener('timeupdate', updateProgress);
        
        audio.addEventListener('ended', () => {
            // 自动播放下一首
            let newIndex = currentSongIndex + 1;
            if (newIndex >= playlist.length) newIndex = 0;
            
            playSong(newIndex);
            
            if (isPlaying) {
                audio.play();
            }
        });
        
        // 进度条点击
        document.querySelector('.progress-bar-container').addEventListener('click', (e) => {
            if (!audio.duration) return;
            
            const rect = e.target.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        });
        
        // 音量控制
        document.querySelector('.volume-slider-container').addEventListener('click', (e) => {
            const rect = e.target.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            volumeSlider.style.width = `${percent * 100}%`;
            audio.volume = percent;
        });
        
        // 从QQ音乐获取歌词
        fetchLyricsBtn.addEventListener('click', fetchLyricsFromQQMusic);
        
        // 播放列表切换
        playlistToggle.addEventListener('click', () => {
            playlistSection.classList.toggle('show');
            playlistIcon.className = playlistSection.classList.contains('show') ? 
                'fas fa-chevron-up' : 'fas fa-chevron-down';
        });
        
        // 窗口大小变化时重新调整可视化
        window.addEventListener('resize', () => {
            if (visualizerCanvas) {
                visualizerCanvas.width = visualizerCanvas.offsetWidth;
                visualizerCanvas.height = visualizerCanvas.offsetHeight;
            }
        });
        
        // 加载jsmediatags库
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.7/jsmediatags.min.js';
        script.onload = () => {
            console.log("jsmediatags loaded");
        };
        document.head.appendChild(script);
        
        // 初始化
        audio.volume = 0.7;
        showToast("欢迎使用现代音乐播放器！请选择音频文件开始播放。");
    </script>
</body>
</html>
