<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地图片浏览器 v1.6.1</title>
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-color: #4a8cff;
            --border-color: #333333;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.25);
            --transition: all 0.3s ease;
            --font-main: "OPPO Sans 4.0", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #f5f5f5;
                --bg-secondary: #ffffff;
                --text-primary: #333333;
                --text-secondary: #666666;
                --border-color: #e0e0e0;
                --card-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 授权界面 */
        .auth-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .auth-container.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .auth-content {
            background-color: var(--bg-secondary);
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: var(--card-shadow);
        }

        .auth-content h1 {
            margin-bottom: 20px;
            font-weight: 500;
        }

        .auth-content p {
            color: var(--text-secondary);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .auth-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
        }

        .auth-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* 加载动画 */
        .loading-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            backdrop-filter: blur(10px);
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .loading-text {
            color: white;
            font-size: 18px;
            margin-top: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 主界面布局 */
        .main-container {
            display: grid;
            grid-template-columns: auto 1fr;
            grid-template-rows: auto 1fr auto;
            height: 100vh;
            grid-template-areas:
                "header header"
                "history main"
                "footer footer";
        }

        /* 顶部标题栏 */
        .header {
            grid-area: header;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            z-index: 10;
        }

        .file-info {
            display: flex;
            flex-direction: column;
        }

        .file-name {
            font-size: 18px;
            font-weight: 500;
            max-width: 50ch;
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 1;
            position: relative;
        }

        .file-name::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 40px;
            background: linear-gradient(90deg, transparent, var(--bg-secondary));
        }

        .file-modified {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 左侧历史记录 */
        .history-panel {
            grid-area: history;
            width: 100px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            z-index: 5;
        }

        .history-title {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-align: center;
        }

        .history-item {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 12px;
            cursor: pointer;
            position: relative;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .history-item:hover {
            transform: scale(1.05);
            border-color: var(--accent-color);
        }

        .history-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .settings-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            margin-top: auto;
            transition: var(--transition);
        }

        .settings-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .settings-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        /* 主图片区域 */
        .main-content {
            grid-area: main;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            background-color: #000;
        }

        .image-container {
            position: relative;
            max-width: 100%;
            max-height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-image {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .blur-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(20px) brightness(0.5);
            opacity: 0.7;
            z-index: -1;
        }

        /* 底部操作栏 */
        .footer {
            grid-area: footer;
            padding: 16px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            z-index: 10;
        }

        .action-buttons {
            display: flex;
            gap: 24px;
        }

        .action-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.1);
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .action-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
        }

        .action-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-primary);
        }

        /* 设置面板 */
        .settings-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 320px;
            height: 100%;
            background-color: var(--bg-secondary);
            z-index: 20;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            padding: 24px;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
        }

        .settings-panel.open {
            transform: translateX(0);
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .settings-title {
            font-size: 20px;
            font-weight: 500;
        }

        .close-settings {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 24px;
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: var(--transition);
        }

        .close-settings:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .settings-group {
            margin-bottom: 24px;
        }

        .settings-group-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .setting-label {
            font-size: 14px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-color);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .about-section {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            text-align: center;
        }

        .version {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* 确认对话框 */
        .dialog-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .dialog-content {
            background-color: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: var(--card-shadow);
        }

        .dialog-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .dialog-message {
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .dialog-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .dialog-btn {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: var(--transition);
        }

        .dialog-btn.cancel {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .dialog-btn.confirm {
            background-color: #e53935;
            color: white;
        }

        .dialog-btn:hover {
            opacity: 0.9;
        }

        /* 平板模式 */
        .tablet-mode .footer {
            justify-content: flex-start;
            padding-left: 120px;
        }

        .tablet-mode .action-buttons {
            flex-direction: column;
            gap: 16px;
        }

        /* 长图/宽图滚动 */
        .scrollable-image {
            max-height: 90vh;
            overflow: auto;
        }
    </style>
</head>
<body>
    <!-- 授权界面 -->
    <div class="auth-container" id="authContainer">
        <div class="auth-content">
            <h1>授权访问本地图片</h1>
            <p>为了浏览您的本地图片，请授权访问您的图片文件夹。我们承诺仅读取图像文件，不会访问其他文件类型。</p>
            <button class="auth-btn" id="authBtn">授权文件夹</button>
        </div>
    </div>

    <!-- 加载动画 -->
    <div class="loading-container hidden" id="loadingContainer">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在加载图片文件...</div>
    </div>

    <!-- 主界面 -->
    <div class="main-container hidden" id="mainContainer">
        <!-- 顶部标题栏 -->
        <header class="header">
            <div class="file-info">
                <div class="file-name" id="fileName">未选择图片</div>
                <div class="file-modified" id="fileModified">最后修改时间: --</div>
            </div>
        </header>

        <!-- 左侧历史记录 -->
        <div class="history-panel">
            <div class="history-title">最近浏览</div>
            <div class="history-item" id="historyItem1"></div>
            <div class="history-item" id="historyItem2"></div>
            <div class="history-item" id="historyItem3"></div>
            <div class="settings-btn" id="settingsBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.3-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94 0 .31.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.3.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"></path>
                </svg>
            </div>
        </div>

        <!-- 主图片区域 -->
        <main class="main-content">
            <div class="image-container">
                <div class="blur-background" id="blurBackground"></div>
                <div class="scrollable-image" id="scrollableImage">
                    <img class="main-image" id="mainImage" alt="当前图片">
                </div>
            </div>
        </main>

        <!-- 底部操作栏 -->
        <footer class="footer">
            <div class="action-buttons">
                <button class="action-btn" id="deleteBtn" title="删除图片">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"></path>
                    </svg>
                </button>
                <button class="action-btn" id="openAppBtn" title="在默认应用中打开">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"></path>
                    </svg>
                </button>
                <button class="action-btn" id="openLocationBtn" title="打开文件位置">
                    <svg viewBox="0 0 24 24">
                        <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"></path>
                    </svg>
                </button>
                <button class="action-btn" id="favoriteBtn" title="收藏图片">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path>
                    </svg>
                </button>
                <button class="action-btn" id="nextBtn" title="下一张图片">
                    <svg viewBox="0 0 24 24">
                        <path d="M5.88 4.12L13.76 12l-7.88 7.88L8 22l10-10L8 2z"></path>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <!-- 设置面板 -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <div class="settings-title">设置</div>
            <button class="close-settings" id="closeSettingsBtn">×</button>
        </div>
        
        <div class="settings-group">
            <div class="settings-group-title">显示设置</div>
            <div class="setting-item">
                <span class="setting-label">深色模式</span>
                <label class="switch">
                    <input type="checkbox" id="darkModeToggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="setting-item">
                <span class="setting-label">平板模式</span>
                <label class="switch">
                    <input type="checkbox" id="tabletModeToggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        
        <div class="settings-group">
            <div class="settings-group-title">文件夹设置</div>
            <div class="setting-item">
                <span class="setting-label">当前文件夹</span>
                <span class="setting-value" id="currentFolder">未选择</span>
            </div>
            <button class="auth-btn" id="changeFolderBtn" style="width:100%;margin-top:12px;">更改文件夹</button>
        </div>
        
        <div class="about-section">
            <div>MocaBolka feat. DeepSeek</div>
            <div class="version">版本 1.6.1</div>
        </div>
    </div>

    <!-- 删除确认对话框 -->
    <div class="dialog-overlay hidden" id="deleteDialog">
        <div class="dialog-content">
            <div class="dialog-title">删除图片</div>
            <div class="dialog-message">您确定要永久删除这张图片吗？此操作无法撤销。</div>
            <div class="dialog-buttons">
                <button class="dialog-btn cancel" id="cancelDeleteBtn">取消</button>
                <button class="dialog-btn confirm" id="confirmDeleteBtn">删除</button>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let directoryHandle;
        let imageFiles = [];
        let currentImageIndex = -1;
        let historyImages = [];
        const MAX_HISTORY = 3;
        const MAX_CACHE = 5;
        let imageCache = new Map();
        let settings = {
            darkMode: true,
            tabletMode: false
        };

        // DOM元素
        const authContainer = document.getElementById('authContainer');
        const authBtn = document.getElementById('authBtn');
        const loadingContainer = document.getElementById('loadingContainer');
        const mainContainer = document.getElementById('mainContainer');
        const fileName = document.getElementById('fileName');
        const fileModified = document.getElementById('fileModified');
        const historyItem1 = document.getElementById('historyItem1');
        const historyItem2 = document.getElementById('historyItem2');
        const historyItem3 = document.getElementById('historyItem3');
        const settingsBtn = document.getElementById('settingsBtn');
        const mainImage = document.getElementById('mainImage');
        const blurBackground = document.getElementById('blurBackground');
        const scrollableImage = document.getElementById('scrollableImage');
        const deleteBtn = document.getElementById('deleteBtn');
        const openAppBtn = document.getElementById('openAppBtn');
        const openLocationBtn = document.getElementById('openLocationBtn');
        const favoriteBtn = document.getElementById('favoriteBtn');
        const nextBtn = document.getElementById('nextBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const darkModeToggle = document.getElementById('darkModeToggle');
        const tabletModeToggle = document.getElementById('tabletModeToggle');
        const currentFolder = document.getElementById('currentFolder');
        const changeFolderBtn = document.getElementById('changeFolderBtn');
        const deleteDialog = document.getElementById('deleteDialog');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 加载保存的设置
            loadSettings();
            
            // 检查是否已有授权
            checkSavedDirectory();
            
            // 事件监听器
            setupEventListeners();
        });

        // 检查保存的目录
        async function checkSavedDirectory() {
            const savedDirHandleId = localStorage.getItem('directoryHandleId');
            if (savedDirHandleId) {
                try {
                    directoryHandle = await window.showDirectoryPicker({
                        id: savedDirHandleId,
                        mode: 'readwrite'
                    });
                    startLoadingImages();
                } catch (error) {
                    console.error('无法恢复保存的目录:', error);
                    localStorage.removeItem('directoryHandleId');
                }
            }
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 授权按钮
            authBtn.addEventListener('click', async () => {
                try {
                    directoryHandle = await window.showDirectoryPicker({
                        mode: 'readwrite'
                    });
                    localStorage.setItem('directoryHandleId', directoryHandle.id);
                    startLoadingImages();
                } catch (error) {
                    console.error('目录授权失败:', error);
                }
            });

            // 导航按钮
            nextBtn.addEventListener('click', showNextRandomImage);
            deleteBtn.addEventListener('click', showDeleteDialog);
            openAppBtn.addEventListener('click', openInDefaultApp);
            openLocationBtn.addEventListener('click', openFileLocation);
            favoriteBtn.addEventListener('click', addToFavorites);
            
            // 历史记录
            historyItem1.addEventListener('click', () => navigateHistory(0));
            historyItem2.addEventListener('click', () => navigateHistory(1));
            historyItem3.addEventListener('click', () => navigateHistory(2));
            
            // 设置按钮
            settingsBtn.addEventListener('click', () => {
                settingsPanel.classList.add('open');
            });
            
            closeSettingsBtn.addEventListener('click', () => {
                settingsPanel.classList.remove('open');
            });
            
            // 设置切换
            darkModeToggle.addEventListener('change', () => {
                settings.darkMode = darkModeToggle.checked;
                saveSettings();
                applyDarkMode();
            });
            
            tabletModeToggle.addEventListener('change', () => {
                settings.tabletMode = tabletModeToggle.checked;
                saveSettings();
                applyTabletMode();
            });
            
            changeFolderBtn.addEventListener('click', async () => {
                try {
                    directoryHandle = await window.showDirectoryPicker({
                        mode: 'readwrite'
                    });
                    localStorage.setItem('directoryHandleId', directoryHandle.id);
                    startLoadingImages();
                } catch (error) {
                    console.error('目录授权失败:', error);
                }
            });
            
            // 删除对话框
            cancelDeleteBtn.addEventListener('click', () => {
                deleteDialog.classList.add('hidden');
            });
            
            confirmDeleteBtn.addEventListener('click', deleteCurrentImage);
            
            // 拖放支持
            document.addEventListener('dragover', (e) => {
                e.preventDefault();
            });
            
            document.addEventListener('drop', async (e) => {
                e.preventDefault();
                if (e.dataTransfer.files.length > 0) {
                    const file = e.dataTransfer.files[0];
                    if (isImageFile(file)) {
                        const url = URL.createObjectURL(file);
                        displayImage(url, file.name, new Date(file.lastModified));
                    }
                }
            });
        }

        // 开始加载图片
        async function startLoadingImages() {
            authContainer.classList.add('hidden');
            loadingContainer.classList.remove('hidden');
            
            try {
                // 获取文件夹中的所有图片文件
                imageFiles = await getAllImageFiles(directoryHandle);
                
                // 更新UI
                currentFolder.textContent = directoryHandle.name;
                
                // 显示第一张图片
                if (imageFiles.length > 0) {
                    showNextRandomImage();
                    mainContainer.classList.remove('hidden');
                } else {
                    alert('文件夹中没有找到图片文件');
                }
            } catch (error) {
                console.error('加载图片失败:', error);
                alert('加载图片失败: ' + error.message);
            } finally {
                // 修复：确保加载动画在完成后隐藏
                loadingContainer.classList.add('hidden');
            }
        }

        // 获取所有图片文件
        async function getAllImageFiles(dirHandle) {
            const imageFiles = [];
            const allowedTypes = ['image/jpeg', 'image/png', 'image/heic', 'image/heif'];
            
            async function processDirectory(handle) {
                for await (const entry of handle.values()) {
                    if (entry.kind === 'file') {
                        const file = await entry.getFile();
                        if (allowedTypes.includes(file.type)) {
                            imageFiles.push({
                                handle: entry,
                                name: file.name,
                                lastModified: file.lastModified
                            });
                        }
                    } else if (entry.kind === 'directory') {
                        await processDirectory(entry);
                    }
                }
            }
            
            await processDirectory(dirHandle);
            return imageFiles;
        }

        // 显示下一张随机图片
        async function showNextRandomImage() {
            if (imageFiles.length === 0) return;
            
            // 随机选择一张图片
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * imageFiles.length);
            } while (newIndex === currentImageIndex && imageFiles.length > 1);
            
            currentImageIndex = newIndex;
            const imageInfo = imageFiles[currentImageIndex];
            
            // 添加到历史记录
            addToHistory(imageInfo);
            
            // 获取图片URL
            const file = await imageInfo.handle.getFile();
            const url = URL.createObjectURL(file);
            
            // 显示图片
            displayImage(url, imageInfo.name, new Date(imageInfo.lastModified));
            
            // 清理缓存
            manageCache();
        }

        // 显示图片
        function displayImage(url, name, modifiedDate) {
            // 更新文件名和修改时间
            fileName.textContent = name;
            fileModified.textContent = `最后修改时间: ${modifiedDate.toLocaleString()}`;
            
            // 设置主图片
            mainImage.src = url;
            mainImage.onload = () => {
                // 更新模糊背景
                blurBackground.style.backgroundImage = `url(${url})`;
                
                // 检查是否需要滚动
                const aspectRatio = mainImage.naturalWidth / mainImage.naturalHeight;
                if (aspectRatio > 2 || aspectRatio < 0.5) {
                    scrollableImage.style.overflow = 'auto';
                } else {
                    scrollableImage.style.overflow = 'hidden';
                }
            };
        }

        // 添加到历史记录
        function addToHistory(imageInfo) {
            // 添加到历史记录开头
            historyImages.unshift({
                name: imageInfo.name,
                handle: imageInfo.handle,
                lastModified: imageInfo.lastModified
            });
            
            // 限制历史记录长度
            if (historyImages.length > MAX_HISTORY) {
                historyImages.pop();
            }
            
            // 更新历史记录UI
            updateHistoryUI();
        }

        // 更新历史记录UI
        async function updateHistoryUI() {
            const historyItems = [historyItem1, historyItem2, historyItem3];
            
            for (let i = 0; i < MAX_HISTORY; i++) {
                const item = historyItems[i];
                if (i < historyImages.length) {
                    const imageInfo = historyImages[i];
                    const file = await imageInfo.handle.getFile();
                    const url = URL.createObjectURL(file);
                    
                    // 创建缩略图
                    if (!item.querySelector('img')) {
                        const img = document.createElement('img');
                        item.appendChild(img);
                    }
                    
                    item.querySelector('img').src = url;
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            }
        }

        // 导航历史记录
        async function navigateHistory(index) {
            if (index >= historyImages.length) return;
            
            const imageInfo = historyImages[index];
            const file = await imageInfo.handle.getFile();
            const url = URL.createObjectURL(file);
            
            // 显示图片
            displayImage(url, imageInfo.name, new Date(imageInfo.lastModified));
            
            // 更新当前图片索引
            currentImageIndex = imageFiles.findIndex(file => file.name === imageInfo.name);
            
            // 管理缓存
            manageCache();
        }

        // 管理图片缓存
        function manageCache() {
            // 简单实现：当缓存超过限制时，移除最旧的URL
            if (imageCache.size > MAX_CACHE) {
                const oldestKey = imageCache.keys().next().value;
                URL.revokeObjectURL(imageCache.get(oldestKey));
                imageCache.delete(oldestKey);
            }
        }

        // 显示删除对话框
        function showDeleteDialog() {
            // 修复：确保只有在点击删除按钮时才显示对话框
            deleteDialog.classList.remove('hidden');
        }

        // 删除当前图片
        async function deleteCurrentImage() {
            // 修复：确保对话框在操作后关闭
            deleteDialog.classList.add('hidden');
            
            if (currentImageIndex < 0 || currentImageIndex >= imageFiles.length) return;
            
            try {
                // 从文件系统中删除文件
                await directoryHandle.removeEntry(imageFiles[currentImageIndex].name);
                
                // 从列表中移除
                imageFiles.splice(currentImageIndex, 1);
                
                // 显示下一张图片
                if (imageFiles.length > 0) {
                    showNextRandomImage();
                } else {
                    alert('文件夹中没有更多图片');
                }
            } catch (error) {
                console.error('删除文件失败:', error);
                alert('删除文件失败: ' + error.message);
            }
        }

        // 在默认应用中打开
        async function openInDefaultApp() {
            if (currentImageIndex < 0) return;
            
            try {
                const file = await imageFiles[currentImageIndex].handle.getFile();
                const url = URL.createObjectURL(file);
                window.open(url, '_blank');
            } catch (error) {
                console.error('打开应用失败:', error);
            }
        }

        // 打开文件位置
        async function openFileLocation() {
            // 在浏览器中无法直接打开文件位置
            console.log('在浏览器环境中无法直接打开文件位置');
        }

        // 添加到收藏
        async function addToFavorites() {
            if (currentImageIndex < 0) return;
            
            try {
                // 获取或创建Collections文件夹
                let collectionsHandle;
                try {
                    collectionsHandle = await directoryHandle.getDirectoryHandle('Collections', { create: true });
                } catch (error) {
                    console.error('创建Collections文件夹失败:', error);
                    return;
                }
                
                // 移动文件
                const sourceFile = imageFiles[currentImageIndex];
                const sourceHandle = sourceFile.handle;
                
                // 复制文件到Collections文件夹
                const source = await sourceHandle.getFile();
                const newFileHandle = await collectionsHandle.getFileHandle(sourceFile.name, { create: true });
                const writable = await newFileHandle.createWritable();
                await writable.write(source);
                await writable.close();
                
                // 从原位置删除文件
                await directoryHandle.removeEntry(sourceFile.name);
                
                // 从列表中移除
                imageFiles.splice(currentImageIndex, 1);
                
                // 显示下一张图片
                if (imageFiles.length > 0) {
                    showNextRandomImage();
                }
            } catch (error) {
                console.error('添加到收藏失败:', error);
                alert('添加到收藏失败: ' + error.message);
            }
        }

        // 加载设置
        function loadSettings() {
            const savedSettings = localStorage.getItem('imageViewerSettings');
            if (savedSettings) {
                try {
                    settings = JSON.parse(savedSettings);
                    darkModeToggle.checked = settings.darkMode;
                    tabletModeToggle.checked = settings.tabletMode;
                    applyDarkMode();
                    applyTabletMode();
                } catch (e) {
                    console.error('加载设置失败:', e);
                }
            }
        }

        // 保存设置
        function saveSettings() {
            localStorage.setItem('imageViewerSettings', JSON.stringify(settings));
        }

        // 应用深色模式
        function applyDarkMode() {
            // 由CSS媒体查询自动处理
        }

        // 应用平板模式
        function applyTabletMode() {
            if (settings.tabletMode) {
                document.body.classList.add('tablet-mode');
            } else {
                document.body.classList.remove('tablet-mode');
            }
        }

        // 检查是否为图片文件
        function isImageFile(file) {
            const allowedTypes = ['image/jpeg', 'image/png', 'image/heic', 'image/heif'];
            return allowedTypes.includes(file.type);
        }
    </script>
</body>
