<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地图片浏览器</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
            --button-bg: #f5f5f5;
            --button-hover: #e9e9e9;
            --sidebar-bg: rgba(255, 255, 255, 0.8);
            --overlay-bg: rgba(0, 0, 0, 0.5);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --border-color: #444444;
            --button-bg: #2a2a2a;
            --button-hover: #3a3a3a;
            --sidebar-bg: rgba(30, 30, 30, 0.8);
            --overlay-bg: rgba(0, 0, 0, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* 授权界面样式 */
        #authorization {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
        }

        #authorization h1 {
            margin-bottom: 20px;
            font-size: 2rem;
        }

        #authorization p {
            margin-bottom: 30px;
            max-width: 600px;
            line-height: 1.6;
        }

        #folder-input {
            display: none;
        }

        .btn {
            background-color: var(--button-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.2s;
            margin: 5px;
        }

        .btn:hover {
            background-color: var(--button-hover);
        }

        /* 加载动画 */
        .loader {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #3498db;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 主界面样式 */
        #main-container {
            display: none;
            height: 100vh;
            position: relative;
        }

        /* 高斯模糊背景 */
        .blur-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(20px);
            opacity: 0.5;
            z-index: -1;
        }

        /* 主图片容器 */
        .image-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 120px);
            padding: 20px;
            position: relative;
        }

        .main-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        /* 顶部文件信息 */
        .file-info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--overlay-bg);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            max-width: 80%;
            text-align: center;
            z-index: 10;
        }

        .filename {
            display: inline-block;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 侧边栏 */
        .sidebar {
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            width: 300px;
            background-color: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            padding: 20px;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 20;
        }

        .sidebar.active {
            transform: translateX(0);
        }

        .sidebar h3 {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .exif-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .exif-item {
            margin-bottom: 10px;
        }

        .exif-label {
            font-weight: bold;
            font-size: 0.85rem;
        }

        .exif-value {
            font-size: 0.9rem;
        }

        /* 底部按钮 */
        .bottom-buttons {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        /* 左上角历史记录 */
        .history-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .history-thumb {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-thumb:hover {
            transform: scale(1.05);
            border-color: #3498db;
        }

        .settings-btn {
            position: absolute;
            top: 90px;
            left: 20px;
            width: 30px;
            height: 30px;
            cursor: pointer;
            z-index: 10;
        }

        /* 左侧设置面板 */
        .settings-panel {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 300px;
            background-color: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            padding: 20px;
            overflow-y: auto;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 20;
        }

        .settings-panel.active {
            transform: translateX(0);
        }

        .settings-panel h2 {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .setting-item {
            margin-bottom: 20px;
        }

        .setting-item label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #3498db;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* 平板模式样式 */
        .tablet-mode .bottom-buttons {
            flex-direction: column;
            left: 20px;
            transform: none;
        }

        .tablet-mode .history-panel {
            top: auto;
            bottom: 150px;
            left: 20px;
            flex-direction: column;
        }

        /* 长宽比处理 */
        .wide-image {
            max-height: 80vh;
            max-width: 100%;
        }

        .tall-image {
            max-width: 80vw;
            max-height: 100%;
        }

        /* 确认对话框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--bg-color);
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        /* 关于信息 */
        .about-section {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            text-align: center;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>
    <!-- 授权界面 -->
    <section id="authorization">
        <h1>本地图片浏览器</h1>
        <p>此应用需要访问您的本地图片文件夹以展示图片内容。请授权访问一个包含图片的文件夹（支持JPG、PNG、HEIC格式）。</p>
        <button id="select-folder-btn" class="btn">选择文件夹</button>
        <input type="file" id="folder-input" webkitdirectory directory multiple>
        
        <div class="loader">
            <div class="spinner"></div>
            <p>正在加载文件夹内容...</p>
            <p id="loading-progress">剩余时间估算中...</p>
        </div>
    </section>

    <!-- 主界面 -->
    <main id="main-container">
        <!-- 高斯模糊背景 -->
        <div class="blur-background" id="blur-bg"></div>
        
        <!-- 顶部文件信息 -->
        <div class="file-info">
            <span class="filename" id="filename">未加载图片</span>
            <span> • </span>
            <span id="file-date">--/--/---- --:--</span>
        </div>
        
        <!-- 图片容器 -->
        <div class="image-container">
            <img id="main-image" class="main-image" alt="当前图片">
        </div>
        
        <!-- EXIF信息侧边栏 -->
        <aside class="sidebar" id="exif-sidebar">
            <h3>图片信息</h3>
            <div class="exif-info" id="exif-container">
                <!-- EXIF信息将通过JS动态填充 -->
            </div>
        </aside>
        
        <!-- 设置面板 -->
        <aside class="settings-panel" id="settings-panel">
            <h2>设置</h2>
            
            <div class="setting-item">
                <label for="dark-mode">深色模式</label>
                <label class="switch">
                    <input type="checkbox" id="dark-mode">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="setting-item">
                <label for="tablet-mode">平板模式</label>
                <label class="switch">
                    <input type="checkbox" id="tablet-mode">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="setting-item">
                <label>文件夹路径</label>
                <p id="current-folder-path">未选择文件夹</p>
                <button class="btn" id="change-folder-btn">更改文件夹</button>
            </div>
            
            <div class="about-section">
                <p>MocaBolka feat. DeepSeek</p>
                <p>版本 1.0.0</p>
            </div>
        </aside>
        
        <!-- 历史记录面板 -->
        <div class="history-panel" id="history-panel">
            <!-- 历史记录缩略图将通过JS动态填充 -->
        </div>
        
        <!-- 设置按钮 -->
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23333'%3E%3Cpath d='M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.3-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.09-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94 0 .31.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.3.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z'/%3E%3C/svg%3E" 
             class="settings-btn" id="settings-btn" alt="设置">
        
        <!-- 底部操作按钮 -->
        <div class="bottom-buttons">
            <button class="btn" id="delete-btn">删除</button>
            <button class="btn" id="open-btn">打开</button>
            <button class="btn" id="explorer-btn">位置</button>
            <button class="btn" id="favorite-btn">收藏</button>
            <button class="btn" id="next-btn">下一张</button>
        </div>
    </main>
    
    <!-- 删除确认对话框 -->
    <div class="modal" id="delete-modal">
        <div class="modal-content">
            <h3>确认删除</h3>
            <p>您确定要永久删除这张图片吗？此操作无法撤销。</p>
            <div class="modal-buttons">
                <button class="btn" id="cancel-delete">取消</button>
                <button class="btn" id="confirm-delete">删除</button>
            </div>
        </div>
    </div>

    <script>
        // 应用状态管理
        const appState = {
            folderHandle: null,
            imageFiles: [],
            currentImageIndex: -1,
            history: [],
            settings: {
                darkMode: false,
                tabletMode: false,
                folderPath: ''
            },
            imageCache: new Map(),
            maxCacheSize: 5
        };

        // DOM元素引用
        const dom = {
            authSection: document.getElementById('authorization'),
            mainContainer: document.getElementById('main-container'),
            folderInput: document.getElementById('folder-input'),
            selectFolderBtn: document.getElementById('select-folder-btn'),
            loader: document.querySelector('.loader'),
            loadingProgress: document.getElementById('loading-progress'),
            mainImage: document.getElementById('main-image'),
            blurBg: document.getElementById('blur-bg'),
            filename: document.getElementById('filename'),
            fileDate: document.getElementById('file-date'),
            exifSidebar: document.getElementById('exif-sidebar'),
            exifContainer: document.getElementById('exif-container'),
            settingsPanel: document.getElementById('settings-panel'),
            settingsBtn: document.getElementById('settings-btn'),
            historyPanel: document.getElementById('history-panel'),
            deleteBtn: document.getElementById('delete-btn'),
            openBtn: document.getElementById('open-btn'),
            explorerBtn: document.getElementById('explorer-btn'),
            favoriteBtn: document.getElementById('favorite-btn'),
            nextBtn: document.getElementById('next-btn'),
            deleteModal: document.getElementById('delete-modal'),
            cancelDelete: document.getElementById('cancel-delete'),
            confirmDelete: document.getElementById('confirm-delete'),
            darkModeToggle: document.getElementById('dark-mode'),
            tabletModeToggle: document.getElementById('tablet-mode'),
            currentFolderPath: document.getElementById('current-folder-path'),
            changeFolderBtn: document.getElementById('change-folder-btn')
        };

        // 初始化应用
        function initApp() {
            loadSettings();
            setupEventListeners();
            checkFolderAuthorization();
        }

        // 加载设置
        function loadSettings() {
            const savedSettings = localStorage.getItem('imageBrowserSettings');
            if (savedSettings) {
                appState.settings = JSON.parse(savedSettings);
                applySettings();
            }
            
            // 检查系统深色模式
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                appState.settings.darkMode = true;
            }
            
            applySettings();
        }

        // 应用设置
        function applySettings() {
            // 深色模式
            if (appState.settings.darkMode) {
                document.documentElement.setAttribute('data-theme', 'dark');
                dom.darkModeToggle.checked = true;
            } else {
                document.documentElement.removeAttribute('data-theme');
                dom.darkModeToggle.checked = false;
            }
            
            // 平板模式
            if (appState.settings.tabletMode) {
                document.body.classList.add('tablet-mode');
                dom.tabletModeToggle.checked = true;
            } else {
                document.body.classList.remove('tablet-mode');
                dom.tabletModeToggle.checked = false;
            }
            
            // 保存设置
            localStorage.setItem('imageBrowserSettings', JSON.stringify(appState.settings));
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 文件夹选择
            dom.selectFolderBtn.addEventListener('click', () => dom.folderInput.click());
            dom.folderInput.addEventListener('change', handleFolderSelection);
            dom.changeFolderBtn.addEventListener('click', () => dom.folderInput.click());
            
            // 导航按钮
            dom.nextBtn.addEventListener('click', showRandomImage);
            dom.settingsBtn.addEventListener('click', toggleSettingsPanel);
            
            // 图片操作按钮
            dom.deleteBtn.addEventListener('click', showDeleteConfirmation);
            dom.cancelDelete.addEventListener('click', hideDeleteConfirmation);
            dom.confirmDelete.addEventListener('click', deleteCurrentImage);
            dom.openBtn.addEventListener('click', openInDefaultApp);
            dom.explorerBtn.addEventListener('click', showInExplorer);
            dom.favoriteBtn.addEventListener('click', addToFavorites);
            
            // 设置切换
            dom.darkModeToggle.addEventListener('change', toggleDarkMode);
            dom.tabletModeToggle.addEventListener('change', toggleTabletMode);
            
            // 拖放支持
            document.addEventListener('dragover', handleDragOver);
            document.addEventListener('drop', handleDrop);
        }

        // 检查已有文件夹授权
        function checkFolderAuthorization() {
            const savedFolder = localStorage.getItem('lastFolderPath');
            if (savedFolder) {
                appState.settings.folderPath = savedFolder;
                dom.currentFolderPath.textContent = savedFolder;
                loadFolderContents();
            }
        }

        // 处理文件夹选择
        async function handleFolderSelection(event) {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;
            
            // 显示加载动画
            dom.authSection.style.display = 'none';
            dom.loader.style.display = 'flex';
            
            // 过滤图片文件
            appState.imageFiles = files.filter(file => 
                file.type.startsWith('image/') && 
                ['image/jpeg', 'image/png', 'image/heic'].includes(file.type)
            );
            
            // 保存文件夹路径
            const folderPath = files[0].webkitRelativePath.split('/')[0];
            appState.settings.folderPath = folderPath;
            dom.currentFolderPath.textContent = folderPath;
            localStorage.setItem('lastFolderPath', folderPath);
            
            // 模拟加载进度
            simulateLoadingProgress();
            
            // 加载完成后显示主界面
            setTimeout(() => {
                dom.loader.style.display = 'none';
                dom.mainContainer.style.display = 'block';
                showRandomImage();
            }, 2000);
        }

        // 模拟加载进度
        function simulateLoadingProgress() {
            let progress = 0;
            const total = 100;
            const interval = setInterval(() => {
                progress += 5;
                const remaining = total - progress;
                const seconds = Math.ceil(remaining / 5);
                dom.loadingProgress.textContent = `剩余时间: ${seconds}秒`;
                
                if (progress >= total) {
                    clearInterval(interval);
                }
            }, 200);
        }

        // 显示随机图片
        function showRandomImage() {
            if (appState.imageFiles.length === 0) return;
            
            // 随机选择图片
            const randomIndex = Math.floor(Math.random() * appState.imageFiles.length);
            appState.currentImageIndex = randomIndex;
            const file = appState.imageFiles[randomIndex];
            
            // 更新历史记录
            updateHistory(file);
            
            // 显示图片
            displayImage(file);
            
            // 显示文件信息
            displayFileInfo(file);
            
            // 检查并显示EXIF信息
            checkExifData(file);
        }

        // 显示图片
        function displayImage(file) {
            const reader = new FileReader();
            
            reader.onload = (e) => {
                // 缓存图片
                if (appState.imageCache.size >= appState.maxCacheSize) {
                    // 移除最旧的缓存
                    const oldestKey = appState.imageCache.keys().next().value;
                    appState.imageCache.delete(oldestKey);
                }
                appState.imageCache.set(file.name, e.target.result);
                
                // 设置主图片
                dom.mainImage.src = e.target.result;
                
                // 设置模糊背景
                dom.blurBg.style.backgroundImage = `url(${e.target.result})`;
                
                // 处理特殊长宽比
                handleAspectRatio();
            };
            
            reader.readAsDataURL(file);
        }

        // 处理特殊长宽比
        function handleAspectRatio() {
            const img = dom.mainImage;
            img.onload = () => {
                const ratio = img.naturalWidth / img.naturalHeight;
                
                if (ratio > 2) {
                    // 超宽图
                    img.classList.add('wide-image');
                    img.classList.remove('tall-image');
                } else if (ratio < 0.5) {
                    // 超长图
                    img.classList.add('tall-image');
                    img.classList.remove('wide-image');
                } else {
                    // 正常比例
                    img.classList.remove('wide-image', 'tall-image');
                }
            };
        }

        // 显示文件信息
        function displayFileInfo(file) {
            // 文件名
            const name = file.name.length > 20 ? 
                file.name.substring(0, 17) + '...' : 
                file.name;
            dom.filename.textContent = name;
            
            // 修改日期
            const date = new Date(file.lastModified);
            const formattedDate = `${date.getFullYear()}/${(date.getMonth()+1).toString().padStart(2, '0')}/${date.getDate().toString().padStart(2, '0')} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
            dom.fileDate.textContent = formattedDate;
        }

        // 检查并显示EXIF信息
        function checkExifData(file) {
            // 模拟EXIF数据
            const hasExif = Math.random() > 0.3; // 70%的图片有EXIF数据
            
            if (hasExif) {
                displayExifData(generateExifData());
                dom.exifSidebar.classList.add('active');
            } else {
                dom.exifSidebar.classList.remove('active');
            }
        }

        // 生成模拟EXIF数据
        function generateExifData() {
            const cameras = ['Canon EOS R5', 'Nikon Z7', 'Sony A7R IV', 'Fujifilm X-T4'];
            const lenses = ['RF 24-70mm f/2.8', 'NIKKOR Z 24-70mm f/4', 'FE 24-70mm f/2.8 GM', 'XF 16-80mm f/4'];
            
            return {
                make: ['Canon', 'Nikon', 'Sony', 'Fujifilm'][Math.floor(Math.random() * 4)],
                model: cameras[Math.floor(Math.random() * cameras.length)],
                aperture: `f/${(Math.random() * 4 + 1.8).toFixed(1)}`,
                exposure: `1/${Math.floor(Math.random() * 4000 + 100)}`,
                iso: Math.floor(Math.random() * 6400 + 100),
                focalLength: `${Math.floor(Math.random() * 200 + 24)}mm`,
                lensModel: lenses[Math.floor(Math.random() * lenses.length)]
            };
        }

        // 显示EXIF数据
        function displayExifData(exif) {
            dom.exifContainer.innerHTML = `
                <div class="exif-item">
                    <div class="exif-label">制造商</div>
                    <div class="exif-value">${exif.make}</div>
                </div>
                <div class="exif-item">
                    <div class="exif-label">型号</div>
                    <div class="exif-value">${exif.model}</div>
                </div>
                <div class="exif-item">
                    <div class="exif-label">光圈值</div>
                    <div class="exif-value">${exif.aperture}</div>
                </div>
                <div class="exif-item">
                    <div class="exif-label">曝光时间</div>
                    <div class="exif-value">${exif.exposure}秒</div>
                </div>
                <div class="exif-item">
                    <div class="exif-label">ISO</div>
                    <div class="exif-value">${exif.iso}</div>
                </div>
                <div class="exif-item">
                    <div class="exif-label">焦距</div>
                    <div class="exif-value">${exif.focalLength}</div>
                </div>
                <div class="exif-item">
                    <div class="exif-label">镜头</div>
                    <div class="exif-value">${exif.lensModel}</div>
                </div>
            `;
        }

        // 更新历史记录
        function updateHistory(file) {
            // 添加到历史记录
            appState.history.unshift(file);
            
            // 只保留最近3条记录
            if (appState.history.length > 3) {
                appState.history.pop();
            }
            
            // 更新UI
            dom.historyPanel.innerHTML = '';
            appState.history.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'history-thumb';
                    img.dataset.index = index;
                    img.addEventListener('click', () => showHistoryImage(index));
                    dom.historyPanel.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }

        // 显示历史图片
        function showHistoryImage(index) {
            const file = appState.history[index];
            displayImage(file);
            displayFileInfo(file);
            checkExifData(file);
        }

        // 切换设置面板
        function toggleSettingsPanel() {
            dom.settingsPanel.classList.toggle('active');
        }

        // 切换深色模式
        function toggleDarkMode() {
            appState.settings.darkMode = dom.darkModeToggle.checked;
            applySettings();
        }

        // 切换平板模式
        function toggleTabletMode() {
            appState.settings.tabletMode = dom.tabletModeToggle.checked;
            applySettings();
        }

        // 显示删除确认对话框
        function showDeleteConfirmation() {
            dom.deleteModal.style.display = 'flex';
        }

        // 隐藏删除确认对话框
        function hideDeleteConfirmation() {
            dom.deleteModal.style.display = 'none';
        }

        // 删除当前图片
        function deleteCurrentImage() {
            if (appState.currentImageIndex === -1) return;
            
            // 从文件列表中移除
            appState.imageFiles.splice(appState.currentImageIndex, 1);
            
            // 从历史记录中移除
            const currentFile = appState.imageFiles[appState.currentImageIndex];
            appState.history = appState.history.filter(file => file !== currentFile);
            
            // 隐藏对话框并显示下一张图片
            hideDeleteConfirmation();
            showRandomImage();
        }

        // 在默认应用中打开
        function openInDefaultApp() {
            if (appState.currentImageIndex === -1) return;
            
            const file = appState.imageFiles[appState.currentImageIndex];
            const url = URL.createObjectURL(file);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = file.name;
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            
            // 清理
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        }

        // 在资源管理器中显示位置
        function showInExplorer() {
            alert('在实际应用中，这里会打开文件资源管理器并定位到当前文件');
        }

        // 添加到收藏
        function addToFavorites() {
            if (appState.currentImageIndex === -1) return;
            
            const file = appState.imageFiles[appState.currentImageIndex];
            alert(`已将 "${file.name}" 添加到收藏夹`);
        }

        // 处理拖放事件
        function handleDragOver(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // 处理文件拖放
        function handleDrop(e) {
            e.preventDefault();
            e.stopPropagation();
            
            const files = e.dataTransfer.files;
            if (files.length === 0) return;
            
            // 处理拖放的文件
            const imageFiles = Array.from(files).filter(file => 
                file.type.startsWith('image/') && 
                ['image/jpeg', 'image/png', 'image/heic'].includes(file.type)
            );
            
            if (imageFiles.length > 0) {
                // 添加到文件列表
                appState.imageFiles = [...appState.imageFiles, ...imageFiles];
                
                // 显示第一张图片
                appState.currentImageIndex = appState.imageFiles.length - 1;
                displayImage(imageFiles[0]);
                displayFileInfo(imageFiles[0]);
                checkExifData(imageFiles[0]);
            }
        }

        // 初始化应用
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
