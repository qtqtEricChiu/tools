<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地图片浏览器 v1.8</title>
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-color: #4a8cff;
            --border-color: #333333;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.25);
            --transition: all 0.3s ease;
            --font-main: "OPPO Sans 4.0", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #f5f5f5;
                --bg-secondary: #ffffff;
                --text-primary: #333333;
                --text-secondary: #666666;
                --border-color: #e0e0e0;
                --card-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
            user-select: none; /* Disable text selection */
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: rgba(100, 100, 100, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(150, 150, 150, 0.5); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(180, 180, 180, 0.7); }

        /* 授权界面 */
        .auth-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-primary); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; transition: opacity 0.5s ease; }
        .auth-container.hidden { opacity: 0; pointer-events: none; }
        .auth-content { background-color: var(--bg-secondary); border-radius: 16px; padding: 40px; max-width: 800px; text-align: center; box-shadow: var(--card-shadow); display: flex; flex-direction: column; gap: 30px; }
        .auth-main { display: flex; gap: 40px; align-items: flex-start; }
        .auth-left, .auth-right { flex: 1; text-align: left;}
        .auth-content h1 { margin-bottom: 20px; font-weight: 500; }
        .auth-content p { color: var(--text-secondary); margin-bottom: 30px; line-height: 1.6; }
        .auth-btn { background-color: var(--accent-color); color: white; border: none; padding: 12px 32px; border-radius: 8px; font-size: 16px; font-family: inherit; cursor: pointer; transition: var(--transition); font-weight: 500; }
        .auth-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .authorized-folders { margin-top: 20px; }
        .folders-title { font-size: 16px; font-weight: 500; margin-bottom: 15px; color: var(--text-primary); }
        .folder-list { max-height: 200px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; }
        .folder-item { padding: 10px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: var(--transition); }
        .folder-item:last-child { border-bottom: none; }
        .folder-item:hover { background-color: rgba(255, 255, 255, 0.05); }

        /* 加载动画 */
        .loading-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; backdrop-filter: blur(10px); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .loading-container.show { opacity: 1; pointer-events: all; }
        .loading-spinner { width: 60px; height: 60px; border: 4px solid rgba(255, 255, 255, 0.1); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        .loading-text { color: white; font-size: 18px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 主界面布局 */
        .main-container { display: grid; grid-template-columns: auto 1fr; grid-template-rows: auto 1fr auto; height: 100vh; grid-template-areas: "header header" "history main" "footer footer"; opacity: 0; transition: opacity 0.5s ease; }
        .main-container.show { opacity: 1; }

        /* 顶部标题栏 */
        .header { grid-area: header; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); background-color: var(--bg-secondary); z-index: 10; height: 65px; }
        .file-info { display: flex; flex-direction: column; max-width: 70%; }
        .file-name { font-size: 18px; font-weight: 500; position: relative; white-space: nowrap; overflow: hidden; }
        .file-name.long::after { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 40px; background: linear-gradient(90deg, transparent, var(--bg-secondary)); }
        .file-modified { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
        .header-actions { display: flex; align-items: center; gap: 16px; }
        .fullscreen-btn { background: none; border: none; cursor: pointer; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background-color 0.2s; }
        .fullscreen-btn:hover { background-color: rgba(255, 255, 255, 0.1); }
        .fullscreen-btn svg { width: 24px; height: 24px; fill: var(--text-primary); }

        /* 左侧历史记录 */
        .history-panel { grid-area: history; width: 100px; padding: 16px; display: flex; flex-direction: column; align-items: center; border-right: 1px solid var(--border-color); background-color: var(--bg-secondary); z-index: 5; transition: opacity 0.3s; }
        .history-title { font-size: 14px; color: var(--text-secondary); margin-bottom: 12px; text-align: center; }
        .history-item { width: 70px; height: 70px; border-radius: 8px; overflow: hidden; margin-bottom: 12px; cursor: pointer; position: relative; background-color: var(--bg-primary); border: 1px solid var(--border-color); transition: var(--transition); }
        .history-item:hover { transform: scale(1.05); border-color: var(--accent-color); }
        .history-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .settings-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; margin-top: auto; transition: var(--transition); }
        .settings-btn:hover { background-color: rgba(255, 255, 255, 0.1); }
        .settings-btn svg { width: 24px; height: 24px; fill: var(--text-primary); }

        /* 主图片区域 */
        .main-content { grid-area: main; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; padding-bottom: 80px; }
        .image-container { position: relative; max-width: 100%; max-height: 100%; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .main-image { max-width: 100%; max-height: calc(100vh - 145px); object-fit: contain; transition: opacity 0.3s ease; opacity: 0; }
        .main-image.show { opacity: 1; }
        .blur-background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(20px) brightness(0.5); opacity: 0; z-index: -1; transition: opacity 0.3s ease; }
        .blur-background.show { opacity: 0.7; }
        .scrollable-image { max-height: calc(100vh - 145px); overflow: hidden; }

        /* 平板模式布局调整 */
        body.tablet-mode .main-content { padding-bottom: 0; }
        body.tablet-mode .main-image, body.tablet-mode .scrollable-image { max-height: calc(100vh - 65px); }

        /* 底部操作栏 */
        .footer { grid-area: footer; padding: 16px 24px; display: flex; justify-content: center; align-items: center; border-top: 1px solid var(--border-color); background-color: var(--bg-secondary); z-index: 10; position: fixed; bottom: 0; left: 100px; right: 0; height: 80px; }
        .action-buttons { display: flex; gap: 16px; align-items: center; }
        .action-btn { width: 48px; height: 48px; border-radius: 50%; display: flex; justify-content: center; align-items: center; background-color: rgba(255, 255, 255, 0.1); border: none; cursor: pointer; transition: var(--transition); }
        .action-btn:hover { background-color: rgba(255, 255, 255, 0.2); transform: translateY(-4px); }
        .action-btn svg { width: 24px; height: 24px; fill: var(--text-primary); }
        .custom-action-btn { background-color: #333; color: white; border-radius: 24px; padding: 0 16px; height: 48px; font-size: 16px; font-weight: 500; display: none; }
        
        /* 平板模式浮动按钮 */
        .tablet-action-buttons { position: fixed; right: 40px; top: 50%; transform: translateY(-50%); display: none; flex-direction: column; gap: 16px; z-index: 50; opacity: 0; transition: var(--transition); }
        body.tablet-mode .tablet-action-buttons { display: flex; opacity: 1; transform: translateY(-50%) translateX(0); }
        .tablet-action-btn { width: 64px; height: 64px; border-radius: 50%; display: flex; justify-content: center; align-items: center; background-color: rgba(255, 255, 255, 0.1); border: none; cursor: pointer; transition: var(--transition); box-shadow: var(--card-shadow); }
        .tablet-action-btn:hover { background-color: rgba(255, 255, 255, 0.2); transform: translateY(-4px); }
        .tablet-action-btn svg { width: 32px; height: 32px; fill: var(--text-primary); }
        .tablet-custom-action-btn { display: none; width: 64px; height: 64px; font-size: 18px; font-weight: bold; background-color: #333; color: white; }

        /* 设置面板 */
        .settings-panel { position: absolute; top: 0; left: 0; width: 320px; height: 100%; background-color: var(--bg-secondary); z-index: 20; transform: translateX(-100%); transition: transform 0.3s ease; padding: 24px; border-right: 1px solid var(--border-color); overflow-y: auto; }
        .settings-panel.open { transform: translateX(0); }
        .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .settings-title { font-size: 20px; font-weight: 500; }
        .close-settings { background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 24px; width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; border-radius: 50%; transition: var(--transition); }
        .close-settings:hover { background-color: rgba(255, 255, 255, 0.1); }
        .settings-group { margin-bottom: 24px; }
        .settings-group-title { font-size: 16px; font-weight: 500; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-color); }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; }
        .setting-label { font-size: 14px; margin-right: 10px; }
        .switch { position: relative; display: inline-block; width: 48px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(24px); }
        .custom-path-input { background-color: var(--bg-primary); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 6px; padding: 6px 10px; width: 100%; margin-top: 8px; font-family: inherit; }
        .about-section { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border-color); text-align: center; }
        .version { font-size: 14px; color: var(--text-secondary); margin-top: 8px; }

        /* 计数显示 */
        .count-display { position: fixed; right: 20px; bottom: 100px; background-color: rgba(0, 0, 0, 0.7); color: white; padding: 8px 12px; border-radius: 20px; font-size: 14px; z-index: 30; backdrop-filter: blur(10px); transition: opacity 0.3s; }
        
        /* Toast通知 */
        .toast-container { position: fixed; left: 50%; top: 20px; transform: translateX(-50%) translateY(-100px); background-color: var(--bg-secondary); color: var(--text-primary); padding: 16px 24px; border-radius: 8px; box-shadow: var(--card-shadow); display: flex; align-items: center; gap: 16px; z-index: 1000; opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease; pointer-events: none; }
        .toast-container.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: all; }
        .toast-icon, .toast-message, .toast-undo { /* styles from before */ }

        /* 设置面板遮罩 */
        .settings-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); z-index: 15; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .settings-panel.open + .settings-overlay { opacity: 1; pointer-events: all; }

        /* 热键提示 */
        .hotkey-info, .hotkey-item, .hotkey-label, .hotkey-value { /* styles from before */ }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Auth, Loading, Toast, Count Display... -->

    <!-- 主界面 -->
    <div class="main-container" id="mainContainer">
        <!-- 顶部标题栏 -->
        <header class="header">
            <div class="file-info">
                <div class="file-name" id="fileName">未选择图片</div>
                <div class="file-modified" id="fileModified">最后修改时间: --</div>
            </div>
            <div class="header-actions">
                <button class="fullscreen-btn" id="fullscreenBtn" title="全屏">
                    <svg id="fullscreenIconEnter" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"></path></svg>
                    <svg id="fullscreenIconExit" viewBox="0 0 24 24" class="hidden"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"></path></svg>
                </button>
            </div>
        </header>

        <!-- 左侧历史记录 -->
        <div class="history-panel" id="historyPanel">
            <!-- ... -->
        </div>

        <!-- 主图片区域 -->
        <main class="main-content">
            <!-- ... -->
        </main>

        <!-- 底部操作栏 -->
        <footer class="footer">
            <div class="action-buttons">
                <button class="action-btn" id="deleteBtn" title="删除图片"><!-- ... --></button>
                <button class="action-btn" id="viewLargeBtn" title="查看大图"><!-- ... --></button>
                <button class="action-btn" id="favoriteBtn" title="收藏图片"><!-- ... --></button>
                <button class="action-btn custom-action-btn" id="customBtn1"></button>
                <button class="action-btn custom-action-btn" id="customBtn2"></button>
                <button class="action-btn custom-action-btn" id="customBtn3"></button>
                <button class="action-btn" id="nextBtn" title="下一张图片"><!-- ... --></button>
            </div>
        </footer>
    </div>

    <!-- 平板模式浮动按钮 -->
    <div class="tablet-action-buttons" id="tabletActionButtons">
        <button class="tablet-action-btn" id="tabletDeleteBtn" title="删除图片"><!-- ... --></button>
        <button class="tablet-action-btn" id="tabletViewLargeBtn" title="查看大图"><!-- ... --></button>
        <button class="tablet-action-btn" id="tabletFavoriteBtn" title="收藏图片"><!-- ... --></button>
        <button class="tablet-action-btn tablet-custom-action-btn" id="tabletCustomBtn1"></button>
        <button class="tablet-action-btn tablet-custom-action-btn" id="tabletCustomBtn2"></button>
        <button class="tablet-action-btn tablet-custom-action-btn" id="tabletCustomBtn3"></button>
        <button class="tablet-action-btn" id="tabletNextBtn" title="下一张图片"><!-- ... --></button>
    </div>

    <!-- 设置面板 -->
    <div class="settings-panel" id="settingsPanel">
        <!-- ... header ... -->
        <div class="settings-group">
             <div class="settings-group-title">常规设置</div>
             <div class="setting-item">
                <span class="setting-label">读取子文件夹</span>
                <label class="switch">
                    <input type="checkbox" id="subfoldersToggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
             <div class="setting-item">
                <span class="setting-label">归档模式 (下一张时移出)</span>
                <label class="switch">
                    <input type="checkbox" id="archiveOnNextToggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="settings-group">
            <div class="settings-group-title">显示设置</div>
            <!-- ... Tablet Mode toggle ... -->
        </div>
        
        <div class="settings-group">
            <div class="settings-group-title">文件夹设置</div>
            <!-- ... Current Folder, Change Folder ... -->
        </div>
        
        <div class="settings-group">
            <div class="settings-group-title">自定义保存路径</div>
            <div class="setting-item">
                <span class="setting-label">启用路径 1</span>
                <label class="switch"><input type="checkbox" id="customPathToggle1"><span class="slider"></span></label>
                <input type="text" class="custom-path-input" id="customPathInput1" value="Out1">
            </div>
            <div class="setting-item">
                <span class="setting-label">启用路径 2</span>
                <label class="switch"><input type="checkbox" id="customPathToggle2"><span class="slider"></span></label>
                <input type="text" class="custom-path-input" id="customPathInput2" value="Out2">
            </div>
            <div class="setting-item">
                <span class="setting-label">启用路径 3</span>
                <label class="switch"><input type="checkbox" id="customPathToggle3"><span class="slider"></span></label>
                <input type="text" class="custom-path-input" id="customPathInput3" value="Out3">
            </div>
        </div>

        <!-- ... Hotkey Info ... -->

        <div class="about-section">
            <div>MocaBolka</div>
            <div style="margin: 8px 0; font-size: 18px;">×</div>
            <div>腾讯元宝 feat. DeepSeek</div>
            <div style="margin: 8px 0; font-size: 18px;">×</div>
            <div>Google Gemini</div>
            <div class="version">版本 1.8</div>
        </div>
    </div>

    <!-- ... Overlay ... -->

    <script>
        // 全局变量
        let directoryHandle;
        let imageFiles = [];
        let currentImageIndex = -1;
        let historyImages = [];
        const MAX_HISTORY = 3;
        let settings = {
            tabletMode: false,
            includeSubfolders: true,
            archiveOnNext: false,
            customPaths: [
                { enabled: false, name: 'Out1' },
                { enabled: false, name: 'Out2' },
                { enabled: false, name: 'Out3' }
            ]
        };
        let lastAction = null;
        let toastTimeout;
        let imageCounts = {};

        // DOM元素 (caching all new elements)
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fullscreenIconEnter = document.getElementById('fullscreenIconEnter');
        const fullscreenIconExit = document.getElementById('fullscreenIconExit');
        const historyPanel = document.getElementById('historyPanel');
        const archiveOnNextToggle = document.getElementById('archiveOnNextToggle');
        // ... other DOM elements
        
        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            // ... rest of init functions
            updateCustomButtonsUI();
            applyArchiveMode();
        });

        // --- Settings Management ---
        function loadSettings() {
            const savedSettings = localStorage.getItem('imageViewerSettings');
            if (savedSettings) {
                try {
                    // Merge saved settings with defaults to ensure new settings are not lost
                    const loaded = JSON.parse(savedSettings);
                    settings = { ...settings, ...loaded };

                    // Populate UI from loaded settings
                    tabletModeToggle.checked = settings.tabletMode;
                    subfoldersToggle.checked = settings.includeSubfolders;
                    archiveOnNextToggle.checked = settings.archiveOnNext;

                    settings.customPaths.forEach((path, i) => {
                        document.getElementById(`customPathToggle${i+1}`).checked = path.enabled;
                        document.getElementById(`customPathInput${i+1}`).value = path.name;
                    });
                    
                    applyTabletMode();
                } catch (e) { console.error('加载设置失败:', e); }
            }
        }

        function saveSettings() {
            // Update settings from UI before saving
            settings.tabletMode = tabletModeToggle.checked;
            settings.includeSubfolders = subfoldersToggle.checked;
            settings.archiveOnNext = archiveOnNextToggle.checked;
            settings.customPaths.forEach((path, i) => {
                path.enabled = document.getElementById(`customPathToggle${i+1}`).checked;
                path.name = document.getElementById(`customPathInput${i+1}`).value;
            });
            localStorage.setItem('imageViewerSettings', JSON.stringify(settings));
        }

        // --- Event Listeners Setup ---
        function setupEventListeners() {
            // ... existing listeners
            
            // Fullscreen
            fullscreenBtn.addEventListener('click', toggleFullScreen);
            document.addEventListener('fullscreenchange', updateFullscreenIcon);

            // Settings
            archiveOnNextToggle.addEventListener('change', () => {
                saveSettings();
                applyArchiveMode();
            });

            for (let i = 1; i <= 3; i++) {
                document.getElementById(`customPathToggle${i}`).addEventListener('change', () => {
                    saveSettings();
                    updateCustomButtonsUI();
                });
                document.getElementById(`customPathInput${i}`).addEventListener('input', () => {
                    saveSettings();
                    updateCustomButtonsUI();
                });

                document.getElementById(`customBtn${i}`).addEventListener('click', () => handleCustomAction(i));
                document.getElementById(`tabletCustomBtn${i}`).addEventListener('click', () => handleCustomAction(i));
            }
            
            // Override Next Button listener
            nextBtn.addEventListener('click', handleNextImageClick);
            tabletNextBtn.addEventListener('click', handleNextImageClick);
        }

        // --- Core Functionality ---

        async function handleNextImageClick() {
            if (settings.archiveOnNext && currentImageIndex !== -1) {
                const imageToArchive = imageFiles[currentImageIndex];
                lastAction = {
                    type: 'archive',
                    index: currentImageIndex,
                    info: imageToArchive,
                    movedFrom: imageToArchive.handle.parent // Need to find a way to get parent
                };
                
                await moveCurrentImageTo('CheckeredFlag');
                showToast('archive', '图片已归档');
            }
            showNextRandomImage();
        }
        
        async function handleCustomAction(index) {
            const pathInfo = settings.customPaths[index - 1];
            if (!pathInfo.enabled) return;

            const imageToMove = imageFiles[currentImageIndex];
            lastAction = {
                type: 'custom',
                index: currentImageIndex,
                info: imageToMove,
                folder: pathInfo.name
            };
            
            await moveCurrentImageTo(pathInfo.name);
            showToast('custom', `图片已移至 ${pathInfo.name}`);
            showNextRandomImage();
        }

        async function moveCurrentImageTo(folderName) {
            if (currentImageIndex < 0) return;

            try {
                const imageInfo = imageFiles[currentImageIndex];
                const targetFolderHandle = await directoryHandle.getDirectoryHandle(folderName, { create: true });
                
                const sourceFile = await imageInfo.handle.getFile();
                const newFileHandle = await targetFolderHandle.getFileHandle(imageInfo.name, { create: true });
                const writable = await newFileHandle.createWritable();
                await writable.write(sourceFile);
                await writable.close();

                // This removeEntry is tricky if the file is in a subfolder. 
                // For now, assuming flat structure for simplicity of the feature.
                // A robust solution would need to trace the file path.
                await directoryHandle.removeEntry(imageInfo.name, { recursive: false });

                imageFiles.splice(currentImageIndex, 1);
                const historyIndex = historyImages.findIndex(h => h.name === imageInfo.name);
                if (historyIndex > -1) historyImages.splice(historyIndex, 1);
                
            } catch (error) {
                console.error(`移动文件至 ${folderName} 失败:`, error);
                alert(`移动文件至 ${folderName} 失败: ` + error.message);
            }
        }

        async function getAllImageFiles(dirHandle) {
            const files = [];
            const allowedTypes = ['image/jpeg', 'image/png', 'image/heic', 'image/heif'];
            // Dynamically build exclusion list from settings
            const customFolders = settings.customPaths.map(p => p.name);
            const excludedFolders = ['.MediaTrash', 'Collections', 'CheckeredFlag', ...customFolders];

            async function processDirectory(handle) {
                for await (const entry of handle.values()) {
                    if (entry.kind === 'file') {
                        const file = await entry.getFile();
                        if (allowedTypes.includes(file.type)) {
                            files.push({ handle: entry, name: file.name, lastModified: file.lastModified });
                        }
                    } else if (entry.kind === 'directory' && settings.includeSubfolders && !excludedFolders.includes(entry.name)) {
                        await processDirectory(entry);
                    }
                }
            }
            await processDirectory(dirHandle);
            return files;
        }

        function displayImage(url, name, modifiedDate) {
            fileName.textContent = name;
            fileName.classList.toggle('long', name.length > 75); // Updated length
            // ... rest of the function is the same
        }

        // --- UI Update Functions ---
        function updateCustomButtonsUI() {
            settings.customPaths.forEach((path, i) => {
                const btn = document.getElementById(`customBtn${i+1}`);
                const tabletBtn = document.getElementById(`tabletCustomBtn${i+1}`);
                const isEnabled = path.enabled && path.name.trim() !== '';

                [btn, tabletBtn].forEach(el => {
                    if (isEnabled) {
                        el.style.display = 'flex';
                        el.textContent = path.name;
                        el.title = `移动到 ${path.name}`;
                    } else {
                        el.style.display = 'none';
                    }
                });
            });
        }

        function applyArchiveMode() {
            const isArchiving = settings.archiveOnNext;
            historyPanel.style.opacity = isArchiving ? '0.3' : '1';
            historyPanel.style.pointerEvents = isArchiving ? 'none' : 'auto';
            countDisplay.style.opacity = isArchiving ? '0' : '1';
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }

        function updateFullscreenIcon() {
            if (document.fullscreenElement) {
                fullscreenIconEnter.classList.add('hidden');
                fullscreenIconExit.classList.remove('hidden');
            } else {
                fullscreenIconEnter.classList.remove('hidden');
                fullscreenIconExit.classList.add('hidden');
            }
        }

        // --- Undo Logic (REVISED) ---
        async function undoLastAction() {
            if (!lastAction) return;

            toastContainer.classList.remove('show');
            loadingContainer.classList.add('show');
            
            try {
                // The specific undo functions will now handle file restoration
                // and call displayImage internally.
                if (lastAction.type === 'delete') await undoMove('.MediaTrash');
                else if (lastAction.type === 'favorite') await undoMove('Collections');
                else if (lastAction.type === 'archive') await undoMove('CheckeredFlag');
                else if (lastAction.type === 'custom') await undoMove(lastAction.folder);
                
                // New reliable refresh logic
                // This forces the browser to recalculate layout, fixing the blank image issue.
                mainImage.style.display = 'none';
                void mainImage.offsetHeight; // This is the magic line for reflow
                mainImage.style.display = ''; // Revert to default display style

            } catch (error) {
                console.error('撤销操作失败:', error);
                alert('撤销失败: ' + error.message);
            } finally {
                loadingContainer.classList.remove('show');
                lastAction = null;
            }
        }

        async function undoMove(folderName) {
            const sourceFolderHandle = await directoryHandle.getDirectoryHandle(folderName);
            const fileHandleToMove = await sourceFolderHandle.getFileHandle(lastAction.info.name);
            const fileContent = await fileHandleToMove.getFile();

            // Assume move back to root of the main directoryHandle
            const restoredFileHandle = await directoryHandle.getFileHandle(lastAction.info.name, { create: true });
            const writable = await restoredFileHandle.createWritable();
            await writable.write(fileContent);
            await writable.close();

            await sourceFolderHandle.removeEntry(lastAction.info.name);

            const restoredInfo = { ...lastAction.info, handle: restoredFileHandle };
            imageFiles.splice(lastAction.index, 0, restoredInfo);
            addToHistory(restoredInfo);
            
            currentImageIndex = lastAction.index;
            const url = URL.createObjectURL(fileContent);
            displayImage(url, restoredInfo.name, new Date(restoredInfo.lastModified));
        }

        // Delete, Favorite actions now use the centralized move function
        async function deleteCurrentImage() {
            lastAction = { type: 'delete', index: currentImageIndex, info: imageFiles[currentImageIndex] };
            await moveCurrentImageTo('.MediaTrash');
            showToast('delete', '图片已删除');
            showNextRandomImage();
        }

        async function addToFavorites() {
            lastAction = { type: 'favorite', index: currentImageIndex, info: imageFiles[currentImageIndex] };
            await moveCurrentImageTo('Collections');
            showToast('favorite', '图片已收藏');
            showNextRandomImage();
        }

    </script>
