<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>本地图片浏览器 v1.9.0.0-Exp.1</title>
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-color: #4a8cff;
            --border-color: #333333;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.25);
            --transition: all 0.3s ease;
            --font-main: "OPPO Sans 4.0", -apple-system, BlinkMacSystemFont, sans-serif;
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #f5f5f5;
                --bg-secondary: #ffffff;
                --text-primary: #333333;
                --text-secondary: #666666;
                --border-color: #e0e0e0;
                --card-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: rgba(100, 100, 100, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(150, 150, 150, 0.5); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(180, 180, 180, 0.7); }

        /* --- 授权与加载 --- */
        .auth-container, .loading-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: var(--bg-primary); z-index: 1000; transition: opacity 0.5s ease;
        }
        .auth-container.hidden, .loading-container:not(.show) { opacity: 0; pointer-events: none; }
        .auth-content { background-color: var(--bg-secondary); border-radius: 16px; padding: 40px; max-width: 800px; text-align: center; box-shadow: var(--card-shadow); display: flex; flex-direction: column; gap: 30px; }
        .auth-main { display: flex; gap: 40px; align-items: flex-start; }
        .auth-left, .auth-right { flex: 1; }
        .auth-right { text-align: left; }
        .auth-content h1 { margin-bottom: 20px; font-weight: 500; }
        .auth-content p { color: var(--text-secondary); margin-bottom: 30px; line-height: 1.6; }
        .auth-btn { background-color: var(--accent-color); color: white; border: none; padding: 12px 32px; border-radius: 8px; font-size: 16px; font-family: inherit; cursor: pointer; transition: var(--transition); font-weight: 500; }
        .auth-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .authorized-folders { margin-top: 20px; }
        .folders-title { font-size: 16px; font-weight: 500; margin-bottom: 15px; color: var(--text-primary); }
        .folder-list { max-height: 200px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; }
        .folder-item { padding: 10px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: var(--transition); }
        .folder-item:last-child { border-bottom: none; }
        .folder-item:hover { background-color: rgba(255, 255, 255, 0.05); }
        
        .loading-container { background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); z-index: 999; }
        .loading-container.show { opacity: 1; pointer-events: all; }
        .loading-spinner { width: 60px; height: 60px; border: 4px solid rgba(255, 255, 255, 0.1); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        .loading-text { color: white; font-size: 18px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- 主界面布局 --- */
        .main-container { display: grid; height: 100vh; }
        /* Desktop Layout */
        body:not(.is-portrait) .main-container {
            grid-template-columns: auto 1fr;
            grid-template-rows: auto 1fr auto;
            grid-template-areas: "header header" "history main" "footer footer";
        }
        body.tablet-mode:not(.is-portrait) .main-container { grid-template-rows: auto 1fr; grid-template-areas: "header header" "history main"; }
        /* Portrait/Mobile Layout */
        body.is-portrait .main-container {
            grid-template-columns: 1fr;
            grid-template-rows: auto 1fr auto auto;
            grid-template-areas: "header" "main" "history" "footer";
        }
        body.tablet-mode.is-portrait .main-container { grid-template-rows: auto 1fr auto; grid-template-areas: "header" "main" "history"; }
        .main-container.show { opacity: 1; transition: opacity 0.5s ease; }

        /* --- 顶部标题栏 --- */
        .header {
            grid-area: header; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color); background-color: var(--bg-secondary); z-index: 10;
            padding-top: calc(16px + var(--safe-area-top));
        }
        .file-info { display: flex; flex-direction: column; max-width: 70%; overflow: hidden; }
        .file-name { font-size: 18px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-modified { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
        .header-controls { display: flex; align-items: center; gap: 8px; }
        .header-settings-btn { display: none; } /* Hidden by default */
        .fullscreen-btn, .header-settings-btn { background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 24px; width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; border-radius: 50%; transition: var(--transition); }
        .fullscreen-btn:hover, .header-settings-btn:hover { background-color: rgba(255, 255, 255, 0.1); }
        .header-settings-btn svg { width: 20px; height: 20px; fill: var(--text-primary); }

        /* --- 历史记录 --- */
        .history-panel { grid-area: history; background-color: var(--bg-secondary); z-index: 5; display: flex; }
        /* Desktop History */
        body:not(.is-portrait) .history-panel {
            width: 100px; padding: 16px; flex-direction: column; align-items: center;
            border-right: 1px solid var(--border-color);
        }
        /* Portrait/Mobile History */
        body.is-portrait .history-panel {
            width: 100%; height: 110px; padding: 12px; flex-direction: row; align-items: center;
            border-top: 1px solid var(--border-color); overflow-x: auto; gap: 12px;
            padding-bottom: calc(12px + var(--safe-area-bottom));
        }
        .history-title { font-size: 14px; color: var(--text-secondary); text-align: center; }
        body:not(.is-portrait) .history-title { margin-bottom: 12px; }
        body.is-portrait .history-title { writing-mode: vertical-lr; padding-right: 12px; border-right: 1px solid var(--border-color); height: 100%; }
        .history-item { width: 70px; height: 70px; border-radius: 8px; overflow: hidden; cursor: pointer; position: relative; background-color: var(--bg-primary); border: 1px solid var(--border-color); transition: var(--transition); flex-shrink: 0; }
        body:not(.is-portrait) .history-item { margin-bottom: 12px; }
        .history-item:hover { transform: scale(1.05); border-color: var(--accent-color); }
        .history-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .settings-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: var(--transition); }
        body:not(.is-portrait) .settings-btn { margin-top: auto; }
        .settings-btn:hover { background-color: rgba(255, 255, 255, 0.1); }
        .settings-btn svg { width: 24px; height: 24px; fill: var(--text-primary); }

        /* --- 主图片区域 --- */
        .main-content { grid-area: main; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; padding: 24px; }
        .image-container { position: relative; max-width: 100%; max-height: 100%; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .main-image { max-width: 100%; max-height: 100%; object-fit: contain; transition: opacity 0.3s ease; opacity: 0; }
        .main-image.show { opacity: 1; }
        .blur-background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(20px) brightness(0.5); opacity: 0; z-index: -1; transition: opacity 0.3s ease; }
        .blur-background.show { opacity: 0.7; }
        .scrollable-image { max-width: 100%; max-height: 100%; overflow: hidden; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }

        /* --- 底部操作栏 --- */
        .footer { grid-area: footer; padding: 16px 24px; display: flex; justify-content: center; align-items: center; border-top: 1px solid var(--border-color); background-color: var(--bg-secondary); z-index: 10; height: 80px; padding-bottom: calc(16px + var(--safe-area-bottom)); }
        body.tablet-mode .footer, body.is-portrait .footer { display: none; }
        .action-buttons { display: flex; gap: 24px; align-items: center; }
        .action-btn, .custom-action-btn { width: 48px; height: 48px; border-radius: 50%; display: flex; justify-content: center; align-items: center; background-color: rgba(255, 255, 255, 0.1); border: none; cursor: pointer; transition: var(--transition); }
        .action-btn:hover, .custom-action-btn:hover { background-color: rgba(255, 255, 255, 0.2); transform: translateY(-4px); }
        .action-btn svg, .custom-action-btn svg { width: 24px; height: 24px; fill: var(--text-primary); }
        .custom-buttons-group { display: flex; gap: 16px; }
        #customButtonsContainer:empty { display: none; }

        /* --- 平板模式浮动按钮 --- */
        .tablet-action-buttons { position: fixed; right: 40px; top: 50%; transform: translateY(-50%); display: none; flex-direction: column; gap: 16px; z-index: 50; }
        body.tablet-mode .tablet-action-buttons { display: flex; }
        .tablet-action-btn, .tablet-custom-action-btn { width: 64px; height: 64px; border-radius: 50%; display: flex; justify-content: center; align-items: center; background-color: rgba(30, 30, 30, 0.8); backdrop-filter: blur(10px); border: none; cursor: pointer; transition: var(--transition); box-shadow: var(--card-shadow); }
        .tablet-action-btn:hover, .tablet-custom-action-btn:hover { background-color: rgba(50, 50, 50, 0.9); transform: translateY(-4px); }
        .tablet-action-btn svg, .tablet-custom-action-btn svg { width: 32px; height: 32px; fill: var(--text-primary); }
        .tablet-custom-buttons-group { display: flex; flex-direction: column; gap: 16px; }
        #tabletCustomButtonsContainer:empty { display: none; }
        
        /* --- 设置面板 --- */
        .settings-panel { position: absolute; top: 0; left: 0; width: 320px; height: 100%; background-color: var(--bg-secondary); z-index: 110; transform: translateX(-100%); transition: transform 0.3s ease; padding: 24px; border-right: 1px solid var(--border-color); overflow-y: auto; padding-top: calc(24px + var(--safe-area-top)); }
        .settings-panel.open { transform: translateX(0); }
        .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .settings-title { font-size: 20px; font-weight: 500; }
        .close-settings { background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 24px; width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; border-radius: 50%; transition: var(--transition); }
        .close-settings:hover { background-color: rgba(255, 255, 255, 0.1); }
        .settings-group { margin-bottom: 24px; }
        .settings-group-title { font-size: 16px; font-weight: 500; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-color); }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-color); }
        .setting-label { font-size: 14px; }
        .custom-path-input { background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 4px; color: var(--text-primary); padding: 6px 8px; font-size: 14px; width: 120px; }
        .switch { position: relative; display: inline-block; width: 48px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(24px); }
        .about-section { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border-color); text-align: center; }
        .version { font-size: 14px; color: var(--text-secondary); margin-top: 8px; }
        .persisted-folder-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 4px; font-size: 14px; }
        .persisted-folder-actions button { background: none; border: 1px solid var(--border-color); color: var(--text-secondary); border-radius: 4px; padding: 4px 8px; margin-left: 8px; cursor: pointer; }
        .persisted-folder-actions button:hover { color: var(--text-primary); border-color: var(--accent-color); }

        /* --- 浮动元素 --- */
        .count-display { position: fixed; right: 20px; background-color: rgba(0, 0, 0, 0.7); color: white; padding: 8px 12px; border-radius: 20px; font-size: 14px; z-index: 30; backdrop-filter: blur(10px); transition: var(--transition); }
        body:not(.is-portrait) .count-display { bottom: 100px; }
        body.is-portrait .count-display { bottom: 120px; } /* Adjust for mobile history panel */
        .checkered-flag-mode .count-display { display: none; }
        
        .toast-container { position: fixed; left: 50%; top: calc(20px + var(--safe-area-top)); transform: translateX(-50%) translateY(-150px); background-color: var(--bg-secondary); color: var(--text-primary); padding: 16px 24px; border-radius: 8px; box-shadow: var(--card-shadow); display: flex; align-items: center; gap: 16px; z-index: 1000; opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease; pointer-events: none; }
        .toast-container.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: all; }
        .toast-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
        .toast-message { font-size: 16px; font-weight: 500; }
        .toast-undo { color: var(--accent-color); background: none; border: none; cursor: pointer; font-weight: 500; padding: 4px 8px; border-radius: 4px; transition: var(--transition); }
        .toast-undo:hover { background-color: rgba(255, 255, 255, 0.1); }

        .settings-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .settings-panel.open + .settings-overlay { opacity: 1; pointer-events: all; }

        .return-to-undo-container { position: fixed; top: 50%; left: 50%; z-index: 500; opacity: 0; pointer-events: none; transition: opacity 0.3s ease, transform 0.3s ease; transform: translate(-50%, -50%) scale(0.8); }
        .return-to-undo-container.show { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }
        #returnToUndoBtn { padding: 12px 24px; font-size: 16px; background-color: var(--accent-color); color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: var(--card-shadow); }

        /* --- 热键提示 --- */
        .hotkey-info { margin-top: 20px; padding: 16px; background-color: rgba(255, 255, 255, 0.1); border-radius: 8px; font-size: 14px; }
        .hotkey-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-color); }
        .hotkey-item:last-child { border-bottom: none; }
        .hotkey-label { color: var(--text-secondary); }
        .hotkey-value { font-weight: 500; }

        /* --- Ultra HDR Indicator --- */
        .hdr-indicator {
            position: absolute;
            top: 12px;
            left: 12px;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            color: #fff;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            z-index: 20;
            display: none; /* Hidden by default */
        }
        .hdr-info-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--bg-secondary);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            max-width: 400px;
            z-index: 1001;
            display: none; /* Hidden by default */
        }
        .hdr-info-popup h3 { margin-bottom: 12px; }
        .hdr-info-popup p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
        .hdr-info-popup button { margin-top: 20px; float: right; }

        /* --- Responsive Adjustments --- */
        @media (orientation: portrait) and (max-width: 768px) {
            body {
                --safe-area-bottom: env(safe-area-inset-bottom, 16px);
            }
            body.is-portrait { /* Use class for JS control */ }
            .settings-btn { display: none; }
            .header-settings-btn { display: flex; }
        }

    </style>
</head>
<body>
    <!-- 授权界面 -->
    <div class="auth-container" id="authContainer">
        <div class="auth-content">
            <h1>授权访问本地图片</h1>
            <div class="auth-main">
                <div class="auth-left">
                    <p>为了浏览您的本地图片，请授权访问您的图片文件夹。我们承诺仅读取图像文件，不会访问其他文件类型。</p>
                    <button class="auth-btn" id="authBtn">授权文件夹</button>
                </div>
                <div class="auth-right">
                    <div class="authorized-folders">
                        <div class="folders-title">已有访问权限的文件夹</div>
                        <div class="folder-list" id="folderList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载动画 -->
    <div class="loading-container" id="loadingContainer">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在加载图片文件...</div>
    </div>

    <!-- Toast通知 -->
    <div class="toast-container" id="toastContainer">
        <div class="toast-icon" id="toastIcon"></div>
        <div class="toast-message" id="toastMessage"></div>
        <button class="toast-undo" id="toastUndo">撤销</button>
    </div>

    <!-- 计数显示 -->
    <div class="count-display" id="countDisplay">浏览次数: 0</div>

    <!-- 主界面 -->
    <div class="main-container" id="mainContainer">
        <!-- 顶部标题栏 -->
        <header class="header">
            <div class="file-info">
                <div class="file-name" id="fileName">未选择图片</div>
                <div class="file-modified" id="fileModified">最后修改时间: --</div>

            <div class="header-controls">
                <button class="header-settings-btn" id="headerSettingsBtn" title="设置">

                </button>
                <button class="fullscreen-btn" id="fullscreenBtn" title="切换全屏">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
            </div>
        </header>

        <!-- 左侧历史记录 -->
        <div class="history-panel">
            <div class="history-title">最近浏览</div>
            <div class="history-item" id="historyItem1"></div>
            <div class="history-item" id="historyItem2"></div>
            <div class="history-item" id="historyItem3"></div>
            <div class="settings-btn" id="settingsBtn">

            </div>
        </div>

        <!-- 主图片区域 -->
        <main class="main-content">
            <div class="image-container">
                <div class="blur-background" id="blurBackground"></div>
                <div class="scrollable-image" id="scrollableImage">

    <script>
        // --- (IDB Helper remains the same) ---
        const idb = {
            db: null,
            openDB(dbName, storeName, version = 1) {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(dbName, version);
                    request.onupgradeneeded = () => request.result.createObjectStore(storeName);
                    request.onsuccess = () => { this.db = request.result; resolve(); };
                    request.onerror = (event) => reject(event.target.error);
                });
            },
            async getStore(storeName, mode) {
                if (!this.db) await this.openDB('file-handles-db', 'handles');
                return this.db.transaction(storeName, mode).objectStore(storeName);
            },
            async get(storeName, key) {
                const store = await this.getStore(storeName, 'readonly');
                return new Promise((resolve, reject) => {
                    const request = store.get(key);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = (event) => reject(event.target.error);
                });
            },
            async set(storeName, key, value) {
                const store = await this.getStore(storeName, 'readwrite');
                return new Promise((resolve, reject) => {
                    const request = store.put(value, key);
                    request.onsuccess = () => resolve();
                    request.onerror = (event) => reject(event.target.error);
                });
            },
            async del(storeName, key) {
                const store = await this.getStore(storeName, 'readwrite');
                return new Promise((resolve, reject) => {
                    const request = store.delete(key);
                    request.onsuccess = () => resolve();
                    request.onerror = (event) => reject(event.target.error);
                });
            },
            async keys(storeName) {
                const store = await this.getStore(storeName, 'readonly');
                return new Promise((resolve, reject) => {
                    const request = store.getAllKeys();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = (event) => reject(event.target.error);
                });
            }
        };

        // 全局变量
        let directoryHandle;
        let imageFiles = [];
        let currentImageIndex = -1;
        let historyImages = [];
        const MAX_HISTORY = 3;
        const MAX_CACHE = 5;

        let settings = {

            includeSubfolders: true,

        };

        function handleOrientationChange() {
            const isPortrait = window.innerHeight > window.innerWidth && window.innerWidth <= 768;
            document.body.classList.toggle('is-portrait', isPortrait);
        }

        // ... (checkSavedDirectory, authorizeNewFolder, populatePersistedFolders are the same) ...

        function setupEventListeners() {
            // ... (most event listeners are the same) ...
            
            // Unified settings button listeners
            const openSettingsPanel = () => dom.settingsPanel.classList.add('open');
            dom.settingsBtn.addEventListener('click', openSettingsPanel);
            dom.headerSettingsBtn.addEventListener('click', openSettingsPanel);

            // HDR Info Popup Listeners
            dom.hdrIndicator.addEventListener('click', () => dom.hdrInfoPopup.style.display = 'block');
            dom.closeHdrPopupBtn.addEventListener('click', () => dom.hdrInfoPopup.style.display = 'none');
        }

        // ... (other functions remain largely the same, until the modified ones below) ...
        
        async function showNextRandomImage(updateHistory = true) {
            hideReturnButton();
            if (imageFiles.length === 0) {
                dom.mainImage.src = '';
                dom.fileName.textContent = '没有更多图片';
                dom.fileModified.textContent = '--';
                return;
            };
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * imageFiles.length);
            } while (newIndex === currentImageIndex && imageFiles.length > 1);
            currentImageIndex = newIndex;
            
            const imageInfo = imageFiles[currentImageIndex];
            updateImageCount(imageInfo.name);

            if (updateHistory) {
                addToHistory(imageInfo);
            }
            
            try {
                const file = await imageInfo.handle.getFile();
                const url = URL.createObjectURL(file);
                displayImage(url, imageInfo.name, new Date(imageInfo.lastModified), file);
                manageCache(url);
            } catch (e) {
                console.error(`加载图片失败: ${imageInfo.name}`, e);
                imageFiles.splice(currentImageIndex, 1);
                showNextRandomImage(); // Call with default `updateHistory = true`
            }
        }

        async function displayImage(url, name, modifiedDate, fileObject) {
            dom.fileName.textContent = name;
            dom.fileModified.textContent = `最后修改时间: ${modifiedDate.toLocaleString()}`;
            dom.mainImage.classList.remove('show');
            dom.blurBackground.classList.remove('show');

            // HDR Indicator Logic
            checkAndShowHdrIndicator(fileObject);
            
            setTimeout(() => {
                // ... (rest of the display logic is the same) ...
            }, 300);
        }
        
        async function moveCurrentImageToFolder(folderName, actionType, toastMessageText) {
            hideReturnButton();
            if (currentImageIndex < 0) return;
            const imageInfo = imageFiles[currentImageIndex];
            try {
                const targetDirHandle = await directoryHandle.getDirectoryHandle(folderName, { create: true });
                const sourceFile = await imageInfo.handle.getFile();
                const newFileHandle = await targetDirHandle.getFileHandle(imageInfo.name, { create: true });
                const writable = await newFileHandle.createWritable();
                await writable.write(sourceFile);
                await writable.close();
                await directoryHandle.removeEntry(imageInfo.name, { recursive: false });

                lastAction = { type: actionType, info: imageInfo, originalIndex: currentImageIndex, fromFolder: folderName };
                imageFiles.splice(currentImageIndex, 1);
                
                showToast(actionType, toastMessageText, true);

                if (actionType === 'checkeredFlag') {
                    // Add the MOVED image to history for the visual undo feature.
                    addToHistory({ ...imageInfo, fromFolder: folderName });
                    // Show the next image WITHOUT adding it to history.
                    showNextRandomImage(false);
                } else {
                    // For other actions, just show the next random image and update history normally.
                    showNextRandomImage(true);
                }

            } catch (error) {
                console.error(`移动到 ${folderName} 失败:`, error);
                alert(`操作失败: ${error.message}`);
            }
        }
        
        async function checkAndShowHdrIndicator(file) {
            if (!file) {
                dom.hdrIndicator.style.display = 'none';
                return;
            }
            const isHdr = await detectUltraHDR(file);
            dom.hdrIndicator.style.display = isHdr ? 'block' : 'none';
        }
