<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地图片浏览器</title>
    <!-- EXIF.js库 -->
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <!-- 动态图片处理库 -->
    <script src="https://cdn.jsdelivr.net/npm/livephotojs@1.4.0/livephoto.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --button-bg: #f0f0f0;
            --button-hover: #e0e0e0;
            --sidebar-bg: rgba(255, 255, 255, 0.85);
            --border-color: #ddd;
            --overlay-bg: rgba(0, 0, 0, 0.5);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #ffffff;
            --button-bg: #333333;
            --button-hover: #444444;
            --sidebar-bg: rgba(30, 30, 30, 0.85);
            --border-color: #444;
            --overlay-bg: rgba(0, 0, 0, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* 授权提示 */
        .auth-prompt {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .auth-button {
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .auth-button:hover {
            background-color: #3367d6;
        }

        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            margin-top: 20px;
            font-size: 18px;
        }

        .progress-bar {
            width: 300px;
            height: 10px;
            background-color: #333;
            border-radius: 5px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background-color: #4caf50;
            width: 0%;
            transition: width 0.3s;
        }

        /* 主界面 */
        .main-container {
            display: none;
            height: 100vh;
            position: relative;
        }

        /* 高斯模糊背景 */
        .blur-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(20px);
            opacity: 0.5;
            z-index: -1;
        }

        /* 图片展示区域 */
        .image-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .main-image {
            max-width: 90%;
            max-height: 80%;
            object-fit: contain;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .main-image.wide {
            max-width: 95%;
            max-height: 70%;
        }

        .main-image.tall {
            max-width: 70%;
            max-height: 95%;
        }

        /* 顶部信息栏 */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .file-info {
            background-color: var(--sidebar-bg);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            backdrop-filter: blur(10px);
            max-width: 60%;
            text-align: center;
        }

        .file-name {
            display: inline-block;
            max-width: 50ch;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            position: relative;
        }

        .file-name::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 30px;
            background: linear-gradient(to right, transparent, var(--sidebar-bg));
        }

        /* 底部按钮 */
        .button-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
            padding: 10px;
            background-color: var(--sidebar-bg);
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        .button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--button-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            color: var(--text-color);
        }

        .button:hover {
            background-color: var(--button-hover);
            transform: scale(1.1);
        }

        .button i {
            font-size: 24px;
        }

        /* 历史记录侧边栏 */
        .history-sidebar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .history-item:hover {
            transform: scale(1.05);
            border-color: var(--text-color);
        }

        .history-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .settings-button {
            margin-top: 15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--button-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .settings-button:hover {
            background-color: var(--button-hover);
            transform: rotate(30deg);
        }

        /* EXIF信息侧边栏 */
        .exif-sidebar {
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            width: 300px;
            padding: 20px;
            background-color: transparent;
            z-index: 10;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .exif-sidebar.visible {
            transform: translateX(0);
        }

        .exif-content {
            background-color: var(--sidebar-bg);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .exif-title {
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .exif-item {
            margin-bottom: 10px;
            font-size: 14px;
        }

        .exif-label {
            font-weight: bold;
            margin-right: 5px;
        }

        /* 设置面板 */
        .settings-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 300px;
            height: 100%;
            background-color: var(--sidebar-bg);
            padding: 20px;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 20;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }

        .settings-panel.visible {
            transform: translateX(0);
        }

        .close-settings {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            background-color: var(--button-bg);
        }

        .settings-title {
            font-size: 22px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .setting-item {
            margin-bottom: 20px;
        }

        .setting-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #2196F3;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .about-section {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            text-align: center;
        }

        .about-text {
            font-size: 16px;
            font-weight: 500;
        }

        /* 平板模式 */
        .tablet-mode .button-bar {
            flex-direction: column;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            bottom: auto;
        }

        .tablet-mode .button {
            width: 70px;
            height: 70px;
        }

        .tablet-mode .button i {
            font-size: 30px;
        }

        /* 确认对话框 */
        .confirmation-dialog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            display: none;
        }

        .dialog-content {
            background-color: var(--sidebar-bg);
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .dialog-title {
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .dialog-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .dialog-button {
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            border: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .dialog-button.confirm {
            background-color: #f44336;
            color: white;
        }

        .dialog-button.cancel {
            background-color: var(--button-bg);
            color: var(--text-color);
        }

        .dialog-button:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        /* 拖拽区域 */
        .drop-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            display: none;
        }

        .drop-message {
            background-color: var(--sidebar-bg);
            padding: 40px;
            border-radius: 15px;
            font-size: 24px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        /* 动态图片容器 */
        .live-photo-container {
            position: relative;
            display: inline-block;
        }

        .live-photo-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 24px;
            height: 24px;
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 14px;
        }

        /* 滚动条样式 */
        .scrollable-image {
            overflow: auto;
            max-width: 100%;
            max-height: 100%;
        }

        /* 图标字体 */
        @font-face {
            font-family: 'Material Icons';
            font-style: normal;
            font-weight: 400;
            src: url(https://fonts.gstatic.com/s/materialicons/v140/flUhRq6tzZclQEJ-Vdg-IuiaDsNc.woff2) format('woff2');
        }

        .material-icons {
            font-family: 'Material Icons';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body>
    <!-- 授权提示 -->
    <div class="auth-prompt" id="authPrompt">
        <h2>欢迎使用图片浏览器</h2>
        <p>请授权访问本地图片文件夹以开始使用</p>
        <button class="auth-button" id="authButton">授权文件夹访问</button>
    </div>

    <!-- 加载界面 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">正在加载图片库...</div>
        <div class="progress-bar">
            <div class="progress" id="progressBar"></div>
        </div>
    </div>

    <!-- 主界面 -->
    <div class="main-container" id="mainContainer">
        <!-- 高斯模糊背景 -->
        <div class="blur-background" id="blurBg"></div>
        
        <!-- 图片容器 -->
        <div class="image-container" id="imageContainer">
            
        </div>
        
        <!-- 顶部信息栏 -->
        <div class="top-bar">
            <div class="file-info">
                <span class="file-name" id="fileName">未选择图片</span>
                <span> • </span>
                <span id="fileDate">--/--/---- --:--</span>
            </div>
        </div>
        
        <!-- 底部按钮 -->
        <div class="button-bar">
            <button class="button" id="deleteBtn" title="删除">
                <span class="material-icons">delete</span>
            </button>
            <button class="button" id="nextBtn" title="下一张随机图片">
                <span class="material-icons">arrow_forward</span>
            </button>
        </div>
        
        <!-- 历史记录侧边栏 -->
        <div class="history-sidebar">
            <div class="history-item" id="history1"></div>
            <div class="history-item" id="history2"></div>
            <div class="history-item" id="history3"></div>
            <div class="settings-button" id="settingsBtn">
                <span class="material-icons">settings</span>
            </div>
        </div>
        
        <!-- EXIF信息侧边栏 -->
        <div class="exif-sidebar" id="exifSidebar">
            <div class="exif-content">
                <div class="exif-title">图片信息</div>
                <div class="exif-item">
                    <span class="exif-label">制造商:</span>
                    <span id="exifMake">-</span>
                </div>
                <div class="exif-item">
                    <span class="exif-label">型号:</span>
                    <span id="exifModel">-</span>
                </div>
                <div class="exif-item">
                    <span class="exif-label">光圈值:</span>
                    <span id="exifAperture">-</span>
                </div>
                <div class="exif-item">
                    <span class="exif-label">曝光时间:</span>
                    <span id="exifExposure">-</span>
                </div>
                <div class="exif-item">
                    <span class="exif-label">ISO速度:</span>
                    <span id="exifISO">-</span>
                </div>
                <div class="exif-item">
                    <span class="exif-label">焦距:</span>
                    <span id="exifFocal">-</span>
                </div>
            </div>
        </div>
        
        <!-- 设置面板 -->
        <div class="settings-panel" id="settingsPanel">
            <div class="close-settings" id="closeSettings">
                <span class="material-icons">close</span>
            </div>
            <div class="settings-title">设置</div>
            
            <div class="setting-item">
                <span class="setting-label">深色模式</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="setting-item">
                <span class="setting-label">平板模式</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="tabletModeToggle">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="setting-item">
                <span class="setting-label">自动缓存图片</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="cacheToggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="setting-item">
                <span class="setting-label">包含子文件夹</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="includeSubfoldersToggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="about-section">
                <div class="about-text">MocaBolka feat. DeepSeek</div>
                <div class="version-text">版本 1.5.3</div>
            </div>
        </div>
    </div>
    
    <!-- 确认对话框 -->
    <div class="confirmation-dialog" id="confirmationDialog">
        <div class="dialog-content">
            <div class="dialog-title">确认删除</div>
            <p>您确定要永久删除这张图片吗？此操作无法撤销。</p>
            <div class="dialog-buttons">
                <button class="dialog-button confirm" id="confirmDelete">删除</button>
                <button class="dialog-button cancel" id="cancelDelete">取消</button>
            </div>
        </div>
    </div>
    
    <!-- 拖拽区域 -->
    <div class="drop-overlay" id="dropOverlay">
        <div class="drop-message">拖放图片到此处打开</div>
    </div>

    <script>
        // 全局变量
        let imageFiles = [];
        let currentImageIndex = -1;
        let history = [];
        let folderHandle = null;
        let cachedImages = {};
        const MAX_CACHE = 5;
        
        // DOM元素
        const authPrompt = document.getElementById('authPrompt');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const mainContainer = document.getElementById('mainContainer');
        const mainImage = document.getElementById('mainImage');
        const imageContainer = document.getElementById('imageContainer');
        const blurBg = document.getElementById('blurBg');
        const fileName = document.getElementById('fileName');
        const fileDate = document.getElementById('fileDate');
        const progressBar = document.getElementById('progressBar');
        const exifSidebar = document.getElementById('exifSidebar');
        const settingsPanel = document.getElementById('settingsPanel');
        const closeSettings = document.getElementById('closeSettings');
        const confirmationDialog = document.getElementById('confirmationDialog');
        const dropOverlay = document.getElementById('dropOverlay');
        
        // 初始化
        document.addEventListener('DOMContentLoaded', async function() {
            // 检查深色模式
            checkDarkMode();
            
            // 检查平板模式
            checkTabletMode();
            
            // 尝试从localStorage中获取上次授权的文件夹
            const savedFolder = localStorage.getItem('lastFolder');
            if (savedFolder) {
                try {
                    // 尝试恢复文件夹句柄
                    folderHandle = await restoreFolderHandle(savedFolder);
                    if (folderHandle) {
                        authPrompt.style.display = 'none';
                        loadingOverlay.style.display = 'flex';
                        await loadFolderContents();
                    } else {
                        authPrompt.style.display = 'flex';
                    }
                } catch (e) {
                    console.error('恢复文件夹失败:', e);
                    authPrompt.style.display = 'flex';
                }
            } else {
                authPrompt.style.display = 'flex';
            }
            
            // 设置事件监听器
            setupEventListeners();
            
            // 设置拖放功能
            setupDragAndDrop();
        });
        
        // 检查深色模式
        function checkDarkMode() {
            const darkMode = localStorage.getItem('darkMode') === 'true' || 
                            (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
            
            document.body.setAttribute('data-theme', darkMode ? 'dark' : 'light');
            document.getElementById('darkModeToggle').checked = darkMode;
        }
        
        // 检查平板模式
        function checkTabletMode() {
            const tabletMode = localStorage.getItem('tabletMode') === 'true';
            document.body.classList.toggle('tablet-mode', tabletMode);
            document.getElementById('tabletModeToggle').checked = tabletMode;
        }
        
        // 设置事件监听器
        function setupEventListeners() {
            // 授权按钮
            document.getElementById('authButton').addEventListener('click', requestFolderAccess);
            
            // 按钮事件
            document.getElementById('deleteBtn').addEventListener('click', showDeleteConfirmation);
            document.getElementById('nextBtn').addEventListener('click', showRandomImage);
            
            // 设置按钮
            document.getElementById('settingsBtn').addEventListener('click', toggleSettingsPanel);
            closeSettings.addEventListener('click', toggleSettingsPanel);
            
            // 历史记录点击
            document.getElementById('history1').addEventListener('click', () => navigateHistory(0));
            document.getElementById('history2').addEventListener('click', () => navigateHistory(1));
            document.getElementById('history3').addEventListener('click', () => navigateHistory(2));
            
            // 对话框按钮
            document.getElementById('confirmDelete').addEventListener('click', deleteCurrentImage);
            document.getElementById('cancelDelete').addEventListener('click', hideDeleteConfirmation);
            
            // 设置切换
            document.getElementById('darkModeToggle').addEventListener('change', toggleDarkMode);
            document.getElementById('tabletModeToggle').addEventListener('change', toggleTabletMode);
            document.getElementById('cacheToggle').addEventListener('change', toggleCache);
            document.getElementById('includeSubfoldersToggle').addEventListener('change', toggleSubfolders);
            
            // 点击设置面板外部关闭面板
            document.addEventListener('click', (e) => {
                if (settingsPanel.classList.contains('visible') && 
                    !e.target.closest('#settingsPanel') && 
                    !e.target.closest('#settingsBtn')) {
                    settingsPanel.classList.remove('visible');
                }
            });
        }
        
        // 设置拖放功能
        function setupDragAndDrop() {
            document.body.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropOverlay.style.display = 'flex';
            });
            
            document.body.addEventListener('dragleave', (e) => {
                if (e.relatedTarget === null) {
                    dropOverlay.style.display = 'none';
                }
            });
            
            document.body.addEventListener('drop', async (e) => {
                e.preventDefault();
                dropOverlay.style.display = 'none';
                
                if (e.dataTransfer.files.length > 0) {
                    const file = e.dataTransfer.files[0];
                    if (isImageFile(file)) {
                        await displayDroppedImage(file);
                    }
                }
            });
        }
        
        // 请求文件夹访问权限
        async function requestFolderAccess() {
            try {
                // 检查File System Access API是否可用
                if (!window.showDirectoryPicker) {
                    alert('您的浏览器不支持文件系统访问API，请使用Chrome 86或更高版本');
                    return;
                }
                
                folderHandle = await window.showDirectoryPicker({
                    mode: 'readwrite'
                });
                localStorage.setItem('lastFolder', folderHandle.name);
                authPrompt.style.display = 'none';
                loadingOverlay.style.display = 'flex';
                await loadFolderContents();
            } catch (e) {
                console.error('访问文件夹失败:', e);
                if (e.name !== 'AbortError') {
                    alert('无法访问文件夹，请重试。');
                }
            }
        }
        
        // 恢复文件夹句柄
        async function restoreFolderHandle(folderName) {
            // 在实际应用中，这里需要更复杂的实现来恢复句柄
            // 为简化演示，我们假设用户会重新选择文件夹
            return null;
        }
        
        // 加载文件夹内容
        async function loadFolderContents() {
            if (!folderHandle) return;
            
            loadingOverlay.style.display = 'flex';
            imageFiles = [];
            
            try {
                // 检查是否包含子文件夹
                const includeSubfolders = localStorage.getItem('includeSubfolders') !== 'false';
                
                // 遍历文件夹
                let totalFiles = 0;
                let processedFiles = 0;
                
                // 递归遍历函数
                async function traverseDirectory(dirHandle) {
                    for await (const entry of dirHandle.values()) {
                        if (entry.kind === 'file') {
                            totalFiles++;
                        } else if (entry.kind === 'directory' && includeSubfolders) {
                            await traverseDirectory(entry);
                        }
                    }
                }
                
                await traverseDirectory(folderHandle);
                
                // 再次遍历收集图片文件
                let startTime = Date.now();
                let lastUpdate = startTime;
                
                async function collectImages(dirHandle) {
                    for await (const entry of dirHandle.values()) {
                        if (entry.kind === 'file') {
                            const file = await entry.getFile();
                            if (isImageFile(file)) {
                                imageFiles.push({
                                    handle: entry,
                                    file: file,
                                    name: file.name,
                                    lastModified: file.lastModified
                                });
                            }
                            
                            processedFiles++;
                            
                            // 更新进度
                            const now = Date.now();
                            if (now - lastUpdate > 200) {
                                const elapsed = (now - startTime) / 1000;
                                const remaining = (elapsed / processedFiles) * (totalFiles - processedFiles);
                                updateProgress(processedFiles, totalFiles, remaining);
                                lastUpdate = now;
                            }
                        } else if (entry.kind === 'directory' && includeSubfolders) {
                            await collectImages(entry);
                        }
                    }
                }
                
                await collectImages(folderHandle);
                
                // 加载完成
                loadingOverlay.style.display = 'none';
                mainContainer.style.display = 'block';
                
                if (imageFiles.length > 0) {
                    // 显示随机图片
                    showRandomImage();
                    
                    // 初始化历史记录
                    initHistory();
                } else {
                    alert('未找到图片文件。请选择包含图片的文件夹。');
                    authPrompt.style.display = 'flex';
                }
            } catch (e) {
                console.error('加载文件夹内容失败:', e);
                loadingOverlay.style.display = 'none';
                alert('加载文件夹内容失败，请重试。');
            }
        }
        
        // 更新加载进度
        function updateProgress(processed, total, remaining) {
            const percent = Math.round((processed / total) * 100);
            progressBar.style.width = `${percent}%`;
            
            const minutes = Math.floor(remaining / 60);
            const seconds = Math.floor(remaining % 60);
            const timeText = minutes > 0 ? `${minutes}分${seconds}秒` : `${seconds}秒`;
            
            loadingText.textContent = 
                `加载中... ${processed}/${total} (剩余约${timeText})`;
        }
        
        // 检查是否为图片文件
        function isImageFile(file) {
            const type = file.type.toLowerCase();
            return type === 'image/jpeg' || 
                   type === 'image/jpg' || 
                   type === 'image/png' || 
                   type === 'image/heic' ||
                   type === 'image/heif';
        }
        
        // 显示随机图片
        async function showRandomImage() {
            if (imageFiles.length === 0) return;
            
            // 添加到历史记录
            if (currentImageIndex !== -1) {
                addToHistory(currentImageIndex);
            }
            
            // 获取随机索引
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * imageFiles.length);
            } while (randomIndex === currentImageIndex && imageFiles.length > 1);
            
            currentImageIndex = randomIndex;
            await displayImage(randomIndex);
        }
        
        // 显示指定图片
        async function displayImage(index) {
            if (index < 0 || index >= imageFiles.length) return;
            
            const imageInfo = imageFiles[index];
            
            // 显示加载状态
            mainImage.style.opacity = '0';
            
            try {
                // 尝试从缓存获取
                let url;
                if (cachedImages[index]) {
                    url = cachedImages[index];
                } else {
                    // 读取文件
                    const file = imageInfo.file;
                    url = URL.createObjectURL(file);
                    
                    // 添加到缓存
                    cachedImages[index] = url;
                    
                    // 清理超出限制的缓存
                    cleanCache();
                }
                
                // 设置图片
                mainImage.src = url;
                mainImage.onload = () => {
                    // 更新UI
                    fileName.textContent = imageInfo.name;
                    fileDate.textContent = formatDate(imageInfo.lastModified);
                    
                    // 根据宽高比调整样式
                    const ratio = mainImage.naturalWidth / mainImage.naturalHeight;
                    mainImage.classList.remove('wide', 'tall');
                    
                    if (ratio > 2) {
                        mainImage.classList.add('wide');
                        imageContainer.classList.add('scrollable-image');
                    } else if (ratio < 0.5) {
                        mainImage.classList.add('tall');
                        imageContainer.classList.add('scrollable-image');
                    } else {
                        imageContainer.classList.remove('scrollable-image');
                    }
                    
                    // 淡入图片
                    mainImage.style.opacity = '1';
                    
                    // 更新模糊背景
                    blurBg.style.backgroundImage = `url(${url})`;
                    
                    // 更新EXIF信息
                    updateExifInfo(imageInfo.file);
                    
                    // 检查是否为动态图片
                    checkLivePhoto(imageInfo.file, url);
                };
            } catch (e) {
                console.error('加载图片失败:', e);
            }
        }
        
        // 检查是否为动态图片
        function checkLivePhoto(file, url) {
            // 这里简化处理，实际应用中需要检查文件是否包含动态信息
            // 如果是HEIC格式，可能包含Live Photo数据
            if (file.type === 'image/heic' || file.name.toLowerCase().endsWith('.heic')) {
                // 添加Live Photo标记
                const badge = document.createElement('div');
                badge.className = 'live-photo-badge';
                badge.innerHTML = 'Live';
                badge.style.display = 'none'; // 默认隐藏，实际应用中需要检测是否真的有动态数据
                
                const container = document.createElement('div');
                container.className = 'live-photo-container';
                container.appendChild(mainImage.cloneNode(true));
                container.appendChild(badge);
                
                imageContainer.innerHTML = '';
                imageContainer.appendChild(container);
            }
        }
        
        // 显示拖放的图片
        async function displayDroppedImage(file) {
            const url = URL.createObjectURL(file);
            
            // 显示图片
            mainImage.src = url;
            mainImage.onload = () => {
                fileName.textContent = file.name;
                fileDate.textContent = formatDate(file.lastModified);
                
                // 更新模糊背景
                blurBg.style.backgroundImage = `url(${url})`;
                
                // 隐藏EXIF信息
                exifSidebar.classList.remove('visible');
                
                // 更新EXIF信息
                updateExifInfo(file);
            };
            
            // 显示主界面
            loadingOverlay.style.display = 'none';
            mainContainer.style.display = 'block';
        }
        
        // 更新EXIF信息
        function updateExifInfo(file) {
            // 使用EXIF.js读取元数据
            EXIF.getData(file, function() {
                const make = EXIF.getTag(this, "Make");
                const model = EXIF.getTag(this, "Model");
                const aperture = EXIF.getTag(this, "FNumber");
                const exposure = EXIF.getTag(this, "ExposureTime");
                const iso = EXIF.getTag(this, "ISOSpeedRatings");
                const focal = EXIF.getTag(this, "FocalLength");
                
                // 检查是否有EXIF数据
                const hasExifData = make || model || aperture || exposure || iso || focal;
                
                if (hasExifData) {
                    // 更新EXIF显示
                    document.getElementById('exifMake').textContent = make || '-';
                    document.getElementById('exifModel').textContent = model || '-';
                    document.getElementById('exifAperture').textContent = aperture ? `f/${aperture}` : '-';
                    document.getElementById('exifExposure').textContent = exposure ? `${exposure} sec` : '-';
                    document.getElementById('exifISO').textContent = iso ? `ISO ${iso}` : '-';
                    document.getElementById('exifFocal').textContent = focal ? `${focal} mm` : '-';
                    
                    // 显示侧边栏
                    exifSidebar.classList.add('visible');
                    
                    // 调整图片位置
                    mainImage.style.marginRight = '300px';
                } else {
                    // 隐藏侧边栏
                    exifSidebar.classList.remove('visible');
                    
                    // 重置图片位置
                    mainImage.style.marginRight = '0';
                }
            });
        }
        
        // 添加到历史记录
        function addToHistory(index) {
            // 添加到历史记录数组
            history.unshift(index);
            
            // 限制历史记录长度
            if (history.length > 10) {
                history.pop();
            }
            
            // 更新历史记录显示
            updateHistoryDisplay();
        }
        
        // 初始化历史记录
        function initHistory() {
            // 添加3个随机历史记录
            for (let i = 0; i < 3; i++) {
                const randomIndex = Math.floor(Math.random() * imageFiles.length);
                history.push(randomIndex);
            }
            
            // 更新显示
            updateHistoryDisplay();
        }
        
        // 更新历史记录显示
        function updateHistoryDisplay() {
            for (let i = 0; i < 3; i++) {
                const historyItem = document.getElementById(`history${i+1}`);
                
                if (i < history.length) {
                    const index = history[i];
                    const imageInfo = imageFiles[index];
                    
                    // 使用缓存或创建新URL
                    let url;
                    if (cachedImages[index]) {
                        url = cachedImages[index];
                    } else {
                        url = URL.createObjectURL(imageInfo.file);
                        cachedImages[index] = url;
                        cleanCache();
                    }
                    
                    // 创建或更新缩略图
                    let img = historyItem.querySelector('img');
                    if (!img) {
                        img = document.createElement('img');
                        historyItem.appendChild(img);
                    }
                    
                    img.src = url;
                    historyItem.style.display = 'block';
                } else {
                    historyItem.style.display = 'none';
                }
            }
        }
        
        // 导航历史记录
        async function navigateHistory(index) {
            if (index >= history.length) return;
            
            const historyIndex = history[index];
            currentImageIndex = historyIndex;
            await displayImage(historyIndex);
        }
        
        // 清理缓存
        function cleanCache() {
            const keys = Object.keys(cachedImages);
            if (keys.length > MAX_CACHE) {
                // 找到最久未使用的缓存
                let oldestKey = keys[0];
                for (const key of keys) {
                    if (key !== currentImageIndex && 
                        !history.includes(parseInt(key)) &&
                        key !== oldestKey) {
                        oldestKey = key;
                    }
                }
                
                // 释放URL
                URL.revokeObjectURL(cachedImages[oldestKey]);
                delete cachedImages[oldestKey];
            }
        }
        
        // 显示删除确认对话框
        function showDeleteConfirmation() {
            confirmationDialog.style.display = 'flex';
        }
        
        // 隐藏删除确认对话框
        function hideDeleteConfirmation() {
            confirmationDialog.style.display = 'none';
        }
        
        // 删除当前图片
        async function deleteCurrentImage() {
            if (currentImageIndex === -1) return;
            
            try {
                const imageInfo = imageFiles[currentImageIndex];
                
                // 使用File System Access API删除文件
                await folderHandle.removeEntry(imageInfo.handle.name);
                
                // 从列表中移除
                imageFiles.splice(currentImageIndex, 1);
                
                // 清理缓存
                if (cachedImages[currentImageIndex]) {
                    URL.revokeObjectURL(cachedImages[currentImageIndex]);
                    delete cachedImages[currentImageIndex];
                }
                
                // 更新历史记录
                history = history.filter(index => index !== currentImageIndex);
                updateHistoryDisplay();
                
                // 显示下一张图片
                showRandomImage();
            } catch (e) {
                console.error('删除图片失败:', e);
                alert('删除图片失败，请确保您有足够的权限。');
            } finally {
                hideDeleteConfirmation();
            }
        }
        
        // 切换设置面板
        function toggleSettingsPanel() {
            settingsPanel.classList.toggle('visible');
        }
        
        // 切换深色模式
        function toggleDarkMode() {
            const darkMode = document.getElementById('darkModeToggle').checked;
            document.body.setAttribute('data-theme', darkMode ? 'dark' : 'light');
            localStorage.setItem('darkMode', darkMode);
        }
        
        // 切换平板模式
        function toggleTabletMode() {
            const tabletMode = document.getElementById('tabletModeToggle').checked;
            document.body.classList.toggle('tablet-mode', tabletMode);
            localStorage.setItem('tabletMode', tabletMode);
        }
        
        // 切换缓存
        function toggleCache() {
            const cacheEnabled = document.getElementById('cacheToggle').checked;
            if (!cacheEnabled) {
                // 清除所有缓存
                for (const url of Object.values(cachedImages)) {
                    URL.revokeObjectURL(url);
                }
                cachedImages = {};
            }
            localStorage.setItem('cacheEnabled', cacheEnabled);
        }
        
        // 切换子文件夹包含
        function toggleSubfolders() {
            const includeSubfolders = document.getElementById('includeSubfoldersToggle').checked;
            localStorage.setItem('includeSubfolders', includeSubfolders);
            
            // 重新加载文件夹内容
            if (folderHandle) {
                loadingOverlay.style.display = 'flex';
                setTimeout(() => loadFolderContents(), 500);
            }
        }
        
        // 格式化日期
        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return `${date.getFullYear()}/${(date.getMonth()+1).toString().padStart(2, '0')}/${date.getDate().toString().padStart(2, '0')} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
        }
    </script>
